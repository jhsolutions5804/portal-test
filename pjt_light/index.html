<!DOCTYPE html><!-- build: 20260724 · ver: 2.0.0 · 경량 PJT 워크스페이스 (품목 체크 + 근태·공수 그리드 + PC 와이드 레이아웃) -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PJT 워크스페이스</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
.app{width:100%;max-width:640px;margin:0 auto;background:#fff;min-height:100vh;padding-bottom:60px}
.header{padding:16px 16px 0;border-bottom:1px solid #e5e5e5;background:#fff;position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.h-name{font-size:16px;font-weight:800;color:#1A2540;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-sub{font-size:12px;color:#86868b;margin:-4px 0 12px}
.kpi-row{display:flex;gap:20px;padding-bottom:12px}
.kpi-item .v{font-size:19px;font-weight:800;color:#1D5BA6}
.kpi-item .l{font-size:10px;color:#86868b;margin-top:1px}
.tab-bar{display:flex;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:74px;padding:10px 4px;font-size:12.5px;font-weight:400;color:#86868b;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;font-family:inherit;white-space:nowrap}
.tab.active{color:#1d1d1f;font-weight:700;border-bottom-color:#1D5BA6}
.content{padding:16px}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700;color:#1A2540;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.info-row:last-child{border-bottom:none}
.info-row .k{color:#86868b}
.info-row .v{color:#1d1d1f;font-weight:600;text-align:right}
label.f-label{font-size:12px;font-weight:600;color:#555;display:block;margin:12px 0 5px}
input.f-input,textarea.f-input,select.f-input{width:100%;padding:9px 12px;border:1.5px solid #dde4ef;border-radius:9px;font-size:14px;font-family:inherit;box-sizing:border-box}
textarea.f-input{resize:vertical;min-height:70px}
.btn-primary{padding:10px 16px;background:#1D5BA6;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-primary.block{width:100%;padding:12px;margin-top:14px}
.btn-primary:disabled{opacity:.5}
.btn-sm{padding:6px 11px;background:#f5f5f7;color:#555;border:1px solid #e5e5e5;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}
.sched-item{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid #f0f0f0}
.sched-item:last-child{border-bottom:none}
.sched-date{font-size:11px;font-weight:700;color:#1D5BA6;width:64px;flex-shrink:0;padding-top:2px}
.sched-body{flex:1;min-width:0}
.sched-title{font-size:13px;font-weight:600;color:#1d1d1f}
.sched-memo{font-size:12px;color:#86868b;margin-top:2px}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;display:inline-block;margin-bottom:3px}
.tag-반입{background:#e8f0fb;color:#0a3d7a}
.tag-검수{background:#e8f5e9;color:#1b5e20}
.tag-교육{background:#f3f0ff;color:#3c2a8a}
.tag-휴무{background:#ffeaea;color:#7f1d1d}
.tag-연차{background:#fff3e0;color:#e67e22}
.tag-기타{background:#f5f5f5;color:#3a3a3a}
.del-btn{background:none;border:none;color:#c0392b;font-size:12px;cursor:pointer;padding:4px 6px;flex-shrink:0}
.add-btn{width:100%;padding:11px;border:1.5px dashed #1D5BA6;background:#f4f8ff;color:#1D5BA6;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:14px}
.empty{text-align:center;color:#9AAABF;font-size:13px;padding:30px 0}
.modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.45);display:none;justify-content:center;align-items:flex-end}
.modal.on{display:flex}
.sheet{width:100%;max-width:640px;background:#fff;border-radius:18px 18px 0 0;max-height:92vh;overflow-y:auto;animation:up .2s ease}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 8px}
.sheet-title{font-size:16px;font-weight:700}
.sheet-close{background:none;border:none;font-size:22px;color:#86868b;cursor:pointer}
.sheet-body{padding:6px 18px 24px}
.day-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
.day-title{font-size:15px;font-weight:700;flex:1;text-align:center}
.nav-arrow{background:none;border:1px solid #d1d1d6;border-radius:8px;width:30px;height:30px;cursor:pointer;color:#86868b;font-size:16px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A2540;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:.2s;z-index:999}
.toast.on{opacity:1}
.loading{text-align:center;padding:60px 0;color:#9AAABF;font-size:13px}
/* 품목 체크 그리드 */
.item-grid{width:100%;border-collapse:collapse;font-size:12px}
.item-grid th{background:#f5f7fa;color:#555;font-weight:700;padding:8px 6px;text-align:center;border-bottom:1.5px solid #e0e6ee;white-space:nowrap}
.item-grid td{padding:8px 6px;text-align:center;border-bottom:1px solid #f0f0f0}
.item-grid td.item-name{text-align:left;font-weight:600;color:#1A2540;white-space:nowrap}
.chk-cell{width:28px;height:28px;border-radius:7px;border:1.5px solid #dde4ef;background:#fff;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;justify-content:center}
.chk-cell.done{background:#1D5BA6;border-color:#1D5BA6;color:#fff}
.item-grid-wrap{overflow-x:auto}
.stage-editor-tag{display:inline-flex;align-items:center;gap:5px;background:#f4f8ff;color:#1D5BA6;border:1px solid #d6e4f6;border-radius:16px;padding:4px 10px 4px 12px;font-size:12px;font-weight:600;margin:0 6px 6px 0}
.stage-editor-tag button{background:none;border:none;color:#1D5BA6;cursor:pointer;font-size:13px;padding:0 2px}
/* 근태·공수 그리드 */
.att-grid{width:100%;border-collapse:collapse;font-size:13px}
.att-grid th{background:#f5f7fa;color:#555;font-weight:700;padding:8px 6px;text-align:center;border-bottom:1.5px solid #e0e6ee}
.att-grid td{padding:6px;text-align:center;border-bottom:1px solid #f0f0f0}
.att-grid td.w-name{text-align:left;font-weight:600;color:#1A2540}
.md-input{width:56px;padding:5px;border:1px solid #dde4ef;border-radius:6px;text-align:center;font-size:13px;font-family:inherit}

/* ===== PC 와이드 레이아웃 (900px 이상) ===== */
@media (min-width:900px){
  body{background:#eef2f7}
  .app{max-width:none;padding-bottom:0}
  .header{padding:18px 28px 0;position:relative}
  .header-top{max-width:1100px;margin:0 auto 10px}
  .h-sub,.kpi-row{max-width:1100px;margin-left:auto;margin-right:auto}
  .kpi-row{gap:36px;padding-bottom:16px}
  .kpi-item .v{font-size:23px}
  .tab-bar{max-width:1100px;margin:0 auto;overflow-x:visible}
  .tab{flex:none;padding:12px 22px;font-size:13.5px}
  .content{max-width:1100px;margin:0 auto;padding:22px 28px}
  .card{padding:20px 24px}
  .item-grid-wrap{overflow-x:visible}
  .item-grid th,.item-grid td{padding:10px 8px;font-size:13px}
}
</style>
</head>
<body>
<div class="app" id="app" style="display:none">
  <div class="header">
    <div class="header-top">
      <span style="font-size:20px">🏗️</span>
      <div class="h-name" id="h-name">—</div>
      <span id="h-status" style="font-size:11px;padding:3px 9px;border-radius:10px;font-weight:700;background:#e8f5e9;color:#1b5e20">진행중</span>
    </div>
    <div class="h-sub" id="h-sub">—</div>
    <div class="kpi-row">
      <div class="kpi-item"><div class="v" id="kpi-progress">—</div><div class="l">공정율</div></div>
      <div class="kpi-item"><div class="v" id="kpi-dday">—</div><div class="l">D+ (일)</div></div>
      <div class="kpi-item"><div class="v" id="kpi-manday">—</div><div class="l">누적공수</div></div>
    </div>
    <div class="tab-bar">
      <button class="tab active" data-tab="home" onclick="switchTab('home')">🏠 홈</button>
      <button class="tab" data-tab="items" onclick="switchTab('items')">📦 품목현황</button>
      <button class="tab" data-tab="att" onclick="switchTab('att')">👷 근태·공수</button>
      <button class="tab" data-tab="sched" onclick="switchTab('sched')">📅 일정관리</button>
      <button class="tab" data-tab="report" onclick="switchTab('report')">📝 공사일보</button>
    </div>
  </div>

  <div class="content">
    <!-- 홈 -->
    <div id="pane-home">
      <div class="card">
        <div class="card-title">기본정보</div>
        <div class="info-row"><span class="k">현장명</span><span class="v" id="i-site">—</span></div>
        <div class="info-row"><span class="k">거래처</span><span class="v" id="i-client">—</span></div>
        <div class="info-row"><span class="k">PJT 내용</span><span class="v" id="i-content">—</span></div>
        <div class="info-row"><span class="k">품목</span><span class="v" id="i-item">—</span></div>
        <div class="info-row"><span class="k">물량</span><span class="v" id="i-qty">—</span></div>
        <div class="info-row"><span class="k">공사 시작일</span><span class="v" id="i-start">—</span></div>
      </div>
      <div class="card" id="edit-card" style="display:none">
        <div class="card-title">⚙️ 기본정보 수정 <span style="font-weight:400;color:#9AAABF;font-size:11px">(관리자)</span></div>
        <label class="f-label">공사 시작일</label>
        <input class="f-input" type="date" id="e-start">
        <button class="btn-primary" id="e-save-btn" onclick="saveBasic()" style="margin-top:12px">저장</button>
      </div>
      <div class="card" id="stage-card" style="display:none">
        <div class="card-title">🧩 공정 단계 설정 <span style="font-weight:400;color:#9AAABF;font-size:11px">(관리자 · 품목현황 탭 체크리스트 기준)</span></div>
        <div id="stage-tags"></div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <input class="f-input" type="text" id="stage-new" placeholder="예: 배관연결" style="flex:1">
          <button class="btn-primary" onclick="addStage()">추가</button>
        </div>
      </div>
    </div>

    <!-- 품목현황 -->
    <div id="pane-items" style="display:none">
      <div class="card">
        <div class="card-title">
          <span>📦 품목별 공정 체크</span>
          <button class="btn-sm" id="item-add-btn" onclick="openItemAdd()" style="display:none">+ 품목 추가</button>
        </div>
        <div class="item-grid-wrap" id="item-grid-wrap"><div class="loading">불러오는 중...</div></div>

    </div>

    <!-- 근태·공수 -->
    <div id="pane-att" style="display:none">
      <div class="day-nav">
        <button class="nav-arrow" onclick="attDayShift(-1)">‹</button>
        <div class="day-title" id="att-day-title">—</div>
        <button class="nav-arrow" onclick="attDayShift(1)">›</button>
      </div>
      <div class="card">
        <div class="card-title">
          <span>👷 기술인 명단 · 출역/공수</span>

        </div>
        <div id="att-grid-wrap"><div class="loading">불러오는 중...</div></div>
        <button class="btn-primary block" id="att-save-btn" onclick="saveAttendance()" style="display:none">출역·공수 저장</button>
      </div>
    </div>

    <!-- 일정관리 -->
    <div id="pane-sched" style="display:none">
      <button class="add-btn" onclick="openSchedForm()">+ 일정 추가</button>

    <!-- 공사일보 -->

      <div class="day-nav">
        <button class="nav-arrow" onclick="reportDayShift(-1)">‹</button>

        <button class="nav-arrow" onclick="reportDayShift(1)">›</button>
      </div>
      <div class="card">
        <label class="f-label">작성자</label>
        <input class="f-input" type="text" id="r-author" placeholder="작성자명">
        <label class="f-label">작업 내용</label>
        <textarea class="f-input" id="r-content" placeholder="금일 작업 내용을 입력하세요"></textarea>
        <label class="f-label">특이사항</label>
        <textarea class="f-input" id="r-note" placeholder="특이사항 (선택)" style="min-height:50px"></textarea>
        <button class="btn-primary block" id="r-save-btn" onclick="saveReport()">저장</button>
      </div>
      <div style="font-size:13px;font-weight:700;color:#1A2540;margin:18px 0 10px">📋 최근 공사일보</div>
      <div class="card" id="report-list"><div class="loading">불러오는 중...</div></div>
    </div>
  </div>
</div>

<div id="no-pjt" style="display:none;padding:60px 20px;text-align:center;color:#9AAABF;font-size:14px">
  ⚠️ 유효한 프로젝트를 찾을 수 없습니다.<br>포털 홈에서 다시 접속해주세요.
</div>

      <label class="f-label">이름</label><input class="f-input" type="text" id="wk-name" placeholder="예: 홍길동">

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, orderBy, getDocs, deleteDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDwkKOrRU1LF_N7fiVNWc5CRp-abopSyrI",
  authDomain: "portal-test-6e0ff.firebaseapp.com",
  projectId: "portal-test-6e0ff",
  storageBucket: "portal-test-6e0ff.firebasestorage.app",
  messagingSenderId: "752763010816",
  appId: "1:752763010816:web:4a0c7062a2f1a4e9a03de5"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(location.search);
const pjtId = params.get('pjtId');
// 관리자 여부: 메인 포털 openModule()이 관리자 로그인 시 URL에 &admin=1 을 자동으로 붙여줌
const isAdmin = params.get('admin') === '1';
const DEFAULT_STAGES = ['반입','설치','시운전'];

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'), 1800);
}
function fmtDate(s){
  if(!s) return '—';
  const d=new Date(s+'T00:00:00');
  if(isNaN(d)) return s;
  return (d.getMonth()+1)+'/'+d.getDate();
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function getToday(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

let pjtData=null;
let stageList=[];
let itemsCache=[];
let workersCache=[];

async function init(){
  if(!pjtId){ document.getElementById('no-pjt').style.display='block'; return; }
  try{
    const snap=await getDoc(doc(db,'pjt_registry',pjtId));
    if(!snap.exists()){ document.getElementById('no-pjt').style.display='block'; return; }
    pjtData=snap.data();
    stageList=(pjtData.stageList && pjtData.stageList.length) ? pjtData.stageList.slice() : DEFAULT_STAGES.slice();
    document.getElementById('app').style.display='block';
    renderHeader();
    if(isAdmin){
      document.getElementById('edit-card').style.display='block';
      document.getElementById('stage-card').style.display='block';
      document.getElementById('item-add-btn').style.display='inline-block';
      document.getElementById('worker-add-btn').style.display='inline-block';
      document.getElementById('att-save-btn').style.display='block';
      document.getElementById('e-start').value=pjtData.startDate||'';
      renderStageTags();
    }
    loadItems();
    loadWorkers().then(renderAttGrid);
    attDate=getToday(); renderAttDay();
    reportDate=getToday(); renderReportDay();
    loadSchedules();
    loadReports();
  }catch(e){ console.error(e); document.getElementById('no-pjt').style.display='block'; }
}

function renderHeader(){
  document.getElementById('h-name').textContent=pjtData.name||'PJT';
  document.getElementById('h-sub').textContent=[pjtData.client, pjtData.content].filter(Boolean).join(' · ')||pjtData.site||'';
  document.getElementById('h-status').textContent=pjtData.status==='ended'?'종료':'진행중';
  document.getElementById('h-status').style.background=pjtData.status==='ended'?'#f5f5f5':'#e8f5e9';
  document.getElementById('h-status').style.color=pjtData.status==='ended'?'#86868b':'#1b5e20';
  const progress=(typeof pjtData.progress==='number')?pjtData.progress:0;
  document.getElementById('kpi-progress').textContent=progress.toFixed(1)+'%';
  document.getElementById('kpi-manday').textContent=(pjtData.manday||0).toFixed(1);
  if(pjtData.startDate){
    const diff=Math.floor((new Date()-new Date(pjtData.startDate+'T00:00:00'))/(1000*60*60*24));
    document.getElementById('kpi-dday').textContent='D+'+diff;
  } else { document.getElementById('kpi-dday').textContent='—'; }
  document.getElementById('i-site').textContent=pjtData.site||'—';
  document.getElementById('i-client').textContent=pjtData.client||'—';
  document.getElementById('i-content').textContent=pjtData.content||'—';
  document.getElementById('i-item').textContent=pjtData.item||'—';
  document.getElementById('i-qty').textContent=pjtData.qty?(pjtData.qty+'대'):'—';
  document.getElementById('i-start').textContent=pjtData.startDate||'—';
}

window.switchTab=function(tab){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  ['home','items','att','sched','report'].forEach(function(t){
    document.getElementById('pane-'+t).style.display=(t===tab)?'':'none';
  });
};

window.saveBasic=async function(){
  const btn=document.getElementById('e-save-btn'); btn.disabled=true; btn.textContent='저장 중...';
  try{
    const startDate=document.getElementById('e-start').value||'';
    await updateDoc(doc(db,'pjt_registry',pjtId), {startDate});
    pjtData.startDate=startDate;
    renderHeader();
    toast('저장되었습니다');
  }catch(e){ toast('저장 실패: '+e.message); }
  finally{ btn.disabled=false; btn.textContent='저장'; }
};

// ── 공정 단계 설정 ──
function renderStageTags(){
  const el=document.getElementById('stage-tags');
  el.innerHTML=stageList.map(function(s,i){
    return '<span class="stage-editor-tag">'+escapeHtml(s)+'<button onclick="removeStage('+i+')">×</button></span>';
  }).join('') || '<span style="color:#9AAABF;font-size:12px">등록된 단계가 없습니다</span>';
}
window.addStage=async function(){
  const inp=document.getElementById('stage-new');
  const v=inp.value.trim();
  if(!v) return;
  if(stageList.indexOf(v)!==-1){ toast('이미 있는 단계입니다'); return; }
  stageList.push(v);
  inp.value='';
  await updateDoc(doc(db,'pjt_registry',pjtId), {stageList});
  renderStageTags();
  renderItemGrid();
};
window.removeStage=async function(i){
  stageList.splice(i,1);
  await updateDoc(doc(db,'pjt_registry',pjtId), {stageList});
  renderStageTags();
  renderItemGrid();
};

// ── 품목현황 ──
window.openItemAdd=function(){
  document.getElementById('it-name').value='';
  document.getElementById('item-modal').classList.add('on');
};
window.closeItemAdd=function(){ document.getElementById('item-modal').classList.remove('on'); };
window.saveItem=async function(){
  const name=document.getElementById('it-name').value.trim();
  if(!name){ toast('장비/품목명을 입력하세요'); return; }
  const btn=document.getElementById('it-save-btn'); btn.disabled=true; btn.textContent='추가 중...';
  try{
    const ref=doc(collection(db,'pjt_registry',pjtId,'items'));
    await setDoc(ref, { name, stages:{}, order: itemsCache.length, createdAt: serverTimestamp() });
    closeItemAdd();
    await loadItems();
  }catch(e){ toast('추가 실패: '+e.message); }
  finally{ btn.disabled=false; btn.textContent='추가'; }
};
window.deleteItem=async function(id){
  if(!confirm('이 품목을 삭제할까요?')) return;
  try{ await deleteDoc(doc(db,'pjt_registry',pjtId,'items',id)); await loadItems(); }
  catch(e){ toast('삭제 실패: '+e.message); }
};
window.toggleItemStage=async function(id, encodedStage){
  const stage=decodeURIComponent(encodedStage);
  const item=itemsCache.find(x=>x.id===id);
  if(!item) return;
  const stages=Object.assign({}, item.stages||{});
  stages[stage]=!stages[stage];
  try{
    await updateDoc(doc(db,'pjt_registry',pjtId,'items',id), {stages});
    item.stages=stages;
    renderItemGrid();
    await recalcProgress();
  }catch(e){ toast('저장 실패: '+e.message); }
};
async function loadItems(){
  try{
    const snap=await getDocs(query(collection(db,'pjt_registry',pjtId,'items'), orderBy('order','asc')));
    itemsCache=[]; snap.forEach(d=>itemsCache.push(Object.assign({id:d.id}, d.data())));
    renderItemGrid();
    await recalcProgress();
  }catch(e){ document.getElementById('item-grid-wrap').innerHTML='<div class="empty">불러오기 실패</div>'; }
}
function renderItemGrid(){
  const wrap=document.getElementById('item-grid-wrap');
  if(!itemsCache.length){ wrap.innerHTML='<div class="empty">등록된 품목이 없습니다. '+(isAdmin?'상단 [+ 품목 추가]로 등록하세요.':'') +'</div>'; return; }
  if(!stageList.length){ wrap.innerHTML='<div class="empty">공정 단계가 설정되지 않았습니다. (홈 탭에서 설정)</div>'; return; }
  let html='<table class="item-grid"><thead><tr><th style="text-align:left">품목</th>';
  stageList.forEach(function(s){ html+='<th>'+escapeHtml(s)+'</th>'; });
  if(isAdmin) html+='<th></th>';
  html+='</tr></thead><tbody>';
  itemsCache.forEach(function(it){
    html+='<tr><td class="item-name">'+escapeHtml(it.name)+'</td>';
    stageList.forEach(function(s){
      const done=it.stages && it.stages[s];
      html+='<td><button class="chk-cell'+(done?' done':'')+'" '+(isAdmin?('onclick="toggleItemStage(\''+it.id+'\',\''+encodeURIComponent(s)+'\')"'):'disabled')+'>'+(done?'✓':'')+'</button></td>';
    });
    if(isAdmin) html+='<td><button class="del-btn" onclick="deleteItem(\''+it.id+'\')">삭제</button></td>';
    html+='</tr>';
  });
  html+='</tbody></table>';
  wrap.innerHTML=html;
}

async function recalcProgress(){
  let total=0, done=0;
  itemsCache.forEach(function(it){
    stageList.forEach(function(s){ total++; if(it.stages && it.stages[s]) done++; });
  });
  const pct = total? (done/total*100) : 0;
  try{
    await updateDoc(doc(db,'pjt_registry',pjtId), {progress: pct});
    pjtData.progress=pct;
    document.getElementById('kpi-progress').textContent=pct.toFixed(1)+'%';
  }catch(e){}
}

// ── 근태·공수 ──
let attDate=getToday();
let attChecks=[];
let attManday={};
function renderAttDay(){
  const d=new Date(attDate+'T00:00:00');
  document.getElementById('att-day-title').textContent=(d.getMonth()+1)+'월 '+d.getDate()+'일';
  loadAttOfDay();
}
window.attDayShift=function(n){
  const d=new Date(attDate+'T00:00:00'); d.setDate(d.getDate()+n);
  attDate=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  renderAttDay();
};
window.openWorkerAdd=function(){
  document.getElementById('wk-name').value='';
  document.getElementById('worker-modal').classList.add('on');
};
window.closeWorkerAdd=function(){ document.getElementById('worker-modal').classList.remove('on'); };
window.saveWorker=async function(){
  const name=document.getElementById('wk-name').value.trim();
  if(!name){ toast('이름을 입력하세요'); return; }
  const btn=document.getElementById('wk-save-btn'); btn.disabled=true; btn.textContent='추가 중...';
  try{
    const ref=doc(collection(db,'pjt_registry',pjtId,'workers'));
    await setDoc(ref, { name, order: workersCache.length, createdAt: serverTimestamp() });
    closeWorkerAdd();
    await loadWorkers();
    renderAttGrid();
  }catch(e){ toast('추가 실패: '+e.message); }
  finally{ btn.disabled=false; btn.textContent='추가'; }
};
window.deleteWorker=async function(id){
  if(!confirm('이 인원을 명단에서 삭제할까요?')) return;
  try{ await deleteDoc(doc(db,'pjt_registry',pjtId,'workers',id)); await loadWorkers(); renderAttGrid(); }
  catch(e){ toast('삭제 실패: '+e.message); }
};
async function loadWorkers(){
  try{
    const snap=await getDocs(query(collection(db,'pjt_registry',pjtId,'workers'), orderBy('order','asc')));
    workersCache=[]; snap.forEach(d=>workersCache.push(Object.assign({id:d.id}, d.data())));
  }catch(e){ workersCache=[]; }
}
async function loadAttOfDay(){
  try{
    const [attSnap, mdSnap]=await Promise.all([
      getDoc(doc(db,'pjt_registry',pjtId,'attendance',attDate)),
      getDoc(doc(db,'pjt_registry',pjtId,'manday',attDate))
    ]);
    attChecks=attSnap.exists()?(attSnap.data().checks||[]):[];
    attManday=mdSnap.exists()?(mdSnap.data().md||{}):{};
  }catch(e){ attChecks=[]; attManday={}; }
  renderAttGrid();
}
window.toggleAttCheck=function(wid){
  const idx=attChecks.indexOf(wid);
  if(idx===-1){ attChecks.push(wid); if(attManday[wid]==null) attManday[wid]=1; }
  else { attChecks.splice(idx,1); }
  renderAttGrid();
};
window.onMandayInput=function(wid, val){ attManday[wid]=parseFloat(val)||0; };
function renderAttGrid(){
  const wrap=document.getElementById('att-grid-wrap');
  if(!workersCache.length){ wrap.innerHTML='<div class="empty">등록된 기술인이 없습니다. '+(isAdmin?'상단 [+ 인원 추가]로 등록하세요.':'')+'</div>'; return; }
  let html='<table class="att-grid"><thead><tr><th style="text-align:left">이름</th><th>출역</th><th>공수</th>'+(isAdmin?'<th></th>':'')+'</tr></thead><tbody>';
  workersCache.forEach(function(w){
    const checked=attChecks.indexOf(w.id)!==-1;
    const md=attManday[w.id]!=null?attManday[w.id]:'';
    html+='<tr><td class="w-name">'+escapeHtml(w.name)+'</td>'
      +'<td><button class="chk-cell'+(checked?' done':'')+'" '+(isAdmin?('onclick="toggleAttCheck(\''+w.id+'\')"'):'disabled')+'>'+(checked?'✓':'')+'</button></td>'
      +'<td><input class="md-input" type="number" step="0.5" min="0" value="'+md+'" '+(isAdmin?('onchange="onMandayInput(\''+w.id+'\',this.value)"'):'disabled')+'></td>'
      +(isAdmin?('<td><button class="del-btn" onclick="deleteWorker(\''+w.id+'\')">삭제</button></td>'):'')
      +'</tr>';
  });
  html+='</tbody></table>';
  wrap.innerHTML=html;
}
window.saveAttendance=async function(){
  const btn=document.getElementById('att-save-btn'); btn.disabled=true; btn.textContent='저장 중...';
  try{
    await setDoc(doc(db,'pjt_registry',pjtId,'attendance',attDate), { checks: attChecks, updatedAt: serverTimestamp() });
    const mdToSave={}; attChecks.forEach(function(wid){ mdToSave[wid]=attManday[wid]||0; });
    await setDoc(doc(db,'pjt_registry',pjtId,'manday',attDate), { md: mdToSave, updatedAt: serverTimestamp() });
    toast('저장되었습니다');
    await recalcTotalManday();
  }catch(e){ toast('저장 실패: '+e.message); }
  finally{ btn.disabled=false; btn.textContent='출역·공수 저장'; }
};
async function recalcTotalManday(){
  try{
    const snap=await getDocs(collection(db,'pjt_registry',pjtId,'manday'));
    let total=0;
    snap.forEach(function(d){
      const md=d.data().md||{};
      Object.keys(md).forEach(function(k){ total+=(parseFloat(md[k])||0); });
    });
    await updateDoc(doc(db,'pjt_registry',pjtId), {manday: total});
    pjtData.manday=total;
    document.getElementById('kpi-manday').textContent=total.toFixed(1);
  }catch(e){}
}

// ── 일정관리 ──
window.openSchedForm=function(){
  document.getElementById('s-date').value=''; document.getElementById('s-tag').value='반입';
  document.getElementById('s-title').value=''; document.getElementById('s-memo').value='';
  document.getElementById('sched-modal').classList.add('on');
};
window.closeSchedForm=function(){ document.getElementById('sched-modal').classList.remove('on'); };
window.saveSched=async function(){
  const date=document.getElementById('s-date').value;
  const title=document.getElementById('s-title').value.trim();
  if(!date||!title){ toast('날짜와 제목을 입력하세요'); return; }
  const btn=document.getElementById('s-save-btn'); btn.disabled=true; btn.textContent='등록 중...';
  try{
    const ref=doc(collection(db,'pjt_registry',pjtId,'schedules'));
    await setDoc(ref, { date, tag: document.getElementById('s-tag').value, title,
      memo: document.getElementById('s-memo').value.trim(), createdAt: serverTimestamp() });
    closeSchedForm(); loadSchedules();
  }catch(e){ toast('등록 실패: '+e.message); }
  finally{ btn.disabled=false; btn.textContent='등록'; }
};
window.deleteSched=async function(id){
  if(!confirm('이 일정을 삭제할까요?')) return;
  try{ await deleteDoc(doc(db,'pjt_registry',pjtId,'schedules',id)); loadSchedules(); }
  catch(e){ toast('삭제 실패: '+e.message); }
};
async function loadSchedules(){
  const el=document.getElementById('sched-list');
  try{
    const snap=await getDocs(query(collection(db,'pjt_registry',pjtId,'schedules'), orderBy('date','asc')));
    if(snap.empty){ el.innerHTML='<div class="empty">등록된 일정이 없습니다.</div>'; return; }
    let html='';
    snap.forEach(function(d){
      const s=d.data();
      html+='<div class="sched-item"><div class="sched-date">'+fmtDate(s.date)+'</div>'
        +'<div class="sched-body"><span class="tag tag-'+(s.tag||'기타')+'">'+(s.tag||'기타')+'</span>'
        +'<div class="sched-title">'+escapeHtml(s.title||'')+'</div>'
        +(s.memo?('<div class="sched-memo">'+escapeHtml(s.memo)+'</div>'):'')+'</div>'
        +(isAdmin?('<button class="del-btn" onclick="deleteSched(\''+d.id+'\')">삭제</button>'):'')+'</div>';
    });
    el.innerHTML=html;
  }catch(e){ el.innerHTML='<div class="empty">불러오기 실패</div>'; }
}

// ── 공사일보 ──
let reportDate=getToday();
function renderReportDay(){
  const d=new Date(reportDate+'T00:00:00');
  document.getElementById('report-day-title').textContent=(d.getMonth()+1)+'월 '+d.getDate()+'일';
  loadReportOfDay();
}
window.reportDayShift=function(n){
  const d=new Date(reportDate+'T00:00:00'); d.setDate(d.getDate()+n);
  reportDate=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  renderReportDay();
};
async function loadReportOfDay(){
  try{
    const snap=await getDoc(doc(db,'pjt_registry',pjtId,'reports',reportDate));
    if(snap.exists()){
      const r=snap.data();
      document.getElementById('r-author').value=r.author||'';
      document.getElementById('r-content').value=r.content||'';
      document.getElementById('r-note').value=r.note||'';
    } else {
      document.getElementById('r-author').value=''; document.getElementById('r-content').value=''; document.getElementById('r-note').value='';
    }
  }catch(e){}
}
window.saveReport=async function(){
  const content=document.getElementById('r-content').value.trim();
  if(!content){ toast('작업 내용을 입력하세요'); return; }
  const btn=document.getElementById('r-save-btn'); btn.disabled=true; btn.textContent='저장 중...';
  try{
    await setDoc(doc(db,'pjt_registry',pjtId,'reports',reportDate), {
      date: reportDate, author: document.getElementById('r-author').value.trim(),
      content: content, note: document.getElementById('r-note').value.trim(), updatedAt: serverTimestamp()
    }, {merge:true});
    toast('저장되었습니다'); loadReports();
  }catch(e){ toast('저장 실패: '+e.message); }
  finally{ btn.disabled=false; btn.textContent='저장'; }
};
async function loadReports(){
  const el=document.getElementById('report-list');
  try{
    const snap=await getDocs(query(collection(db,'pjt_registry',pjtId,'reports'), orderBy('date','desc')));
    if(snap.empty){ el.innerHTML='<div class="empty">작성된 공사일보가 없습니다.</div>'; return; }
    let html=''; let count=0;
    snap.forEach(function(d){
      if(count>=15) return; count++;
      const r=d.data();
      html+='<div class="sched-item"><div class="sched-date">'+fmtDate(r.date)+'</div>'
        +'<div class="sched-body"><div class="sched-title">'+escapeHtml(r.author||'작성자 미상')+'</div>'
        +'<div class="sched-memo">'+escapeHtml(r.content||'')+'</div>'
        +(r.note?('<div class="sched-memo" style="color:#c0392b">⚠ '+escapeHtml(r.note)+'</div>'):'')+'</div></div>';
    });
    el.innerHTML=html||'<div class="empty">작성된 공사일보가 없습니다.</div>';
  }catch(e){ el.innerHTML='<div class="empty">불러오기 실패</div>'; }
}

init();
</script>
