<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>기획 · JH Solutions</title>
<style>
  :root{
    --blue:#1D5BA6; --blue-d:#16487f; --blue-l:#5BA4CF; --blue-pale:#eaf2fc;
    --ink:#1a2330; --sub:#6b7787; --line:#e4eaf2; --bg:#eef2f7; --card:#fff;
    --ok:#1b8a5a; --warn:#c0392b; --amber:#e08a1e; --money:#0f2f5c; --r:13px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{font-family:-apple-system,"Apple SD Gothic Neo","Pretendard",sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; font-size:14px}
  .wrap{max-width:1100px; margin:0 auto; min-height:100vh; background:var(--bg)}
  .head{background:var(--card); border-bottom:1px solid var(--line); padding:16px 20px 0; position:sticky; top:0; z-index:10}
  .tabs{display:flex; gap:2px}
  .tab{padding:11px 16px; font-size:13.5px; font-weight:700; color:var(--sub); cursor:pointer; border-bottom:2.5px solid transparent; white-space:nowrap}
  .tab.on{color:var(--blue); border-bottom-color:var(--blue)}
  .body{padding:20px 24px}
  .view{display:none} .view.on{display:block}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:16px}
  .btn{border:none; border-radius:9px; padding:11px 16px; font-size:13.5px; font-weight:700; cursor:pointer; font-family:inherit}
  .btn:disabled{opacity:.55}
  .btn.pri{background:var(--blue); color:#fff} .btn.pri:active{background:var(--blue-d)}
  .btn.line{background:#fff; color:var(--blue); border:1px solid var(--blue)}
  .btn.sm{padding:7px 12px; font-size:12px; border-radius:8px}
  .btn.gray{background:#f1f3f7; color:var(--sub)}
  .btn.full{width:100%}
  .sec-h{display:flex; align-items:center; justify-content:space-between; margin:0 0 14px}
  .sec-h h2{margin:0; font-size:15px; font-weight:800}
  .muted{color:var(--sub)} .small{font-size:12px} .right{text-align:right} .center{text-align:center}
  .pjt{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:16px 16px 14px; margin-bottom:12px; cursor:pointer; transition:.13s}
  .pjt:hover{border-color:var(--blue-l)}
  .pjt-top{display:flex; align-items:flex-start; gap:10px; margin-bottom:13px}
  .pjt-code{font-size:16px; font-weight:800}
  .pjt-name{font-size:12px; color:var(--sub); margin-top:2px}
  .badge{font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:20px; white-space:nowrap}
  .badge.run{background:#e7f3ee; color:var(--ok)} .badge.done{background:#f1f3f7; color:var(--sub)}
  .badge.type{background:var(--blue-pale); color:var(--blue); margin-left:6px}
  .sumgrid{display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--line); border-radius:10px; overflow:hidden; border:1px solid var(--line)}
  .sumcell{background:#fafbfd; padding:10px 8px; text-align:center}
  .sumcell .l{font-size:10.5px; color:var(--sub); margin-bottom:3px}
  .sumcell .v{font-size:14px; font-weight:800; color:var(--money)}
  .sumcell .v.pos{color:var(--ok)} .sumcell .v.neg{color:var(--warn)}
  @media(max-width:560px){ .sumgrid{grid-template-columns:repeat(2,1fr)} }
  .field{margin-bottom:13px}
  .field label{display:block; font-size:12px; color:var(--sub); font-weight:600; margin-bottom:5px}
  .inp,.sel{width:100%; border:1px solid var(--line); border-radius:9px; padding:10px 11px; font-size:13.5px; background:#fbfcfe; font-family:inherit}
  .inp:focus,.sel:focus{outline:none; border-color:var(--blue); background:#fff; box-shadow:0 0 0 3px rgba(29,91,166,.12)}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .items{width:100%; border-collapse:collapse; margin-top:6px}
  .items th{font-size:11px; color:var(--sub); font-weight:700; text-align:left; padding:7px 6px; border-bottom:1.5px solid var(--line); white-space:nowrap}
  .items td{padding:5px 5px; border-bottom:1px solid #f0f3f7; vertical-align:middle}
  .items .ti{width:100%; border:1px solid var(--line); border-radius:7px; padding:7px 8px; font-size:12.5px; background:#fff; font-family:inherit}
  .items .ti.num{text-align:right}
  .items .del{border:none; background:none; color:#c0392b; cursor:pointer; font-size:15px; padding:2px 4px}
  .items col.c-no{width:28px} .items col.c-qty{width:60px} .items col.c-price{width:108px} .items col.c-amt{width:120px} .items col.c-del{width:28px}
  .totbox{margin-top:14px; border-top:1.5px solid var(--line); padding-top:12px}
  .totrow{display:flex; justify-content:space-between; align-items:center; font-size:13px; padding:4px 0}
  .totrow .tinp{width:170px; border:1px solid var(--blue-l); border-radius:8px; padding:8px 10px; font-size:15px; font-weight:800; text-align:right; color:var(--money); background:#f4f9ff; font-family:inherit}
  .totrow.big{font-size:15px; font-weight:800; color:var(--money); border-top:1px solid var(--line); margin-top:6px; padding-top:10px}
  .scroll{overflow-x:auto; -webkit-overflow-scrolling:touch}
  .litem{display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--line); border-radius:11px; padding:13px 15px; margin-bottom:9px; cursor:pointer}
  .litem:hover{border-color:var(--blue-l)}
  .litem .d{flex:1} .litem .d .ti{font-size:14px; font-weight:700} .litem .d .mt{font-size:11.5px; color:var(--sub); margin-top:2px}
  .litem .amt{font-size:14px; font-weight:800; color:var(--money); white-space:nowrap}
  .empty{text-align:center; color:var(--sub); font-size:13px; padding:34px 16px; border:1px dashed var(--line); border-radius:12px; background:#fafbfd}
  .back{font-size:13px; color:var(--blue); background:none; border:none; cursor:pointer; font-weight:700; padding:6px 0; margin-bottom:6px}
  .pill{display:inline-block; font-size:10.5px; font-weight:700; background:var(--blue-pale); color:var(--blue); padding:2px 8px; border-radius:10px}
  .litem.void{opacity:.6; background:#fbfbfc}
  .litem.void .ti{text-decoration:line-through; text-decoration-thickness:1.5px; color:var(--sub)}
  .void-tag{display:inline-block; font-size:10px; font-weight:700; background:#f1f3f7; color:#90a; color:var(--sub); padding:2px 7px; border-radius:9px; margin-left:6px}
  .rev-tag{display:inline-block; font-size:10px; font-weight:700; background:#fff3e0; color:#e08a1e; padding:2px 7px; border-radius:9px; margin-left:6px}
  .void-banner{background:#f1f3f7; color:var(--sub); border:1px solid var(--line); border-radius:10px; padding:10px 13px; font-size:12.5px; font-weight:600; margin-bottom:12px}
  .seg-btn{flex:1; padding:11px; border-radius:9px; border:2px solid var(--line); background:#fff; color:var(--sub); font-weight:700; font-size:13.5px; cursor:pointer; font-family:inherit}
  .seg-btn.on{border-color:var(--blue); background:var(--blue-pale); color:var(--blue)}
  .estpick{display:flex; align-items:center; gap:10px; border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:8px; cursor:pointer; background:#fafbfd}
  .estpick.on{border-color:var(--blue); background:var(--blue-pale)}
  .estpick input{width:17px; height:17px; accent-color:var(--blue)}
  .note-amber{font-size:11.5px; color:var(--amber); background:#fff7ec; border:1px solid #f3e2c6; border-radius:8px; padding:8px 10px; margin-bottom:10px}
  .ptab{width:100%; border-collapse:collapse}
  .ptab th{font-size:10.5px; color:var(--sub); font-weight:700; text-align:right; padding:6px 5px; border-bottom:1.5px solid var(--line); white-space:nowrap}
  .ptab th.l{text-align:left}
  .ptab td{padding:6px 5px; border-bottom:1px solid #f0f3f7; font-size:12px; text-align:right; white-space:nowrap}
  .ptab td.l{text-align:left; font-weight:600}
  .ni{width:56px; border:1px solid var(--line); border-radius:6px; padding:5px 6px; font-size:12px; text-align:right; font-family:inherit}
  .zsel{width:118px; border:1px solid var(--line); border-radius:6px; padding:4px 5px; font-size:11px; margin-top:3px; font-family:inherit; background:#fff}
  .bill{font-weight:800; color:var(--money); background:#eef4fc}
  #pv .setdoc h1{text-align:center; font-size:22px; letter-spacing:8px; margin:0 0 14px; font-weight:800}
  #pv .setdoc .meta{display:flex; justify-content:space-between; font-size:11px; color:#555; margin-bottom:10px}
  #pv .setdoc .parties{display:flex; gap:10px; margin-bottom:12px}
  #pv .setdoc .pcard{flex:1; border:1px solid #cfd8e6; border-radius:6px; padding:9px 11px}
  #pv .setdoc .pcard .h{font-size:10px; color:#1D5BA6; font-weight:700; margin-bottom:5px}
  #pv .setdoc .pcard .nm{font-size:13.5px; font-weight:800}
  #pv .setdoc .pcard .ln{font-size:11px; color:#444; margin-top:2px}
  #pv .setdoc .info{border:1px solid #cfd8e6; border-radius:6px; padding:9px 11px; margin-bottom:12px; font-size:11px; line-height:1.9}
  #pv .setdoc table{width:100%; border-collapse:collapse}
  #pv .setdoc th,#pv .setdoc td{border:1px solid #cfd8e6; padding:6px 8px; font-size:11px}
  #pv .setdoc th{background:#eaf2fc; color:#1D5BA6}
  #pv .setdoc tfoot td{font-weight:700; background:#f6f9fd}
  #pv .setdoc .stamp{margin-top:20px; text-align:right; font-size:12px}
  .monthbar{display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:14px}
  .monthbar button{border:1px solid var(--line); background:#fff; border-radius:8px; width:34px; height:34px; font-size:16px; cursor:pointer; color:var(--blue)}
  .monthbar .m{font-size:15px; font-weight:800}
  .row3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px}
  .catpill{display:inline-block; font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:9px; white-space:nowrap}
  .emodal{position:fixed; inset:0; background:rgba(15,25,40,.5); z-index:85; display:none; align-items:flex-end; justify-content:center}
  .emodal.on{display:flex}
  .esheet{background:#fff; width:100%; max-width:900px; border-radius:16px 16px 0 0; padding:18px 18px 26px; max-height:90vh; overflow:auto}
  .partybox{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:14px 0}
  @media(max-width:560px){ .partybox{grid-template-columns:1fr} }
  .party{border:1px solid var(--line); border-radius:10px; padding:11px 13px; background:#fafbfd}
  .party .pl{font-size:10.5px; font-weight:700; color:var(--sub); letter-spacing:.5px; margin-bottom:6px}
  .party .pc{font-size:13.5px; font-weight:800; color:var(--ink)}
  .party .pd{font-size:11.5px; color:var(--sub); margin-top:2px}
  .soon{text-align:center; color:var(--sub); padding:40px 16px}
  .soon .big{font-size:34px; margin-bottom:8px}
  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); background:#11233a; color:#fff; font-size:12.5px; padding:10px 18px; border-radius:22px; opacity:0; transition:.25s; z-index:50}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .splash{position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:99; flex-direction:column; gap:14px}
  .spin{width:30px; height:30px; border:3px solid #d3deec; border-top-color:var(--blue); border-radius:50%; animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .denied{text-align:center; padding:60px 24px; color:var(--sub)}
  .denied .big{font-size:40px; margin-bottom:12px} .denied h2{margin:0 0 6px; font-size:18px; color:var(--ink)}
  /* 포털 임베드(PC): 포털 왼쪽 메뉴가 내비를 제공하므로 자체 탭바 숨김 */
  @media (min-width:900px){ html.portal-embed .head{display:none} }
</style>
</head>
<body>
<div class="splash" id="splash"><div class="spin"></div><div class="small muted">불러오는 중...</div></div>

<div class="wrap" id="app" style="display:none">
  <div class="head">
    <div class="tabs">
      <div class="tab"    data-tab="home"   onclick="tab('home')">홈</div>
      <div class="tab on" data-tab="pjt"    onclick="tab('pjt')">프로젝트</div>
      <div class="tab"    data-tab="comp"   onclick="tab('comp')">거래처</div>
      <div class="tab"    data-tab="est"    onclick="tab('est')">견적</div>
      <div class="tab"    data-tab="settle" onclick="tab('settle')">정산</div>
      <div class="tab"    data-tab="acct"   onclick="tab('acct')">회계</div>
    </div>
  </div>
  <div class="body">
    <div id="v-home"   class="view"></div>
    <div id="v-pjt"    class="view on"></div>
    <div id="v-comp"   class="view"></div>
    <div id="v-est"    class="view"></div>
    <div id="v-settle" class="view"></div>
    <div id="v-acct"   class="view"></div>
  </div>
</div>

<div class="wrap" id="denied" style="display:none">
  <div class="denied"><div class="big">🔒</div><h2 id="denied-t">접근 권한이 없습니다</h2><div id="denied-s">포털에서 로그인 후 기획 메뉴로 접속해 주세요.</div></div>
</div>

<div class="toast" id="toast"></div>

<div id="pv" style="display:none; position:fixed; inset:0; background:rgba(15,25,40,.55); z-index:80; align-items:flex-start; justify-content:center; padding:18px; overflow:auto">
  <div style="background:#fff; border-radius:12px; max-width:720px; width:100%; margin:auto">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid var(--line)">
      <b style="font-size:14px">정산서 미리보기</b>
      <div style="display:flex; gap:8px"><button class="btn gray sm" onclick="pvClose()">닫기</button><button class="btn pri sm" onclick="pvPrint()">🖨 인쇄 · PDF 저장</button></div>
    </div>
    <div style="padding:18px; background:#f4f6fa"><div id="pv-body" style="background:#fff; padding:22px; border:1px solid var(--line); border-radius:6px"></div></div>
  </div>
</div>

<div class="emodal" id="emodal"><div class="esheet" id="em-body"></div></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc, onSnapshot, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:"AIzaSyCyQxBJ_ftfM0ImBXubmqD5gfzFR54iPmE", authDomain:"p4ph2-fab-506a7.firebaseapp.com",
  projectId:"p4ph2-fab-506a7", storageBucket:"p4ph2-fab-506a7.firebasestorage.app",
  messagingSenderId:"36946317914", appId:"1:36946317914:web:c6ad5f3a1b98130c99fe63"
};
const app=initializeApp(firebaseConfig); const auth=getAuth(app); const db=getFirestore(app);

const $=id=>document.getElementById(id);
const won=n=>(Math.round(n)||0).toLocaleString('ko-KR');
const num=v=>{ const n=parseFloat(String(v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?0:n; };
const itemAmt=it=> (it.amount!=null ? it.amount : (it.qty||0)*(it.price||0));
const estSupply=e=>(e.items||[]).reduce((s,i)=>s+itemAmt(i),0);
const estTotal =e=>{ const s=estSupply(e); return s+Math.round(s*0.1); };
function toast(t){ const e=$('toast'); e.textContent=t; e.classList.add('show'); clearTimeout(e._t); e._t=setTimeout(()=>e.classList.remove('show'),2300); }

let me=null;
let projects=[], estimates=[], settlements=[], companies=[], expenses=[];
const supplierList=()=>companies.filter(c=>c.roleSupplier);
const clientList=()=>companies.filter(c=>c.roleClient);
const compById=id=>companies.find(c=>c.id===id)||null;

const isActive=e=> e.status!=='void' && e.status!=='closed';
const pjtEstSum=pid=>estimates.filter(e=>e.pjtId===pid && isActive(e)).reduce((s,e)=>s+estSupply(e),0);
const pjtBilled=pid=>settlements.filter(s=>s.pjtId===pid&&s.docType==='invoice'&&s.status!=='void').reduce((a,s)=>a+(s.amount||0),0);
const pjtPaid =pid=>settlements.filter(s=>s.pjtId===pid&&s.docType==='payment'&&s.status!=='void').reduce((a,s)=>a+(s.amount||0),0);
// 완결된 청구 합계 (status==='done')
const pjtDone =pid=>settlements.filter(s=>s.pjtId===pid&&s.docType==='invoice'&&s.status==='done').reduce((a,s)=>a+(s.amount||0),0);
// 미수금 = 청구액 - 수금액 (완결된 청구서 = 수금으로 간주)
const pjtDue  =pid=>pjtBilled(pid)-pjtDone(pid);

const SEED_COMPANIES=[
  {id:'jhsol', company:'제이에이치솔루션', ceo:'김종화', bizno:'383-09-02847', tel:'010-6650-5804', email:'jh.kim@jhsol.kr', address:'', roleSupplier:true,  roleClient:false},
  {id:'jheng', company:'제이에이치이엔지', ceo:'김영희', bizno:'', tel:'010-3735-7891', email:'butterfly313@naver.com', address:'', roleSupplier:true, roleClient:true},
  {id:'darim', company:'다람이엔지', ceo:'현병찬', bizno:'', tel:'010-8363-1085', email:'skyhbc@naver.com', address:'', roleSupplier:false, roleClient:true},
  {id:'sj',    company:'에스제이',   ceo:'서민우', bizno:'', tel:'010-8456-1098', email:'seoyo20@naver.com', address:'', roleSupplier:false, roleClient:true},
];

// via=portal이면 Firebase Auth 대기 없이 즉시 앱 표시
const _viaPortal = new URLSearchParams(location.search).get('via') === 'portal';
if (_viaPortal) {
  // 1) 즉시 splash 제거
  $('splash').style.display = 'none';
  $('app').style.display = 'block';
  document.documentElement.classList.add('portal-embed');

  // 2) onAuthStateChanged — 인증 완료 후 onSnapshot 등록 + 렌더
  onAuthStateChanged(auth, async user => {
    if (!user) return;
    try {
      const ps = await getDoc(doc(db,'portal_users',user.uid));
      if (ps.exists()) me = { uid:user.uid, ...ps.data() };
    } catch(e) {}
    // onSnapshot 등록 (startApp 대신 직접)
    onSnapshot(collection(db,'gihoek_projects'), s=>{ projects=[]; s.forEach(d=>projects.push({id:d.id,...d.data()})); projects.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0)); if(curTab==='pjt'&&!detailId&&!pjtForm) renderPjt(); else if(curTab==='home') renderPlanHome(); });
    onSnapshot(collection(db,'gihoek_estimates'), s=>{ estimates=[]; s.forEach(d=>estimates.push({id:d.id,...d.data()})); estimates.sort((a,b)=>{ const dc=(b.date||'').localeCompare(a.date||''); if(dc) return dc; return (b.createdAt?.seconds||0)-(a.createdAt?.seconds||0); }); if(curTab==='pjt'&&detailId) pjtDetail(detailId); else if(curTab==='pjt'&&!pjtForm) renderPjt(); if(curTab==='est'&&!estDraft&&!viewEstId) renderEst(); else if(curTab==='home') renderPlanHome(); });
    onSnapshot(collection(db,'gihoek_settlements'), s=>{ settlements=[]; s.forEach(d=>settlements.push({id:d.id,...d.data()})); if(curTab==='pjt') { detailId?pjtDetail(detailId):renderPjt(); } else if(curTab==='settle'&&!settleDraft&&!viewSetId) renderSettle(); else if(curTab==='acct') renderAcct(); else if(curTab==='home') renderPlanHome(); });
    onSnapshot(collection(db,'gihoek_companies'), s=>{ companies=[]; s.forEach(d=>companies.push({id:d.id,...d.data()})); companies.sort((a,b)=>(a.company||'').localeCompare(b.company||'')); if(curTab==='comp'&&!compForm) renderComp(); });
    onSnapshot(collection(db,'gihoek_expenses'), s=>{ expenses=[]; s.forEach(d=>expenses.push({id:d.id,...d.data()})); if(curTab==='acct') renderAcct(); });
    const t0 = new URLSearchParams(location.search).get('tab');
    if (t0 && ['home','pjt','comp','est','settle','acct'].includes(t0)) tab(t0);
    else renderPlanHome();
  });

} else {
  // 직접 접근 시 기존 Firebase Auth 방식
  onAuthStateChanged(auth, async user=>{
    if(!user){ showDenied('로그인이 필요합니다','포털에서 로그인 후 기획 메뉴로 접속해 주세요.'); return; }
    try{
      const ps=await getDoc(doc(db,'portal_users',user.uid));
      if(ps.exists()){ const d=ps.data();
        if(d.status==='approved' && (d.admin===true || (d.perms&&d.perms.plan===true))){ me={uid:user.uid,...d}; await startApp(); return; } }
    }catch(e){}
    showDenied('접근 권한이 없습니다','기획 메뉴 접근 권한이 없습니다. 관리자에게 요청해 주세요.');
  });
}

async function startApp(){
  $('splash').style.display='none'; $('app').style.display='block';
  // 통합 거래처(gihoek_companies) 시드/이전: 비어있으면 기존 거래처·발행처에서 역할 합쳐 생성
  try{
    const compSnap=await getDocs(collection(db,'gihoek_companies'));
    if(compSnap.empty){
      const merged={}; // key: 회사명
      const put=(d,role)=>{ const k=(d.company||'').trim(); if(!k) return; if(!merged[k]) merged[k]={company:k,ceo:d.ceo||'',bizno:d.bizno||'',tel:d.tel||'',email:d.email||'',address:d.address||'',roleSupplier:false,roleClient:false}; merged[k][role]=true; ['ceo','bizno','tel','email','address'].forEach(f=>{ if(!merged[k][f]&&d[f]) merged[k][f]=d[f]; }); };
      try{ (await getDocs(collection(db,'gihoek_issuers'))).forEach(s=>put(s.data(),'roleSupplier')); }catch(e){}
      try{ (await getDocs(collection(db,'gihoek_clients'))).forEach(s=>put(s.data(),'roleClient')); }catch(e){}
      const list=Object.values(merged);
      if(list.length){ let i=0; for(const c of list){ await setDoc(doc(db,'gihoek_companies','co_'+Date.now()+'_'+(i++)),c); } }
      else { for(const x of SEED_COMPANIES){ const {id,...r}=x; await setDoc(doc(db,'gihoek_companies',id),r); } }
    }
  }catch(e){}
  onSnapshot(collection(db,'gihoek_projects'), s=>{ projects=[]; s.forEach(d=>projects.push({id:d.id,...d.data()})); projects.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0)); if(curTab==='pjt'&&!detailId&&!pjtForm) renderPjt(); else if(curTab==='home') renderPlanHome(); });
  onSnapshot(collection(db,'gihoek_estimates'), s=>{ estimates=[]; s.forEach(d=>estimates.push({id:d.id,...d.data()})); estimates.sort((a,b)=>{ const dc=(b.date||'').localeCompare(a.date||''); if(dc) return dc; return (b.createdAt?.seconds||0)-(a.createdAt?.seconds||0); }); if(curTab==='pjt'&&detailId) pjtDetail(detailId); else if(curTab==='pjt'&&!pjtForm) renderPjt(); if(curTab==='est'&&!estDraft&&!viewEstId) renderEst(); else if(curTab==='home') renderPlanHome(); });
  onSnapshot(collection(db,'gihoek_settlements'), s=>{ settlements=[]; s.forEach(d=>settlements.push({id:d.id,...d.data()})); if(curTab==='pjt') { detailId?pjtDetail(detailId):renderPjt(); } else if(curTab==='settle'&&!settleDraft&&!viewSetId) renderSettle(); else if(curTab==='acct') renderAcct(); else if(curTab==='home') renderPlanHome(); });
  onSnapshot(collection(db,'gihoek_companies'), s=>{ companies=[]; s.forEach(d=>companies.push({id:d.id,...d.data()})); companies.sort((a,b)=>(a.company||'').localeCompare(b.company||'')); if(curTab==='comp'&&!compForm) renderComp(); });
  onSnapshot(collection(db,'gihoek_expenses'), s=>{ expenses=[]; s.forEach(d=>expenses.push({id:d.id,...d.data()})); if(curTab==='acct') renderAcct(); });
  const params=new URLSearchParams(location.search);
  if(params.get('via')==='portal') document.documentElement.classList.add('portal-embed');
  const t0=params.get('tab');
  if(t0 && ['home','pjt','comp','est','settle','acct'].includes(t0)) tab(t0); else renderPlanHome();
}

  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on')); $('v-'+t).classList.add('on');

window.savePjt=async function(id){ const code=$('pf-code').value.trim(); if(!code){ toast('PJT 코드를 입력하세요.'); return; }

  try{ if(id){ await setDoc(doc(db,'gihoek_projects',id),data,{merge:true}); toast('수정했습니다.'); pjtDetail(id); }
    else{ const nid='pjt_'+Date.now(); await setDoc(doc(db,'gihoek_projects',nid),{...data, createdAt:serverTimestamp()}); toast('프로젝트를 등록했습니다.'); renderPjt(); } }

window.delPjt=async function(id){ if(!confirm('이 프로젝트를 삭제할까요? (견적·정산 데이터는 남습니다)')) return;

function clientOpt(sel){ const list=clientList(); return `<option value="">— 선택 —</option>`+list.map(c=>`<option value="${c.id}" ${c.id===sel?'selected':''}>${c.company}${c.ceo?' ('+c.ceo+')':''}</option>`).join(''); }

// 전화번호 포맷 공통 함수
function fmtTel(v){
  var d=v.replace(/\D/g,'');
  if(d.length<=3) return d;
  if(d.length<=6) return d.slice(0,3)+'-'+d.slice(3);
  if(d.length<=10) return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);
  return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7,11);
}
function fmtTelBlur(el){
  var d=el.value.replace(/\D/g,'');
  if(d.length===8 && d[0]!=='0') d='010'+d;
  el.value=fmtTel(d);
}
// 업체 선택 후 담당자 드롭다운 렌더
function contactOptHtml(compId, selName){
  const c = compById(compId);
  const cts = c?.contacts||[];
  if(!cts.length) return '<option value="">— 담당자 없음 (거래처 탭에서 추가 가능) —</option>';
  return `<option value="">— 담당자 선택 (선택사항) —</option>`+cts.map(ct=>`<option value="${ct.name}" ${ct.name===selName?'selected':''}>${ct.name}${ct.tel?' · '+ct.tel:''}${ct.email?' · '+ct.email:''}</option>`).join('');
}
function contactDropdown(compId, selName, onchangeJs){
  if(!compId) return '';
  const c = compById(compId);
  const cts = c?.contacts||[];
  const dis = cts.length ? '' : ' disabled';
  return `<div class="field" style="margin-top:-4px"><label style="font-size:12px">담당자</label><select class="sel" style="font-size:13px"${dis} onchange="${onchangeJs}">${contactOptHtml(compId,selName)}</select></div>`;
}

window.setDraft=function(k,v){ if(estDraft) estDraft[k]=v; };
window.drawEstForm=function(){ drawEstForm(); };
window.drawSettleForm=function(){ drawSettleForm(); };
window.setItem=function(i,k,v){ if(estDraft&&estDraft.items[i]) estDraft.items[i][k]=v; };
function drawRows(){
  $('est-rows').innerHTML=estDraft.items.map((it,i)=>`<tr>
    <td class="muted small">${i+1}</td>
    <td><input class="ti" value="${(it.name||'').replace(/"/g,'&quot;')}" placeholder="품명" oninput="setItem(${i},'name',this.value)"></td>
    <td><input class="ti" value="${(it.spec||'').replace(/"/g,'&quot;')}" placeholder="규격" oninput="setItem(${i},'spec',this.value)"></td>
    <td><input class="ti num" id="q-${i}" type="number" inputmode="numeric" value="${it.qty}" oninput="onQty(${i},this.value)"></td>
    <td><input class="ti num" id="p-${i}" type="number" inputmode="numeric" value="${it.price}" oninput="onPrice(${i},this.value)"></td>
    <td><input class="ti num" id="a-${i}" type="number" inputmode="numeric" value="${Math.round(itemAmt(it))}" oninput="onAmt(${i},this.value)"></td>
    <td><button class="del" onclick="delRow(${i})">×</button></td></tr>`).join('');
  recalcTotals();
}
function recalcTotals(){
  const sup=estDraft.items.reduce((s,it)=>s+itemAmt(it),0); const vat=Math.round(sup*0.1);
  if($('t-supply')) $('t-supply').textContent=won(sup)+' 원';
  if($('t-vat')) $('t-vat').textContent=won(vat)+' 원';
  if($('t-total')) $('t-total').value=Math.round(sup+vat);
}
window.onQty=function(i,v){ const it=estDraft.items[i]; it.qty=num(v); it.amount=Math.round(it.qty*it.price); const a=$('a-'+i); if(a)a.value=it.amount; recalcTotals(); };
window.onPrice=function(i,v){ const it=estDraft.items[i]; it.price=num(v); it.amount=Math.round(it.qty*it.price); const a=$('a-'+i); if(a)a.value=it.amount; recalcTotals(); };
window.onAmt=function(i,v){ const it=estDraft.items[i]; it.amount=num(v); it.price=it.qty>0?Math.round(it.amount/it.qty):it.amount; const p=$('p-'+i); if(p)p.value=it.price; recalcTotals(); };
window.onTotalEdit=function(v){ const X=num(v); const items=estDraft.items; if(!items.length) return;
  const targetSupply=Math.round(X/1.1);
  const others=items.slice(0,-1).reduce((s,it)=>s+itemAmt(it),0);
  const last=items[items.length-1];
  last.amount=targetSupply-others; last.price=last.qty>0?Math.round(last.amount/last.qty):last.amount;
  const li=items.length-1; if($('a-'+li))$('a-'+li).value=Math.round(last.amount); if($('p-'+li))$('p-'+li).value=last.price;
  recalcTotals(); toast('마지막 품목으로 차액을 반영했습니다.'); };
window.addRow=function(){ estDraft.items.push({name:'',spec:'',qty:1,price:0,amount:0}); drawRows(); };
window.delRow=function(i){ estDraft.items.splice(i,1); if(!estDraft.items.length) estDraft.items.push({name:'',spec:'',qty:1,price:0,amount:0}); drawRows(); };

// ctSnap: 담당자 스냅샷 헬퍼 (saveEst / saveSettle 공통)
function ctSnap(cid,name){ const c=compById(cid); const ct=(c?.contacts||[]).find(x=>x.name===name)||{}; return {contact:name||'',contactTel:ct.tel||'',contactEmail:ct.email||''}; }

window.saveEst=async function(){ const d=estDraft;
  if(!d.title.trim()){ toast('견적 제목을 입력하세요.'); return; }
  const items=d.items.filter(i=>(i.name||'').trim()).map(i=>({name:i.name.trim(),spec:i.spec||'',qty:i.qty||0,price:i.price||0,amount:Math.round(itemAmt(i))}));
  if(!items.length){ toast('품목을 1개 이상 입력하세요.'); return; }
  const cl=compById(d.clientId); const iss=compById(d.issuerId);
  const authorDept=(d.authorDept||'').trim(), authorName=(d.authorName||'').trim(), authorEmail=(d.authorEmail||'').trim(), authorUid=(me&&me.uid)||'';
  let no, rev, baseNo;
  if(d.editId){
    baseNo=d.baseNo;
    const group=estimates.filter(e=>(e.baseNo||e.no)===baseNo);
    const maxRev=group.reduce((m,e)=>Math.max(m,e.rev||1),1);
    rev=maxRev+1; no=baseNo+'-r'+rev;
  } else {
    const yr=d.date.slice(0,4);
    const bases=new Set(estimates.filter(e=>(e.no||'').startsWith('EST-'+yr)).map(e=>e.baseNo||e.no));
    no='EST-'+yr+'-'+String(bases.size+1).padStart(3,'0'); rev=1; baseNo=no;
  }
  const id='est_'+Date.now();
  $('est-save').disabled=true;
  const payload={ pjtId:d.pjtId, no, baseNo, rev, status:'active', date:d.date, title:d.title.trim(), items, authorDept, authorName, authorEmail, authorUid,
      clientId:d.clientId||'', client: cl?{company:cl.company,ceo:cl.ceo||'',bizno:cl.bizno||'',tel:cl.tel||'',email:cl.email||'',address:cl.address||'',...ctSnap(d.clientId,d.clientContact)}:null,
      issuerId:d.issuerId||'', issuer: iss?{company:iss.company,ceo:iss.ceo||'',bizno:iss.bizno||'',tel:iss.tel||'',email:iss.email||'',address:iss.address||'',...ctSnap(d.issuerId,d.issuerContact)}:null,
      clientContact:d.clientContact||'', issuerContact:d.issuerContact||'',
      createdAt:serverTimestamp() };
  try{
    await setDoc(doc(db,'gihoek_estimates',id), payload);
    if(d.editId){ await setDoc(doc(db,'gihoek_estimates',d.editId), {status:'void', voidedAt:serverTimestamp(), replacedBy:no}, {merge:true}); }
    toast(d.editId?'개정본을 발행했습니다. (원본 폐기)':'견적을 저장했습니다.'); renderEst(); }
  catch(e){ $('est-save').disabled=false; toast('저장 실패: '+(e.code||e.message)); } };

function getLinkPjt(p){
  if(!p) return 'p4ph2';
  if(p.linkPjt) return p.linkPjt;
  // 구버전 호환
  if(p.progProfile==='p4ph4' || p.mandayCol==='ph4_manday') return 'p4ph4';
  if(p.mandayCol==='' && !p.progProfile) return 'none';
  return 'p4ph2';
}

  var pjtId = (typeof settleDraft!=='undefined' && settleDraft) ? settleDraft.pjtId : null;
  var prof = projects.find(p=>p.id===pjtId);

  return PROGRESS_PROFILES[key] || PROGRESS_PROFILES['p4ph2'];
}

  var prof = projects.find(p=>p.id===pjtId);

function compactRanges(arr){ if(!arr||!arr.length) return '-';
  const parsed=arr.map(s=>{const m=String(s).match(/^(.*?)(\d+)$/); return m?{stem:m[1],n:parseInt(m[2]),raw:s}:{stem:String(s),n:null,raw:String(s)};});
  parsed.sort((a,b)=> a.stem===b.stem ? ((a.n||0)-(b.n||0)) : a.stem.localeCompare(b.stem));
  const out=[]; let i=0;
  while(i<parsed.length){ const p=parsed[i]; if(p.n==null){ out.push(p.raw); i++; continue; }
    let j=i; while(j+1<parsed.length && parsed[j+1].stem===p.stem && parsed[j+1].n===parsed[j].n+1) j++;
    out.push(j>i? parsed[i].raw+'~'+parsed[j].raw : p.raw); i=j+1; }
  return out.join(', ');
}

  return `<div class="card"><div class="sec-h"><h2>견적 연동 (공정 자동)</h2><button class="btn line sm" onclick="fetchProgress()">⟳ 공정 데이터 불러오기</button></div>

function setEstBlock(id){ const d=settleDraft; const e=estimates.find(x=>x.id===id); if(!e) return ''; const r=calcSetRow(id);

function calcSetRow(id){ const d=settleDraft; const e=estimates.find(x=>x.id===id); const sup=estSupply(e);
  const z=getZONES().find(z=>z.id===d.estZone[id]); const qty=z?z.total:1;

  const banipAmt=Math.round(sup*0.8*(pg.banip/qty));

  const depAmt=d.deposit[id]?Math.round(sup*0.1):0;
  const cum=banipAmt+installAmt+depAmt;
  const prior=priorByEst(id);
  const auto=Math.max(0,cum-prior);
  const thisBill=(d.billOverride[id]!=null)?d.billOverride[id]:auto;
  return {banip:pg.banip, install:pg.install, qty, cum, prior, thisBill};
}
function priorByEst(estId){ return settlements.filter(s=>setActive(s)&&s.docType==='invoice'&&s.perEst&&s.perEst[estId]).reduce((a,s)=>a+s.perEst[estId],0); }
window.toggleSetEst=function(id,guessZone){ const d=settleDraft; const i=d.estIds.indexOf(id);

window.fetchProgress=async function(){ const d=settleDraft; if(!d.estIds.length){ toast('견적을 먼저 선택하세요.'); return; }
  toast('공정 데이터 불러오는 중...');
  try{
    const [y,m]=d.baseMonth.split('-').map(Number); const lastDay=new Date(y,m,0).getDate();
    const zonesNeeded=[...new Set(d.estIds.map(id=>d.estZone[id]))];
    const cum={}; zonesNeeded.forEach(z=>cum[z]={});
    const tasks=[];
    const readDay=dk=>tasks.push((async()=>{ try{ const snap=await getDocs(collection(db,getProgProfile().progCol+dk)); snap.forEach(zd=>{ const zid=zd.id; if(cum[zid]){ const ch=zd.data().checks||{}; Object.keys(ch).forEach(k=>{ if(ch[k]) cum[zid][k]=true; }); } }); }catch(e){} })());
    for(let day=1; day<=lastDay; day++) readDay(y+'-'+String(m).padStart(2,'0')+'-'+String(day).padStart(2,'0'));
    const start=new Date(2026,4,1); const endPrev=new Date(y,m-1,1);
    for(let dt=new Date(start); dt<endPrev; dt.setDate(dt.getDate()+1)) readDay(dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'));
    await Promise.all(tasks);
    // 워크스페이스 코드 상수(Firestore 미저장) 과거 데이터 병합 — 기준월 말일까지
    const endKey=y+'-'+String(m).padStart(2,'0')+'-'+String(lastDay).padStart(2,'0');
    // PAST 고정데이터는 FAB(p4ph2) 프로파일에서만 합산
    if(getProgProfile().progCol==='progress_checks_'){ Object.keys(PAST_PROGRESS_DAILY).forEach(dk=>{ if(dk<=endKey){ Object.keys(PAST_PROGRESS_DAILY[dk]).forEach(zid=>{ if(cum[zid]){ const ch=PAST_PROGRESS_DAILY[dk][zid]; Object.keys(ch).forEach(k=>{ if(ch[k]) cum[zid][k]=true; }); } }); } }); }
    d.estIds.forEach(id=>{ const zid=d.estZone[id]; const z=getZONES().find(z=>z.id===zid); const ch=cum[zid]||{};
      let banip=0, install=0; const banipEqs=[], installEqs=[];
      if(z){ z.eqs.forEach(eq=>{ if(ch[eq+'_반입']){ banip++; banipEqs.push(eq); } if(getProgProfile().installCols.every(it=>ch[eq+'_'+it])){ install++; installEqs.push(eq); } }); }
      d.prog[id]={banip, install}; d.eqs[id]={banipEqs, installEqs}; d.billOverride[id]=null; });
    renderSetTot(); refreshProgRows(); toast('반입·설치 장비번호를 반영했습니다.');
  }catch(e){ toast('불러오기 실패: '+(e.code||e.message)); }
};

    ${d.mandayAuto!=null?`<div class="small muted" style="margin-top:6px">자동 집계: ${d.mandayAuto} 공수</div>`:''}</div>`;
}
function priorManday(){ return settlements.filter(s=>setActive(s)&&s.docType==='payment'&&s.method==='manday').reduce((a,s)=>a+(s.mandayUsed||0),0); }
window.setMd=function(v){ settleDraft.mandayInput=num(v); drawSettleForm(); };
window.setMandayRate=function(v){ settleDraft.mandayRate=Math.round(num(v))||TEAM_RATE; drawSettleForm(); };
window.fetchManday=async function(){ const d=settleDraft; toast('공수 불러오는 중...');
  try{ const col=getMandayCol(); const [y,m]=d.baseMonth.split('-').map(Number); const lastDay=new Date(y,m,0).getDate(); let sum=0; const tasks=[];
    for(let day=1; day<=lastDay; day++){ const dk=y+'-'+String(m).padStart(2,'0')+'-'+String(day).padStart(2,'0');
      tasks.push((async()=>{ try{ const sn=await getDoc(doc(db,col,dk)); if(sn.exists()){ const md=sn.data().md||{}; Object.values(md).forEach(v=>sum+=Number(v)||0); } }catch(e){} })()); }
    await Promise.all(tasks); d.mandayAuto=Math.round(sum*10)/10; d.mandayInput=d.mandayAuto; drawSettleForm(); toast('공수 '+d.mandayAuto+' 반영했습니다.');
  }catch(e){ toast('불러오기 실패: '+(e.code||e.message)); }
};

/* 직접 입력 */
function setManualCard(){ return `<div class="card"><div class="sec-h"><h2>직접 입력</h2></div>
  <div class="scroll"><table class="items"><colgroup><col class="c-no"><col><col><col class="c-qty"><col class="c-price"><col class="c-amt"><col class="c-del"></colgroup>

  <button class="btn gray sm" style="margin-top:10px" onclick="addSm()">+ 품목 추가</button></div>`; }
function drawSmRows(){ $('sm-rows').innerHTML=settleDraft.manualItems.map((it,i)=>`<tr>
  <td class="muted small">${i+1}</td>
  <td><input class="ti" value="${(it.name||'').replace(/"/g,'&quot;')}" placeholder="품명" oninput="smSet(${i},'name',this.value)"></td>

  <td><input class="ti num" id="sq-${i}" type="number" value="${it.qty}" oninput="smQty(${i},this.value)"></td>
  <td><input class="ti num" id="sp-${i}" type="number" value="${it.price}" oninput="smPrice(${i},this.value)"></td>
  <td><input class="ti num" id="sa-${i}" type="number" value="${Math.round(itemAmt(it))}" oninput="smAmt(${i},this.value)"></td>

window.smSet=function(i,k,v){ settleDraft.manualItems[i][k]=v; };
window.smQty=function(i,v){ const it=settleDraft.manualItems[i]; it.qty=num(v); it.amount=Math.round(it.qty*it.price); if($('sa-'+i))$('sa-'+i).value=it.amount; renderSetTot(); };
window.smPrice=function(i,v){ const it=settleDraft.manualItems[i]; it.price=num(v); it.amount=Math.round(it.qty*it.price); if($('sa-'+i))$('sa-'+i).value=it.amount; renderSetTot(); };
window.smAmt=function(i,v){ const it=settleDraft.manualItems[i]; it.amount=num(v); it.price=it.qty>0?Math.round(it.amount/it.qty):it.amount; if($('sp-'+i))$('sp-'+i).value=it.price; renderSetTot(); };
window.addSm=function(){ settleDraft.manualItems.push({name:'',spec:'',qty:1,price:0,amount:0}); drawSmRows(); };
window.delSm=function(i){ settleDraft.manualItems.splice(i,1); if(!settleDraft.manualItems.length) settleDraft.manualItems.push({name:'',spec:'',qty:1,price:0,amount:0}); drawSmRows(); };

function setSupply(){ const d=settleDraft;
  if(d.method==='manual') return d.manualItems.reduce((s,it)=>s+itemAmt(it),0);
  if(d.method==='manday'){ const md=d.mandayInput!=null?d.mandayInput:(d.mandayAuto||0); const rate=d.mandayRate!=null?d.mandayRate:TEAM_RATE; return Math.round(md*rate); }
  if(d.method==='qty') return d.estIds.reduce((s,id)=>{ const e=estimates.find(x=>x.id===id); if(!e) return s; return s+(e.items||[]).reduce((a,it,idx)=>a+qAmt(id,idx,it),0); },0);
  return d.estIds.reduce((s,id)=>s+calcSetRow(id).thisBill,0);
}
function renderSetTot(){ const d=settleDraft; const sup=setSupply(); const vat=Math.round(sup*0.1);
  const label=d.docType==='invoice'?'청구':'지급';
  if($('set-tot')) $('set-tot').innerHTML=`<div class="totbox" style="margin-top:0;border-top:none;padding-top:0">
    <div class="totrow"><span class="muted">금번 ${label} 공급가액</span><span>${won(sup)} 원</span></div>
    <div class="totrow"><span class="muted">부가세 (10%)</span><span>${won(vat)} 원</span></div>
    <div class="totrow big"><span>금번 ${label}금액 합계</span><span>${won(sup+vat)} 원</span></div></div>`;
  if(d.method==='manual'&&$('sm-rows')&&!$('sm-rows').children.length) drawSmRows();
}

function settleLines(){ const d=settleDraft;
  if(d.method==='manual') return d.manualItems.filter(i=>(i.name||'').trim()).map(i=>({name:i.name.trim(),spec:i.spec||'',qty:i.qty||0,price:i.price||0,amount:Math.round(itemAmt(i))}));
  if(d.method==='manday'){ const md=d.mandayInput!=null?d.mandayInput:(d.mandayAuto||0); const rate=d.mandayRate!=null?d.mandayRate:TEAM_RATE; return [{name:d.baseMonth+' 기술인력 투입',spec:'공수 '+md,qty:md,price:rate,amount:Math.round(md*rate)}]; }
  if(d.method==='qty'){ const lines=[]; d.estIds.forEach(id=>{ const e=estimates.find(x=>x.id===id); if(!e) return; (e.items||[]).forEach((it,idx)=>{ const q=qVal(id,idx); const amt=qAmt(id,idx,it); if(q>0||amt>0) lines.push({name:it.name,spec:(it.spec||'')+' · 수량 '+q,qty:q,price:it.price||0,amount:amt}); }); }); return lines; }
  return d.estIds.map(id=>{ const e=estimates.find(x=>x.id===id); const r=calcSetRow(id); const z=getZONES().find(z=>z.id===d.estZone[id]); const eqd=d.eqs[id]||{banipEqs:[],installEqs:[]};
    const bN=eqd.banipEqs&&eqd.banipEqs.length?' ('+compactRanges(eqd.banipEqs)+')':''; const iN=eqd.installEqs&&eqd.installEqs.length?' ('+compactRanges(eqd.installEqs)+')':'';
    return {name:e.title,spec:(z?z.name:'')+' 반입 '+r.banip+'/'+r.qty+bN+' · 설치 '+r.install+'/'+r.qty+iN,qty:1,price:r.thisBill,amount:r.thisBill}; });
}

window.publishSettle=async function(){ const d=settleDraft; const sup=setSupply();
  if(sup<=0){ toast('정산 금액이 없습니다.'); return; }
  if(!d.recipientId){ if(!confirm('수신자(거래처)가 선택되지 않았습니다. 그래도 발행할까요?')) return; }
  const yymm=d.issueDate.slice(2,4)+d.issueDate.slice(5,7);
  const seq=settlements.filter(s=>s.docType===d.docType && (s.no||'').startsWith(yymm)).length+1;
  const no=yymm+String(seq).padStart(3,'0'); const id='set_'+Date.now();
  const snap=c=>c?{company:c.company,ceo:c.ceo||'',bizno:c.bizno||'',tel:c.tel||'',email:c.email||'',address:c.address||''}:null;
  const perEst={}; const perItem={}; let mandayUsed=0;
  if(d.method==='progress') d.estIds.forEach(eid=>perEst[eid]=calcSetRow(eid).thisBill);
  if(d.method==='qty') d.estIds.forEach(eid=>{ const e=estimates.find(x=>x.id===eid); if(!e) return; perItem[eid]={}; let es=0; (e.items||[]).forEach((it,idx)=>{ const q=qVal(eid,idx); const amt=qAmt(eid,idx,it); if(q>0||amt>0){ perItem[eid][idx]={qty:q,amount:amt}; es+=amt; } }); perEst[eid]=es; });
  if(d.method==='manday') mandayUsed=d.mandayInput!=null?d.mandayInput:(d.mandayAuto||0);
  const vat=Math.round(sup*0.1);
  $('set-save').disabled=true;
  try{ await setDoc(doc(db,'gihoek_settlements',id),{ pjtId:d.pjtId, no, docType:d.docType, method:d.method,
      baseMonth:d.baseMonth, issueDate:d.issueDate, payDate:d.payDate||'',
      senderId:d.senderId||'', sender:{...snap(compById(d.senderId)), ...ctSnap(d.senderId,d.senderContact)}, recipientId:d.recipientId||'', recipient:{...snap(compById(d.recipientId)), ...ctSnap(d.recipientId,d.recipientContact)},
      estIds:d.estIds||[], perEst, perItem, mandayUsed, lines:settleLines(),
      supply:sup, vat, total:sup+vat, amount:sup, status:'active',
      author:(me&&me.name)||'', authorUid:(me&&me.uid)||'', createdAt:serverTimestamp() });
    toast((d.docType==='invoice'?'대금청구서':'지급예정서')+' '+no+' 발행'); renderSettle(); }
  catch(e){ $('set-save').disabled=false; toast('발행 실패: '+(e.code||e.message)); }
};

window.doneSettle=async function(id){

window.voidSettle=async function(id){ if(!confirm('이 정산서를 폐기할까요? 집계에서 제외됩니다.')) return;

const DIRECT_CATS=['급여','용역비','공구·자재비'];
const accIsDirect=c=>DIRECT_CATS.includes(c);
const accCatStyle=k=>{ const c=ACC_CATS.find(c=>c.k===k)||ACC_CATS[5]; return `background:${c.bg};color:${c.fg}`; };
let curAccMonth=new Date().toISOString().slice(0,7), accSub='pnl';
const accMonthExp=()=>expenses.filter(e=>(e.date||'').slice(0,7)===curAccMonth).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
const monthBill=(pid,month)=>settlements.filter(s=>s.pjtId===pid&&s.docType==='invoice'&&s.status==='done'&&s.baseMonth===month).reduce((a,s)=>a+(s.amount||0),0);

function renderAcct(){
  $('v-acct').innerHTML=`<button onclick="tab('home')" style="background:#F0F4F9;border:1px solid #DDE4EF;border-radius:8px;padding:5px 12px;color:#5C6F8A;font-size:12px;cursor:pointer;font-weight:600;">🏠 기획 홈</button>
  <div class="sec-h"><h2>회계</h2></div>
    <div class="monthbar"><button onclick="accShiftMonth(-1)">‹</button><span class="m">${curAccMonth.replace('-','년 ')}월</span><button onclick="accShiftMonth(1)">›</button></div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="seg-btn ${accSub==='pnl'?'on':''}" onclick="accTab('pnl')">영업이익 현황</button>
      <button class="seg-btn ${accSub==='ledger'?'on':''}" onclick="accTab('ledger')">비용 장부</button></div>
    <div id="acc-body"></div>`;
  accSub==='ledger'?renderAccLedger():renderAccPnl();
}
window.renderAcct=renderAcct;
window.accTab=function(t){ accSub=t; renderAcct(); };
window.accShiftMonth=function(d){ const [y,m]=curAccMonth.split('-').map(Number); const nm=new Date(y,m-1+d,1); curAccMonth=nm.getFullYear()+'-'+String(nm.getMonth()+1).padStart(2,'0'); renderAcct(); };

function renderAccPnl(){
  const list=accMonthExp();
  const byPjt={}; projects.forEach(p=>byPjt[p.id]={dir:0,ind:0}); let comDir=0,comInd=0;
  list.forEach(e=>{ const t=byPjt[e.pjt]; if(e.pjt&&t){ accIsDirect(e.cat)?t.dir+=e.total:t.ind+=e.total; } else { accIsDirect(e.cat)?comDir+=e.total:comInd+=e.total; } });
  const totBill=projects.reduce((a,p)=>a+monthBill(p.id,curAccMonth),0);
  const totDir=list.filter(e=>accIsDirect(e.cat)).reduce((a,e)=>a+e.total,0);
  const totInd=list.filter(e=>!accIsDirect(e.cat)).reduce((a,e)=>a+e.total,0);
  const op=totBill-totDir-totInd; const opRate=totBill>0?Math.round(op/totBill*1000)/10:0;
  $('acc-body').innerHTML=`
    <div class="sumgrid">
      <div class="sumcell"><div class="l">매출 (완결 청구)</div><div class="v">${won(totBill)}</div></div>
      <div class="sumcell"><div class="l">직접비</div><div class="v neg">${won(totDir)}</div></div>
      <div class="sumcell"><div class="l">간접비</div><div class="v neg">${won(totInd)}</div></div>
      <div class="sumcell"><div class="l">영업이익 <span style="color:var(--blue)">(${opRate}%)</span></div><div class="v ${op>=0?'pos':'neg'}">${op>=0?'+':''}${won(op)}</div></div></div>
    <div class="small muted" style="margin:8px 2px 0">영업이익 = 매출(기준월 완결 청구) − 직접비 − 간접비. 직접비=급여·용역비·공구자재비 / 간접비=임대료·식대·세금·차량유지비·유류비·사무용품·기타. 정산 지급(지급예정서)은 손익에 자동 반영되지 않으며, 회계 장부에 실제 지출(용역비 등)로 입력·확인 후 비용으로 반영됩니다.</div>
    <div class="sec-h" style="margin-top:20px"><h2>PJT별 영업이익</h2></div>
    <div class="card" style="padding:12px"><div class="scroll"><table class="ptab">
      <thead><tr><th class="l">PJT</th><th>매출</th><th>직접비</th><th>간접비</th><th>영업이익</th><th>이익률</th></tr></thead>
      <tbody>${projects.length?projects.map(p=>{ const b=monthBill(p.id,curAccMonth),di=byPjt[p.id].dir,ind=byPjt[p.id].ind,o=b-di-ind,r=b>0?Math.round(o/b*1000)/10:0;
        return `<tr><td class="l">${p.code}</td><td>${won(b)}</td><td class="neg" style="color:var(--warn)">${won(di)}</td><td style="color:var(--warn)">${won(ind)}</td><td style="font-weight:700;color:${o>=0?'var(--ok)':'var(--warn)'}">${o>=0?'+':''}${won(o)}</td><td>${b>0?r+'%':'-'}</td></tr>`; }).join(''):'<tr><td colspan="6" class="center muted" style="padding:16px">프로젝트 없음</td></tr>'}
      ${(comDir+comInd)>0?`<tr style="background:#f6f9fd"><td class="l">공통비용 (미지정)</td><td>-</td><td style="color:var(--warn)">${won(comDir)}</td><td style="color:var(--warn)">${won(comInd)}</td><td>-</td><td>-</td></tr>`:''}</tbody></table></div>
      <div class="small muted" style="margin-top:8px">공통비용(PJT 미지정)은 전체 영업이익엔 반영, 개별 PJT엔 배분 안 함. · 폐기 건 제외, 공급가 기준.</div></div>`;
}

function renderAccLedger(){
  const list=accMonthExp();
  const tot=list.reduce((a,e)=>a+e.total,0), sup=list.reduce((a,e)=>a+e.supply,0), vat=list.reduce((a,e)=>a+e.vat,0);
  const byCat={}; ACC_CATS.forEach(c=>byCat[c.k]={cnt:0,sup:0,vat:0,total:0});
  list.forEach(e=>{ const b=byCat[e.cat]||byCat['기타']; b.cnt++; b.sup+=e.supply; b.vat+=e.vat; b.total+=e.total; });
  $('acc-body').innerHTML=`
    <div class="sumgrid">
      <div class="sumcell"><div class="l">총 지출</div><div class="v">${won(tot)}</div></div>
      <div class="sumcell"><div class="l">건수</div><div class="v">${list.length}</div></div>
      <div class="sumcell"><div class="l">공급가 합</div><div class="v">${won(sup)}</div></div>
      <div class="sumcell"><div class="l">부가세 합</div><div class="v">${won(vat)}</div></div></div>
    <div class="card" style="margin-top:14px;padding:12px"><div class="sec-h"><h2>카테고리별 집계</h2><button class="btn pri sm" onclick="accOpenForm()">+ 비용 입력</button></div>
      <div class="scroll"><table class="ptab"><thead><tr><th class="l">카테고리</th><th>구분</th><th>건수</th><th>공급가</th><th>부가세</th><th>합계</th></tr></thead>
        <tbody>${ACC_CATS.filter(c=>byCat[c.k].cnt>0).map(c=>{ const b=byCat[c.k]; return `<tr><td class="l"><span class="catpill" style="${accCatStyle(c.k)}">${c.k}</span></td><td class="small ${accIsDirect(c.k)?'':'muted'}">${accIsDirect(c.k)?'직접비':'간접비'}</td><td>${b.cnt}</td><td>${won(b.sup)}</td><td>${won(b.vat)}</td><td style="font-weight:700;color:var(--money)">${won(b.total)}</td></tr>`; }).join('')||'<tr><td colspan="6" class="center muted" style="padding:16px">이 달 비용이 없습니다.</td></tr>'}</tbody>
        ${list.length?`<tfoot><tr style="background:#f6f9fd;font-weight:700"><td class="l">합계</td><td></td><td>${list.length}</td><td>${won(sup)}</td><td>${won(vat)}</td><td style="color:var(--money)">${won(tot)}</td></tr></tfoot>`:''}</table></div></div>
    <div class="card" style="padding:12px"><div class="sec-h"><h2>상세 내역</h2></div>
      ${list.length? list.map(e=>`<div class="litem" style="cursor:pointer" onclick="accOpenForm('${e.id}')">
        <div class="d" style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700"><span class="catpill" style="${accCatStyle(e.cat)}">${e.cat}</span> &nbsp;${e.vendor||'-'}</div>
          <div class="small muted" style="margin-top:2px">${e.date} · ${e.pay}${e.pjt?' · '+(projects.find(p=>p.id===e.pjt)?.code||''):' · 공통'}${e.note?' · '+e.note:''}</div></div>
        <div class="amt" style="font-weight:800;color:var(--money);white-space:nowrap;text-align:right">${won(e.total)}<div class="small muted" style="font-weight:400">VAT ${won(e.vat)}</div></div></div>`).join('')
        :'<div class="empty">이 달 비용이 없습니다. “비용 입력”으로 추가하세요.</div>'}</div>
    <div class="note-amber">실제 운영: 영수증·카드내역·계좌 거래내역·주문내역 파일을 춘식이에게 주시면 직접비/간접비로 분류해 이 장부에 채워 넣습니다. 앱에서는 직접 입력·수정·조회를 합니다.</div>`;
}

window.accOpenForm=function(id){ const e=id?expenses.find(x=>x.id===id):null;
  $('em-body').innerHTML=`<div class="sec-h"><h2>${e?'비용 수정':'비용 입력'}</h2><button class="btn gray sm" onclick="accCloseForm()">닫기</button></div>
    <div class="row2"><div class="field"><label>날짜</label><input class="inp" type="date" id="ef-date" value="${e?e.date:curAccMonth+'-01'}"></div>
      <div class="field"><label>카테고리</label><select class="sel" id="ef-cat">${ACC_CATS.map(c=>`<option ${e&&e.cat===c.k?'selected':''}>${c.k}</option>`).join('')}</select></div></div>
    <div class="field"><label>상호 (거래처·가맹점)</label><input class="inp" id="ef-vendor" value="${(e?.vendor||'').replace(/"/g,'&quot;')}" placeholder="예: 쿠팡, ○○식당"></div>
    <div class="row3"><div class="field"><label>합계 (실결제)</label><input class="inp" id="ef-total" inputmode="numeric" value="${e?e.total:''}"></div>
      <div class="field"><label>공급가</label><input class="inp" id="ef-supply" inputmode="numeric" value="${e?e.supply:''}"></div>
      <div class="field"><label>부가세</label><input class="inp" id="ef-vat" inputmode="numeric" value="${e?e.vat:''}"></div></div>
    <div style="display:flex;gap:8px;margin-bottom:11px"><button class="btn line sm" onclick="accSplitVat()">합계 → 공급가·부가세 역산</button><button class="btn gray sm" onclick="accZeroVat()">면세 (부가세 0)</button></div>
    <div class="row2"><div class="field"><label>결제수단</label><select class="sel" id="ef-pay">${ACC_PAYS.map(p=>`<option ${e&&e.pay===p?'selected':''}>${p}</option>`).join('')}</select></div>
      <div class="field"><label>PJT 연결 (선택)</label><select class="sel" id="ef-pjt"><option value="">미지정 (공통비용)</option>${projects.map(p=>`<option value="${p.id}" ${e&&e.pjt===p.id?'selected':''}>${p.code}</option>`).join('')}</select></div></div>
    <div class="field"><label>비고</label><input class="inp" id="ef-note" value="${(e?.note||'').replace(/"/g,'&quot;')}" placeholder="품목·용도·추정 메모"></div>
    <div style="display:flex;gap:8px;margin-top:4px">${e?`<button class="btn gray sm" onclick="accDel('${e.id}')">삭제</button>`:''}
      <button class="btn line full" onclick="accCloseForm()">취소</button><button class="btn pri full" onclick="accSave('${e?e.id:''}')">저장</button></div>`;
  $('emodal').classList.add('on');
};
window.accCloseForm=()=>$('emodal').classList.remove('on');
window.accSplitVat=function(){ const t=num($('ef-total').value); if(t<=0){ toast('합계를 먼저 입력하세요.'); return; } const sup=Math.round(t/1.1); $('ef-supply').value=sup; $('ef-vat').value=t-sup; };
window.accZeroVat=function(){ const t=num($('ef-total').value); $('ef-supply').value=t; $('ef-vat').value=0; };
window.accSave=async function(id){ const total=num($('ef-total').value); if(total<=0){ toast('합계를 입력하세요.'); return; }
  let sup=num($('ef-supply').value), vat=num($('ef-vat').value); if(sup===0&&vat===0){ sup=Math.round(total/1.1); vat=total-sup; }
  const data={ date:$('ef-date').value, cat:$('ef-cat').value, vendor:$('ef-vendor').value.trim(), supply:sup, vat, total, pay:$('ef-pay').value, pjt:$('ef-pjt').value, note:$('ef-note').value.trim() };
  try{ const eid=id||('exp_'+Date.now()); if(!id) data.createdAt=serverTimestamp(); await setDoc(doc(db,'gihoek_expenses',eid),data,{merge:true}); accCloseForm(); toast('저장했습니다.'); }
  catch(e){ toast('저장 실패: '+(e.code||e.message)); } };
window.accDel=async function(id){ if(!confirm('이 비용을 삭제할까요?')) return; try{ await deleteDoc(doc(db,'gihoek_expenses',id)); accCloseForm(); toast('삭제했습니다.'); }catch(e){ toast('삭제 실패: '+(e.code||e.message)); } };

window.tab=tab;
</script>

</body>
</html>
