let attWorkers=null, attChecks=[], attMd={}, attLoaded=false, attLoadingSite=null, attDate=(function(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
async function loadAtt(s){
  const cfg=ATT[s]; if(!cfg){ attLoaded=true; attWorkers=[]; render(); return; }
  attLoadingSite=s; attLoaded=false; render();
  const dk=attDate;
  let ws=[];
  try{ const snap=await getDocs(collection(db,cfg.workers)); ws=snap.docs.map(d=>Object.assign({id:d.id},d.data())).filter(w=>w.active!==false); ws.sort((a,b)=>(a.order||0)-(b.order||0)); }catch(e){}
  let checks=[];
  try{ const s2=await getDoc(doc(db,cfg.att,dk)); if(s2.exists())checks=(s2.data()||{}).checks||[]; }catch(e){}
  let md={};
  try{ const s3=await getDoc(doc(db,cfg.md,dk)); if(s3.exists())md=(s3.data()||{}).md||{}; }catch(e){}
  if(attDate!==dk) return; // 로드 중 날짜가 바뀌면 무시
  attWorkers=ws; attChecks=checks; attMd=md; attLoaded=true; attLoadingSite=null; render();
}
window.shiftAttDate=function(delta){ const d=new Date(attDate); d.setDate(d.getDate()+delta); attDate=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); attLoaded=false; loadAtt(site); };
window.attToday=function(){ attDate=todayStr(); attLoaded=false; loadAtt(site); };
window.toggleAttend=async function(wid){
  if(attDate!==todayStr()) return; // 오늘만 수정 가능
  const cfg=ATT[site]; if(!cfg) return; const td=todayStr();
  const idx=attChecks.indexOf(wid); const isDone=idx===-1;
  try{
    const ref=doc(db,cfg.att,td); const snap=await getDoc(ref);
    let checks=snap.exists()?((snap.data()||{}).checks||[]):[];
    const i=checks.indexOf(wid); if(i===-1)checks.push(wid); else checks.splice(i,1);
    await setDoc(ref,{checks,updatedAt:serverTimestamp()});
    attChecks=checks;
  }catch(e){ if(isDone)attChecks.push(wid); else attChecks.splice(idx,1); }
  render();
};

let data={user_schedules:[],ph4_schedules:[]};
let repCache={}; // 날짜별 업무지시/보고 (daily_reports_{날짜}/ph4_daily_{날짜})
async function loadReports(dk){
  const s=SITES[site]; if(!s){ return; }
  try{
    const snap=await getDocs(collection(db, s.repPrefix+dk));
    const items=[];
    snap.forEach(d=>{ const r=d.data(); if((r.text||'').trim()) items.push(r); });
    items.sort((a,b)=>{var ta=(a.ts&&a.ts.seconds)||0,tb=(b.ts&&b.ts.seconds)||0; return ta-tb;});
    repCache[dk]=items;
  }catch(e){ repCache[dk]=[]; }
  render();
}
let curView='home', site=null, sub='sched', detailId=null, loadError='';
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
let selectedDate=todayStr(), calMonth=todayStr().slice(0,7);

const esc=v=>String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const $app=()=>document.getElementById('app');
const fmtDate=v=>{if(!v)return '';if(v.seconds)return new Date(v.seconds*1000).toISOString().slice(0,10);return String(v).slice(0,10);};
const WD=['일','월','화','수','목','금','토'];

function nav(v,s){ curView=v; if(s!==undefined)site=s; history.pushState({v,site,sub,selectedDate,detailId},''); render(); window.scrollTo(0,0); }
window.openSite=function(s){ site=s; sub='sched'; selectedDate=todayStr(); calMonth=todayStr().slice(0,7); progLoaded=false; progData=null; progLoadingSite=null; attLoaded=false; attWorkers=null; attLoadingSite=null; repCache={}; nav('site',s); loadReports(todayStr()); };
window.setSub=function(t){ sub=t; if(t==='sched'){ selectedDate=todayStr(); calMonth=todayStr().slice(0,7); if(repCache[selectedDate]===undefined) loadReports(selectedDate); } if(t==='progress' && !progLoaded && progLoadingSite!==site){ loadProgress(site); } if(t==='attend' && !attLoaded && attLoadingSite!==site){ loadAtt(site); } render(); };
window.selectDate=function(d){ selectedDate=d; if(repCache[d]===undefined) loadReports(d); render(); };
window.shiftCalMonth=function(delta){ const [y,m]=calMonth.split('-').map(Number); const nm=new Date(y,m-1+delta,1); calMonth=nm.getFullYear()+'-'+String(nm.getMonth()+1).padStart(2,'0'); render(); };
window.openSched=function(id){ detailId=id; nav('schedD',site); };
window.goBack=function(){ history.back(); };
window.goHome=function(){ location.href='home.html'; };
window.goAccount=function(){ location.href='account.html'; };
window.addEventListener('popstate',e=>{ const st=e.state||{v:'home',site:null,sub:'sched'}; curView=st.v; site=st.site; sub=st.sub||'sched'; if(st.selectedDate)selectedDate=st.selectedDate; detailId=st.detailId||null; render(); window.scrollTo(0,0); });

function render(){
  if(loadError){ $app().innerHTML=topBar('홈','goHome()')+`<div class="banner err">데이터를 불러오지 못했습니다: ${esc(loadError)}<br>포털 로그인 세션이 필요할 수 있습니다.</div>`; return; }
  if(curView==='schedD') return renderSchedDetail();
  if(curView==='site') return renderSite();
  renderHome();
}
function topBar(label,onclick){ return `<div class="top"><button class="back" onclick="${onclick||'goBack()'}">← ${label}</button><div class="avatar" onclick="goAccount()">${_uInitial}</div></div>`; }

function renderHome(){
  $app().innerHTML=`
    <div class="top"><button class="back" onclick="goHome()">← 홈</button><div class="avatar" onclick="goAccount()">${_uInitial}</div></div>
    <div class="hello"><div class="name">PJT 관리</div><div class="sub">진행 중인 프로젝트 현장 관리</div></div>
    <div class="lbl">진행 프로젝트</div>
    <div class="list top">
      ${Object.entries(SITES).map(([k,s])=>`<div class="fcard ${s.cls}" onclick="openSite('${k}')">
        <div class="ic">${s.ic}</div>
        <div><div class="cl">${esc(s.client)}</div><div class="nm">${esc(s.code)}</div><div class="ds">${esc(s.desc)} · 공정·일정·근태</div></div>
        <span class="go">›</span></div>`).join('')}
    </div>`;
}

function renderSite(){
  const s=SITES[site]; if(!s){ renderHome(); return; }
  let body='';
  if(sub==='sched') body=renderCalendar(s);
  else if(sub==='progress') body=renderProgress();
  else body=renderAttend();
  $app().innerHTML=topBar('PJT','goBack()')+`
    <div class="hello"><div class="name" style="font-size:21px;color:var(--ink)">${esc(s.code)}</div><div class="sub">${esc(s.client)} · ${esc(s.desc)}</div></div>
    <div class="segs">
      <div class="seg ${sub==='progress'?'on':''}" onclick="setSub('progress')">공정</div>
      <div class="seg ${sub==='sched'?'on':''}" onclick="setSub('sched')">일정</div>
      <div class="seg ${sub==='attend'?'on':''}" onclick="setSub('attend')">근태</div>
    </div>
    ${body}`;
}

function renderProgress(){
  const cfg=PROG[site];
  if(!cfg){
    const zs=ZONES[site]||[]; const tot=zs.reduce((a,z)=>a+z.total,0);
    return `<div class="lbl">📊 섹터 구성 · 총 ${tot}대</div>
      <div class="list top">${zs.map(z=>`<div class="schcard" style="cursor:default"><div class="sch-body"><div class="sch-text">${esc(z.name)}</div></div><span class="tag" style="background:#e7f5ee;color:#1b8a5a">${z.total}대</span></div>`).join('')}</div>
      <div class="banner soft">이 현장의 공정 진척은 순차로 붙일 예정입니다.</div>`;
  }
  if(!progLoaded) return '<div class="loading">공정 데이터 불러오는 중…</div>';
  let grand=0,gmax=0,totIn=0,totInst=0;
  const cards=cfg.zones.map(z=>{
    const r=calcZone(z,(progData&&progData[z.id])||{},cfg);
    grand+=r.tot; gmax+=r.mx; totIn+=r.zIn; totInst+=r.instDone;
    return progZoneCard(z,r,cfg);
  }).join('');
  const totalPct=gmax?(grand/gmax*100).toFixed(1):'0.0';
  const totQty=cfg.zones.reduce((a,z)=>a+z.total,0);
  return `<div class="prog-wrap">
      <div class="prog-sum">
        <div class="pi"><div class="pil">전체 물량</div><div class="piv">${totQty}대</div></div>
        <div class="pi"><div class="pil">전체 공정율</div><div class="piv" style="color:#1D5BA6">${totalPct}%</div></div>
        <div class="pi"><div class="pil">누적 반입</div><div class="piv">${totIn}대</div></div>
        <div class="pi"><div class="pil">누적 설치</div><div class="piv">${totInst}대</div></div>
      </div>
      <div class="prog-leg"><span style="color:#1D5BA6">■</span>반입 <span style="color:#4aa3df">■</span>입고검사 <span style="color:#2e7d32">■</span>설치 <span style="color:#7c3aed">■</span>시공검측</div>
      ${cards}
    </div>`;
}
function renderAttend(){
  const cfg=ATT[site];
  if(!cfg) return '<div class="empty">준비 중</div>';
  const isToday=attDate===todayStr();
  const [y,m,d]=attDate.split('-');
  const label=`${m}월 ${d}일 (${WD[new Date(+y,+m-1,+d).getDay()]})`;
  const nav=`<div class="att-nav">
    <button class="att-arrow" onclick="shiftAttDate(-1)">‹</button>
    <div class="att-navlabel">${label}${isToday?' · 오늘':''}</div>
    <button class="att-arrow" onclick="shiftAttDate(1)">›</button>
    ${!isToday?`<button class="att-todaybtn" onclick="attToday()">오늘</button>`:''}
  </div>`;
  let inner;
  if(!attLoaded){ inner='<div class="loading">근태 불러오는 중…</div>'; }
  else{
    const ws=attWorkers||[];
    const present=ws.filter(w=>attChecks.includes(w.id)).length;
    const totMd=Object.keys(attMd).reduce((a,k)=>a+(parseFloat(attMd[k])||0),0);
    const rows=ws.length?ws.map(w=>{
      const on=attChecks.includes(w.id); const md=attMd[w.id];
      const btn=isToday
        ? `<div class="attb ${on?'on':''}" onclick="toggleAttend('${w.id}')">${on?'출역':'미출역'}</div>`
        : `<div class="attb ro ${on?'on':''}">${on?'출역':'-'}</div>`;
      return `<div class="attcard">
        <div class="att-body"><div class="att-name">${esc(w.name||'—')}</div>${w.role?`<div class="att-role">${esc(w.role)}</div>`:''}</div>
        <div class="att-md">${md!=null&&md!==''?('공수 '+md):'<span style="color:#c3cedd">공수 —</span>'}</div>
        ${btn}
      </div>`;
    }).join(''):'<div class="empty">등록된 기술인이 없습니다.</div>';
    inner=`<div class="prog-sum">
        <div class="pi"><div class="pil">출역</div><div class="piv" style="color:#1D5BA6">${present}/${ws.length}명</div></div>
        <div class="pi"><div class="pil">공수 합계</div><div class="piv">${(+totMd.toFixed(2))}</div></div>
      </div>
      <div class="att-hint">${isToday?'기술인을 눌러 오늘 출역을 체크할 수 있습니다':'지난 날짜는 조회만 됩니다'} · 공수는 표시 전용</div>
      <div class="att-list">${rows}</div>`;
  }
  return `<div class="prog-wrap">${nav}${inner}</div>`;
}
function buildCheckTable(z,cfg){
  const merged=(progData&&progData[z.id])||{}, today=(progToday&&progToday[z.id])||{};
  const cols=cfg.checkCols;
  const head=cols.map(c=>`<th>${esc(c)}</th>`).join('');
  const rows=z.eqs.map(eq=>{
    const cells=cols.map(c=>{
      const key=eq+'_'+c; const done=!!merged[key]; const isT=!!today[key]; const past=done&&!isT;
      const cls='ckb'+(done?(isT?' on':' past'):'');
      const click=(!past)?` onclick="toggleCheck('${z.id}','${eq}','${c}')"`:'';
      return `<td><div class="${cls}"${click}></div></td>`;
    }).join('');
    const pct=Math.round(cols.filter(c=>merged[eq+'_'+c]).length/cols.length*100);
    return `<tr><td class="eqc">${esc(eq)}<span>${pct}%</span></td>${cells}</tr>`;
  }).join('');
  return `<div class="cktbl-wrap"><table class="cktbl"><thead><tr><th class="eqh">장비</th>${head}</tr></thead><tbody>${rows}</tbody></table></div>
    <div class="ckhint">🟦 오늘 체크(수정가능) · ⬜ 이전 완료(읽기전용) — 오늘 날짜만 체크할 수 있습니다</div>`;
}
function progZoneCard(z,r,cfg){
  const bar=(pct,c)=>`<div style="flex:1"><div style="height:6px;background:#eef2f7;border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${c}"></div></div></div>`;
  const expanded=expandedZone===z.id;
  return `<div class="pzcard">
    <div class="pz-head" onclick="toggleZone('${z.id}')" style="cursor:pointer">
      <span class="pz-name">${esc(z.name)}</span><span class="pz-sub">${z.total}대</span>
      <span class="pz-pct">${r.pct}%</span><span style="color:#c3cedd;font-size:11px;margin-left:2px">${expanded?'▲':'▼'}</span></div>
    <div class="pz-bars">${bar((r.zIn/z.total*100).toFixed(0),'#1D5BA6')}${bar((r.zAn/z.total*100).toFixed(0),'#4aa3df')}${bar(r.instBarPct,'#2e7d32')}${bar((r.zChk/z.total*100).toFixed(0),'#7c3aed')}</div>
    <div class="pz-lab"><span>반입 ${r.zIn}/${z.total}</span><span>입고검사 ${r.zAn}/${z.total}</span><span>설치 ${r.instDone}/${z.total}</span><span>시공검측 ${r.zChk}/${z.total}</span></div>
    ${expanded?(cfg?buildCheckTable(z,cfg):''):''}
  </div>`;
}
function renderCalendar(s){
  const scheds=data[s.sch]||[];
  const byDate={}; scheds.forEach(x=>{const d=fmtDate(x.sdate); if(d)(byDate[d]=byDate[d]||[]).push(x);});
  const [y,m]=calMonth.split('-').map(Number);
  const startDay=new Date(y,m-1,1).getDay();
  const daysInMonth=new Date(y,m,0).getDate();
  const td=todayStr();
  let head=WD.map((w,i)=>`<div style="text-align:center;font-size:11px;font-weight:700;color:${i===0?'#c0392b':i===6?'#1D5BA6':'#9aa8bc'};padding:4px 0">${w}</div>`).join('');
  let cells='';
  for(let i=0;i<startDay;i++) cells+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has=!!byDate[ds]; const sel=ds===selectedDate; const isToday=ds===td;
    const dow=new Date(y,m-1,d).getDay();
    const col=sel?'#fff':(dow===0?'#c0392b':dow===6?'#1D5BA6':'#1a2330');
    const bg=sel?'#1b8a5a':(isToday?'#e7f5ee':'transparent');
    cells+=`<div onclick="selectDate('${ds}')" style="aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border-radius:11px;background:${bg};color:${col};font-size:13.5px;font-weight:${sel||isToday?'800':'600'};position:relative">
      ${d}${has?`<span style="position:absolute;bottom:5px;width:5px;height:5px;border-radius:50%;background:${sel?'#fff':'#1b8a5a'}"></span>`:''}</div>`;
  }
  const dayItems=(byDate[selectedDate]||[]).sort((a,b)=>(a.stime||'').localeCompare(b.stime||''));
  const [sy,sm,sd]=selectedDate.split('-');
  const selLabel=`${sm}월 ${sd}일 (${WD[new Date(sy,sm-1,sd).getDay()]})`;
  // 업무지시/보고: 해당 날짜 컬렉션(daily_reports_{날짜}/ph4_daily_{날짜})
  const repItems=repCache[selectedDate];
  let repHtml;
  if(repItems===undefined){ repHtml='<div class="empty">불러오는 중…</div>'; }
  else if(repItems.length){ repHtml=`<div class="list">${repItems.map(r=>`<div class="rep-item"><div class="rep-head"><span class="rtag ins">${esc((r.time||'')+(r.name?' '+r.name:''))}</span><span class="rep-pjt">${esc(s.code)}</span></div><div class="rep-text">${esc(r.text||'')}</div></div>`).join('')}</div>`; }
  else { repHtml='<div class="empty">이 날 입력된 지시·보고가 없습니다.</div>'; }
  return `
    <div style="margin:14px 20px 0;background:#fff;border:1px solid #e4eaf2;border-radius:18px;padding:14px 14px 16px;box-shadow:0 2px 8px rgba(30,50,80,.05)">
      <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:12px">
        <button onclick="shiftCalMonth(-1)" style="background:#f0f4f9;border:1px solid #e4eaf2;border-radius:9px;width:32px;height:32px;font-size:16px;color:#5c6f8a;cursor:pointer">‹</button>
        <div style="font-size:16px;font-weight:800;color:#16487f;min-width:104px;text-align:center">${y}년 ${m}월</div>
        <button onclick="shiftCalMonth(1)" style="background:#f0f4f9;border:1px solid #e4eaf2;border-radius:9px;width:32px;height:32px;font-size:16px;color:#5c6f8a;cursor:pointer">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr)">${head}</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:2px">${cells}</div>
    </div>
    <div class="lbl">📅 ${selLabel} 일정 ${dayItems.length?`(${dayItems.length})`:''}</div>
    ${dayItems.length?`<div class="list">${dayItems.map(schCard).join('')}</div>`:'<div class="empty">이 날 등록된 일정이 없습니다.</div>'}
    <div class="divider"></div>
    <div class="lbl">📋 업무지시 · 보고</div>
    ${repHtml}`;
}
function schCard(s){
  return `<div class="schcard" onclick="openSched('${s.id}')">
    <div class="sch-time">${s.stime?esc(s.stime):'종일'}</div>
    <div class="sch-body"><div class="sch-text">${esc(s.text||s.title||'(내용 없음)')}</div>${s.pjtName?`<div class="sch-meta">${esc(s.pjtName)}</div>`:''}</div>
    ${tagChip(s.tag)}<span class="sch-go">›</span></div>`;
}
function renderSchedDetail(){
  const s=SITES[site]; if(!s){ renderHome(); return; }
  const sch=(data[s.sch]||[]).find(x=>x.id===detailId);
  if(!sch){ $app().innerHTML=topBar('일정','goBack()')+'<div class="empty">일정을 찾을 수 없습니다.</div>'; return; }
  const info=[['날짜',fmtDate(sch.sdate)],['시간',sch.stime||'종일'],['구분',sch.tag&&TAGS[sch.tag]?TAGS[sch.tag].l:(sch.tag||'')],['PJT',sch.pjtName],['담당/역할',sch.role],['등록자',sch.author||sch.writer]].filter(x=>x[1]);
  $app().innerHTML=topBar('일정','goBack()')+`
    <div class="hello"><div class="name" style="font-size:20px;color:var(--ink)">${esc(sch.text||sch.title||'일정')}</div><div class="sub">${esc(s.code)} · ${esc(fmtDate(sch.sdate))}</div></div>
    <div class="dcard">${info.map(([k,v])=>`<div class="drow"><span class="dk">${k}</span><span class="dv">${esc(v)}</span></div>`).join('')}</div>
    ${sch.memo||sch.detail||sch.note?`<div class="lbl">상세 내용</div><div class="dcard"><div class="drow"><span class="dv" style="text-align:left;max-width:100%">${esc(sch.memo||sch.detail||sch.note)}</span></div></div>`:''}`;
}

function subscribe(coll){
  onSnapshot(collection(db,coll), snap=>{ const arr=[]; snap.forEach(d=>arr.push({id:d.id,...d.data()})); data[coll]=arr; render(); },
    err=>{ loadError=err.code||err.message; render(); });
}
['user_schedules','ph4_schedules'].forEach(subscribe);

history.replaceState({v:'home',site:null,sub:'sched'},'');
render();
</script>
