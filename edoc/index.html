// 전화번호 포맷 공통 함수
function fmtTel(v){
  var d=v.replace(/\D/g,'');
  if(d.length<=3) return d;
  if(d.length<=6) return d.slice(0,3)+'-'+d.slice(3);
  if(d.length<=10) return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);
  return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7,11);
}
function fmtTelBlur(el){
  var d=el.value.replace(/\D/g,'');
  if(d.length===8 && d[0]!=='0') d='010'+d;
  el.value=fmtTel(d);
}
function show(s) {
  ['login','denied','app'].forEach(id=>{
    const el=document.getElementById(id+'-screen');
    if(el) el.style.display=(id===s?'flex':'none');
  });
}

onAuthStateChanged(auth, async u => {
  if (!u) { show('login'); return; }
  _user = u;

  // 포털 경유 승인 체크
  const via = new URLSearchParams(location.search).get('via') === 'portal';
  if (via) {
    try {
      const ps = await getDoc(doc(db, 'portal_users', u.uid));
      if (ps.exists()) {
        const d = ps.data();

          // perms.edoc 없음 또는 미승인 → 직접 접근 허용 (로그인된 상태로 입장)

window.goTab = function(key, afterFn) {
  const t = EDOC_TABS[key]; if (!t) return;
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  const tc = document.getElementById(t.id); if (tc) tc.classList.add('active');
  document.querySelectorAll('[data-navkey]').forEach(b=>
    b.classList.toggle('active', b.getAttribute('data-navkey')===key));
  const ht = document.getElementById('header-title'); if (ht) ht.textContent = t.title;
  if (t.fn) {
    const result = t.fn();
    // fn이 Promise를 반환하면 then, 아니면 setTimeout으로 afterFn 실행
    if (afterFn) {
      if (result && typeof result.then === 'function') {
        result.then(() => afterFn());
      } else {
        setTimeout(afterFn, 50);
      }
    }
  } else if (afterFn) {
    setTimeout(afterFn, 50);
  }
};

let _pjts = [];   // gihoek_projects 캐시
let _myInfo = {}; // 로그인 사용자 정보 (소속·이름·직급)

// 로그인 사용자 정보 로드 (portal_users → workers 순 시도)
async function loadMyInfo() {
  if (!window._db || !_user) return;
  try {
    const { getDoc, getDocs, doc, collection, query, where } =
      await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    // portal_users: { name, rank, email }
    const pu = await getDoc(doc(window._db, 'portal_users', _user.uid));
    if (pu.exists()) {
      const d = pu.data();
      _myInfo = { name: d.name || _user.displayName || '', rank: d.rank || '', dept: d.dept || '', email: _user.email };
    }
    // workers 컬렉션에서 이메일로 매칭해 dept 보완
    const ws = await getDocs(collection(window._db, 'workers'));
    ws.forEach(w => {
      const wd = w.data();
      if ((wd.email || '').toLowerCase() === (_user.email || '').toLowerCase() ||
          (wd.name && wd.name === _myInfo.name)) {
        _myInfo = { ..._myInfo, dept: wd.dept || _myInfo.dept, rank: wd.rank || _myInfo.rank };
      }
    });
  } catch(e) { console.warn('myInfo load:', e.message); }
}

// 진행 중 프로젝트 목록 로드
async function loadPjts() {
  if (!window._db || _pjts.length) return;
  try {
    const { getDocs, collection } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const snap = await getDocs(collection(window._db, 'gihoek_projects'));
    _pjts = [];
    snap.forEach(d => {
      const pd = d.data();
      if (pd.status !== 'done') _pjts.push({ id: d.id, ...pd });
    });
    _pjts.sort((a,b) => (a.createdAt?.seconds||0) - (b.createdAt?.seconds||0));
  } catch(e) { console.warn('loadPjts:', e.message); }
}

// 권한 칩 토글 → 즉시 Firestore 저장
window.toggleDailyViewTarget = async function(el) {
  const ownerUid = el.dataset.owner;
  const targetUid = el.dataset.target;
  const isOn = el.classList.contains('on');
  el.style.opacity = '0.5';
  try {
    const { doc, updateDoc, getDoc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const ownerRef = doc(window._db, 'portal_users', ownerUid);
    const ownerSnap = await getDoc(ownerRef);
    let targets = ownerSnap.exists() ? (ownerSnap.data().dailyViewTargets || []) : [];
    if (isOn) {
      targets = targets.filter(t => t !== targetUid);
    } else {
      if (!targets.includes(targetUid)) targets.push(targetUid);
    }
    await updateDoc(ownerRef, { dailyViewTargets: targets });
    // 로컬 캐시 동기화
    const u = _portalUsers.find(x => x.uid === ownerUid);
    if (u) u.dailyViewTargets = targets;
    el.classList.toggle('on');
    el.style.opacity = '1';
  } catch(e) {
    el.style.opacity = '1';
    alert('권한 저장 실패: ' + e.message);
  }
};

// 제목 자동 생성: (PJT코드) yymmdd ㅇㅇㅇ 업무일지
window.dailyAutoTitle = function() {
  const dateVal = (document.getElementById('d-date')?.value || '').replace(/-/g,'').slice(2);
  const pjtSel  = document.getElementById('d-pjt');
  const name    = document.getElementById('d-name')?.value || '';
  const nameShort = name.slice(0,1) + (name.length > 1 ? name.slice(1) : ''); // 이름 전체

  let pjtPrefix = '';
  if (pjtSel && pjtSel.value) {
    const opt = pjtSel.options[pjtSel.selectedIndex];
    const code = opt.dataset.code || '';
    const pname = opt.dataset.name || '';
    pjtPrefix = code ? `(${code}) ` : pname ? `(${pname}) ` : '';
  }

  const titleEl = document.getElementById('d-title');
  if (titleEl) titleEl.value = `${pjtPrefix}${dateVal} ${nameShort} 업무일지`.trim();
};

window.dailySave = async function(status) {
  if (!window._db || !_user) { alert('로그인이 필요합니다.'); return; }

  if (status === 'pending' && !title) { alert('제목을 입력해 주세요.'); return; }
  if (status === 'pending' && !today) { alert('오늘 진행한 업무를 입력해 주세요.'); return; }

  const data = {

// ── 전자결재 홈 ──
// ── 근로기준법 연차 자동 계산 ──
function calcAnnualLeaveGrant(hireDateStr, baseDateStr) {
  if (!hireDateStr) return { granted:0, years:0, months:0, detail:'입사일 미등록' };
  const hire = new Date(hireDateStr);
  const base = baseDateStr ? new Date(baseDateStr) : new Date();
  if (isNaN(hire.getTime()) || base < hire) return { granted:0, years:0, months:0, detail:'-' };
  let years = base.getFullYear() - hire.getFullYear();
  const mDiff = base.getMonth() - hire.getMonth();
  const dDiff = base.getDate() - hire.getDate();
  if (mDiff < 0 || (mDiff === 0 && dDiff < 0)) years--;
  const totalMonths = (base.getFullYear()-hire.getFullYear())*12 + (base.getMonth()-hire.getMonth()) - (base.getDate() < hire.getDate() ? 1 : 0);
  let granted = 0, detail = '';
  if (years < 1) {
    granted = Math.min(Math.max(totalMonths,0), 11);
    detail = `입사 ${Math.max(totalMonths,0)}개월 (월 1일, 최대 11일)`;
  } else {
    granted = 15;
    if (years >= 3) granted = Math.min(15 + Math.floor((years-1)/2), 25);
    detail = `근속 ${years}년차 (15일${granted>15?` +${granted-15}`:''})`;
  }
  return { granted, years, months: Math.max(totalMonths,0), detail };
}

// 연차 사용일수 집계 (게시/승인된 연차신청서)
function sumLeaveUsed(leaveDocs, workerName) {
  let used = 0;
  for (const lv of leaveDocs) {
    const nm = lv.authorName || lv.name || '';
    if (nm !== workerName) continue;
    if (lv.status !== 'posted' && lv.status !== 'approved') continue;
    const days = parseFloat(lv.days || lv.leaveDays || 0);
    if (!isNaN(days)) used += days;
  }
  return used;
}
window.calcAnnualLeaveGrant = calcAnnualLeaveGrant;
window.sumLeaveUsed = sumLeaveUsed;

      </div>
    </div>
    <div class="home-2col" id="edoc-home-panels2" style="margin-top:16px;">
      <div class="panel">
        <div class="panel-head">📝 내가 작성한 문서</div>
        <div id="panel-my-docs" class="panel-list">불러오는 중…</div>
      </div>
      <div class="panel">
        <div class="panel-head">📤 게시된 문건</div>
        <div id="panel-posted" class="panel-list">불러오는 중…</div>
      </div>
    </div>
  </div>`;

  if (!window._db || !_user) return;
  try {
    const { getDocs, collection } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const DOC_TYPES = ['daily','leave','resign','cert','purchase','expense'];
    const myUid = _user.uid;

    // 내가 결재해야 할 문서: approvalLine에 내 uid가 있고 status=pending인 역할이 현재 차례인 것
    let myApprove = [];  // 내가 결재자인 대기 문서
    let myInbox = [];    // 내가 회람 수신자인 문서
    let myDocs = [];     // 내가 작성한 문서
    let postedAll = [];  // 게시된 전체 문서
    let allLeave = [];   // 전체 연차신청서 (연차 집계용)

    for (const dtype of DOC_TYPES) {
      const snap = await getDocs(collection(db, `edoc_${dtype}`));
      snap.forEach(d => {
        const data = {id:d.id, dtype, ...d.data()};
        const line = data.approvalLine || [];
        if (dtype === 'leave') allLeave.push(data);

        // 게시된 문서
        if (data.status === 'posted') postedAll.push(data);

        // 내가 작성한 문서
        if (data.authorUid === myUid) myDocs.push(data);

        // 내가 결재라인에 있는 문서 분류
        line.forEach((step, idx) => {
          // uid 일치 OR uid 비어있고 이름 일치
        const uidMatch = step.uid === myUid || (!step.uid && step.name === (_myInfo?.name||''));
        if (!uidMatch) return;
          if (step.role === '회람' || step.role === '수신') {
            // 회람/수신: 문서가 posted거나 approved이면 수신함에
            if (data.status === 'posted' || data.status === 'approved') myInbox.push(data);
          } else {
            // 결재1/결재2/결재: 내 차례(이전 단계가 모두 완료)인지 확인
            const prevDone = line.slice(0, idx).every(s => s.status === 'done' || s.status === 'approved' || s.role === '작성');
            // 이전 단계: approved 또는 draft(작성) 상태여야 내 차례
            const prevApproved = line.slice(0, idx).every(p =>
              p.role === '작성' || p.status === 'approved' || p.status === 'done'
            );
            if (prevApproved && step.status === 'pending' && (data.status === 'pending' || data.status === 'reviewing')) {
              myApprove.push(data);
            }
          }
        });
      });
    }

    // 정렬
    [myApprove, myInbox, myDocs, postedAll].forEach(arr =>
      arr.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0))
    );
    // 중복 제거
    const dedup = arr => arr.filter((d,i,a)=>a.findIndex(x=>x.id===d.id)===i);
    myApprove = dedup(myApprove); myInbox = dedup(myInbox);
    myDocs = dedup(myDocs); postedAll = dedup(postedAll);

    // 전역 저장 (KPI 카드 '전체 보기'에서 사용)
    window._edocLists = { approve: myApprove, inbox: myInbox, mydocs: myDocs, posted: postedAll };

    // ── 연차 현황 계산 (로그인 계정) ──
    (async () => {
      const lbox = document.getElementById('edoc-leave-box');
      if (!lbox) return;
      const myName = _myInfo?.name || '';
      // workers에서 내 입사일 조회
      let hireDate = '';
      try {
        const wsnap = await getDocs(collection(db, 'workers'));
        wsnap.forEach(w => {
          const wd = w.data();
          if (wd.name === myName && wd.hireDate) hireDate = wd.hireDate;
        });
      } catch(e) {}

      const grant = calcAnnualLeaveGrant(hireDate);
      const used = sumLeaveUsed(allLeave, myName);
      const remain = Math.max(grant.granted - used, 0);

      if (!hireDate) {
        lbox.innerHTML = `<div class="leave-box-inner" style="opacity:.7;">
          🌴 연차 현황 — 인사 명부에 입사일이 등록되어 있지 않습니다.</div>`;
        return;
      }
      lbox.innerHTML = `
        <div class="leave-title">🌴 내 연차 현황 <span style="font-size:11px;font-weight:500;color:#9AAABF;">${grant.detail}</span></div>
        <div class="leave-stats">
          <div class="leave-stat"><div class="ls-lab">부여</div><div class="ls-val" style="color:#1D5BA6;">${grant.granted}<span>일</span></div></div>
          <div class="leave-stat"><div class="ls-lab">사용</div><div class="ls-val" style="color:#F59E0B;">${used}<span>일</span></div></div>
          <div class="leave-stat"><div class="ls-lab">잔여</div><div class="ls-val" style="color:#16A34A;">${remain}<span>일</span></div></div>
        </div>`;
    })();

    // KPI
    const kpi = document.getElementById('edoc-home-kpi');
    if (kpi) kpi.innerHTML = `
      <div class="kpi-card warn" onclick="edocShowList('approve')" style="cursor:pointer;"><div class="kpi-label">결재 요청</div><div class="kpi-val">${myApprove.length}<span class="kpi-unit">건</span></div><div class="kpi-link">확인하기 ›</div></div>
      <div class="kpi-card" onclick="edocShowList('inbox')" style="cursor:pointer;"><div class="kpi-label">수신함</div><div class="kpi-val">${myInbox.length}<span class="kpi-unit">건</span></div><div class="kpi-link">보러가기 ›</div></div>
      <div class="kpi-card" onclick="edocShowList('mydocs')" style="cursor:pointer;"><div class="kpi-label">내 문서</div><div class="kpi-val">${myDocs.length}<span class="kpi-unit">건</span></div><div class="kpi-link">전체 보기 ›</div></div>
      <div class="kpi-card" onclick="edocShowList('posted')" style="cursor:pointer;"><div class="kpi-label">게시 문건</div><div class="kpi-val">${postedAll.length}<span class="kpi-unit">건</span></div><div class="kpi-link">조회하기 ›</div></div>`;

    const rowHtml = (d, showApproveBtn=false) => `
      <div class="panel-row" onclick="openDocFromHome(${JSON.stringify(d).replace(/"/g,'&quot;')})">
        <span class="doc-badge ${d.status==='posted'?'posted':''}">${TYPE_LABEL[d.dtype]||d.dtype}</span>
        <span class="doc-title">${d.title||'(제목없음)'}</span>
        <span style="font-size:10px;font-weight:700;color:${STATUS_COLOR[d.status]||'#9AAABF'};white-space:nowrap;">${STATUS_LABEL[d.status]||d.status}</span>
        <span class="doc-date">${fmtD(d.createdAt)}</span>
        ${showApproveBtn ? `<button onclick="event.stopPropagation();openDocFromHome(${JSON.stringify(d).replace(/"/g,'&quot;')})" style="margin-left:6px;font-size:11px;padding:3px 8px;background:#1D5BA6;color:#fff;border:none;border-radius:6px;cursor:pointer;flex-shrink:0;">📋 내용 확인</button>` : ''}
      </div>`;

    // 패널 렌더
    const pa = document.getElementById('panel-my-approve');
    if (pa) pa.innerHTML = myApprove.length ? myApprove.slice(0,8).map(d=>rowHtml(d,true)).join('') : '<div class="panel-empty">결재 요청 문서가 없습니다</div>';

    const pi = document.getElementById('panel-inbox');
    if (pi) pi.innerHTML = myInbox.length ? myInbox.slice(0,8).map(d=>rowHtml(d)).join('') : '<div class="panel-empty">수신된 문서가 없습니다</div>';

    const pm = document.getElementById('panel-my-docs');
    if (pm) pm.innerHTML = myDocs.length ? myDocs.slice(0,8).map(d=>rowHtml(d)).join('') : '<div class="panel-empty">작성한 문서가 없습니다</div>';

    const pp = document.getElementById('panel-posted');
    if (pp) pp.innerHTML = postedAll.length ? postedAll.slice(0,8).map(d=>rowHtml(d)).join('') : '<div class="panel-empty">게시된 문건이 없습니다</div>';

  } catch(e) { console.error('renderEdocHome:', e); }
}

let _approvePending = [], _approveDone = [];
async function loadApproveData() {
  if (!window._db || !_user) return;
  _approvePending = []; _approveDone = [];
  try {
    const { getDocs, collection } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const DOC_TYPES = ['daily','leave','resign','cert','purchase','expense'];
    const myName = _myInfo?.name || '';

    for (const dtype of DOC_TYPES) {
      const snap = await getDocs(collection(db, `edoc_${dtype}`));
      snap.forEach(doc => {
        const data = {id:doc.id, dtype, ...doc.data()};
        const line = data.approvalLine || [];
        line.forEach((step, idx) => {
          if (step.role === '회람' || step.role === '수신' || step.role === '작성') return;
          const uidMatch = step.uid === _user.uid || (!step.uid && step.name === myName);
          if (!uidMatch) return;
          const prevDone = line.slice(0,idx).every(p => p.role==='작성' || p.status==='approved' || p.status==='done');
          if (prevDone && step.status === 'pending' && (data.status==='pending' || data.status==='reviewing')) {
            _approvePending.push(data);
          } else if (['approved','rejected','posted'].includes(data.status)) {
            _approveDone.push(data);
          }
        });
      });
    }
    _approvePending = _approvePending.filter((d,i,a)=>a.findIndex(x=>x.id===d.id)===i);
    _approveDone = _approveDone.filter((d,i,a)=>a.findIndex(x=>x.id===d.id)===i);
    _approvePending.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    _approveDone.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  } catch(e) {
    const wrap = document.getElementById('approve-list');
    if (wrap) wrap.innerHTML = `<div style="color:#DC2626;padding:20px;">오류: ${e.message}</div>`;
  }
}

window.quickApprove = async function(docId, dtype, docData) {
  const d = typeof docData === 'string' ? JSON.parse(docData) : docData;
  const choice = confirm(`[${d.title||'문서'}]
✅ 확인 = 승인 / ❌ 취소 = 반려`);
  const newStatus = choice ? 'approved' : 'rejected';
  if (!confirm(`[${choice?'승인':'반려'}] 처리하시겠습니까?`)) return;
  try {
    const { doc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const approverName = _myInfo?.name || _user?.displayName || '';
    const myUid = _user?.uid;
    const line = (d.approvalLine||[]).map(s => {
      const uidMatch = s.uid === myUid || (!s.uid && s.name === approverName);
      if (uidMatch && s.status === 'pending' && s.role !== '회람' && s.role !== '수신')
        return {...s, uid: myUid, status: choice ? 'approved' : 'rejected', approvedBy: approverName, approvedAt: new Date().toISOString()};
      return s;
    });
    await setDoc(doc(db, `edoc_${dtype}`, docId), {
      status: newStatus, approvalLine: line,
      approvedBy: approverName, approvedAt: new Date().toISOString(),
    }, {merge: true});
    alert(`✅ ${choice?'승인':'반려'} 처리되었습니다.`);
    renderEdocHome();
  } catch(e) { alert('오류: '+e.message); }
};

async function loadPortalUsers() {

    const { getDocs, collection, query, where } =
      await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');

    _portalUsers = [];
    snap.forEach(d => _portalUsers.push({uid:d.id,...d.data()}));
    _portalUsers.sort((a,b)=>(a.empNo||'').localeCompare(b.empNo||'','ko',{numeric:true}));
  } catch(e) { console.warn('loadPortalUsers:', e.message); }
}

// 이름으로 portal_user 찾기 (결재라인 고정자 지정용)
function findUserByName(name) {
  const u = _portalUsers.find(u => u.name === name);
  return u ? { uid:u.uid, name:u.name, rank:u.rank||'' } : { uid:'', name, rank:'' };
}

// 문서별 고정 결재라인 생성 (연차신청서와 동일한 회람 방식)
// 반환: approvalLine 배열 (작성=본인 + 지정된 결재자/회람)
function buildFixedApprovalLine(dtype) {
  // 작성 단계 (본인)
  const line = [
    { role:'작성', uid:_user.uid, name:_myInfo?.name||'', rank:_myInfo?.rank||'', status:'draft' },
  ];
  const cfg = DOC_CONFIG[dtype] || {};
  const approvers = cfg.approvers || [];  // 결재자 이름 배열
  const ccList = cfg.cc || [];            // 회람 이름 배열
  approvers.forEach((nm, i) => {
    const u = findUserByName(nm);
    line.push({ role: approvers.length>1?`결재${i+1}`:'결재', uid:u.uid, name:u.name, rank:u.rank, status:'pending' });
  });
  ccList.forEach(nm => {
    const u = findUserByName(nm);
    line.push({ role:'회람', uid:u.uid, name:u.name, rank:u.rank, status:'pending' });
  });
  return line;
}

function calcLeaveDays(startDate, endDate, leaveType) {
  if (leaveType && (leaveType.includes('반차'))) return 0.5;
  if (!startDate || !endDate) return '';
  const s = new Date(startDate), e = new Date(endDate);
  if (isNaN(s)||isNaN(e)) return '';
  let days = 0;
  const cur = new Date(s);
  while (cur <= e) {
    const dow = cur.getDay();
    if (dow !== 0 && dow !== 6) days++;
    cur.setDate(cur.getDate()+1);
  }
  return days;
}

function leaveCalcDays() {

  const d = calcLeaveDays(s, e, t);

  if (el && d !== '') el.value = d;
}

window.leaveSave = async function(status) {
  if (!window._db || !_user) { alert('로그인이 필요합니다.'); return; }
  const title   = document.getElementById('lv-title')?.value?.trim();
  const type    = document.getElementById('lv-type')?.value;

  const ap1Rank = ap1sel?.options[ap1sel.selectedIndex]?.dataset?.rank||'';

  if (!title) return alert('제목을 입력해 주세요.');
  if (!start||!end) return alert('시작일과 종료일을 입력해 주세요.');

  if (status==='pending' && !ap1Uid) return alert('결재1을 선택해 주세요.');

  // 결재2 고정자(김종화) uid 확보
  const ap2User = _portalUsers.find(u => u.email==='jh.kim@jhsol.kr') || {};

  const ap2Name = ap2User.name || '김종화';
  const ap2Rank = ap2User.rank || '부사장';

  const approvalLine = [
    { role:'작성', uid:_user.uid, name:_myInfo?.name||'', rank:_myInfo?.rank||'', status:'draft' },
    { role:'결재1', uid:ap1Uid, name:ap1Name, rank:ap1Rank, status:'pending' },

  const data = {
    dtype:'leave', status, title,
    leaveType:type, startDate:start, endDate:end, days,
    reason, contact,
    deputyUid:depUid, deputyName:depName,
    authorUid:_user.uid, authorName:_myInfo?.name||'', authorRank:_myInfo?.rank||'', authorDept:_myInfo?.dept||'',
    approvalLine,
    createdAt: serverTimestamp(),
  };

  try {
    const { addDoc, setDoc, doc, collection } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const editId = window._leaveEditId;
    if (editId) {
      // 수정 모드: 기존 문서 업데이트 (createdAt 유지)
      const {createdAt:_, ...updateData} = data;
      await setDoc(doc(window._db,'edoc_leave',editId), updateData, {merge:true});
      window._leaveEditId = null;
      alert(status==='pending'?'✅ 상신 완료!':'💾 수정 저장 완료');
    } else {
      await addDoc(collection(window._db,'edoc_leave'), data);
      alert(status==='pending'?'✅ 상신 완료!':'💾 임시저장 완료');
    }
    renderLeaveMain();
  } catch(e) { alert('오류: '+e.message); }
};

    const allDocs = []; snap.forEach(d=>allDocs.push({id:d.id,...d.data()}));
    const myUid = _user?.uid;
    // 볼 수 있는 문서:
    // - 관리자: 전체
    // - 일반: 게시됨(모두공개) OR 내가 작성 OR 결재라인에 내 uid 포함
    const canView = (d) => {
      if (_isAdmin) return true;
      if (d.status === 'posted') return true;
      if (d.authorUid === myUid) return true;
      return (d.approvalLine||[]).some(s => s.uid === myUid);
    };
    const docs = allDocs.filter(canView);
    docs.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

    const STATUS = { draft:'임시저장', pending:'결재대기', reviewing:'검토중', approved:'승인', rejected:'반려', posted:'게시' };
    const STATUS_COLOR = { draft:'#9AAABF', pending:'#F59E0B', reviewing:'#3B82F6', approved:'#16A34A', rejected:'#DC2626', posted:'#1D5BA6' };
    const fmtD = ts => ts?.seconds ? new Date(ts.seconds*1000).toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}) : '-';

    const wrap = document.getElementById('doc-list-wrap');
    if (!docs.length) { wrap.innerHTML='<div class="panel-empty" style="padding:40px;">등록된 문서가 없습니다.</div>'; return; }

    wrap.innerHTML = `<table class="ptable">
      <thead><tr><th style="text-align:left;">제목</th><th>작성자</th><th>작성일</th><th>상태</th></tr></thead>
      <tbody>
        ${docs.map(d=>`
          <tr onclick="docDetail(${JSON.stringify(d).replace(/"/g,'&quot;')}, '${dtype}')">
            <td style="text-align:left;font-weight:600;">${d.title||'(제목없음)'}</td>
            <td>${d.authorName||'-'}</td>
            <td style="color:#5C6F8A;">${fmtD(d.createdAt)}</td>
            <td><span class="status-pill" style="background:${STATUS_COLOR[d.status]||'#9AAABF'}22;color:${STATUS_COLOR[d.status]||'#9AAABF'};">${STATUS[d.status]||d.status}</span></td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  } catch(e) {
    document.getElementById('doc-list-wrap').innerHTML = `<div style="color:#DC2626;padding:20px;">오류: ${e.message}</div>`;
  }
};

// ── A4 출력 / PDF 저장 (모든 전자결재 문서 공통) ──
window.printDocA4 = function(d, dtype) {
  if (typeof d === 'string') { try { d = JSON.parse(d); } catch(e){} }
  const TYPE_LABEL = { daily:'업무일지', leave:'연차신청서', resign:'퇴직원서', cert:'재직증명서', purchase:'구매품의서', expense:'지출결의서' };

  const docLabel = TYPE_LABEL[dtype] || (cfg.label) || '문서';

  // 본문 필드 행 구성
  let bodyRows = '';
  if (dtype === 'daily') {
    bodyRows = `
      <tr><th>작성일</th><td>${d.date||'-'}</td></tr>

  } else if (dtype === 'leave') {
    bodyRows = `
      <tr><th>휴가 종류</th><td>${d.leaveType||'-'}</td></tr>
      <tr><th>시작일</th><td>${d.startDate||'-'}</td></tr>
      <tr><th>종료일</th><td>${d.endDate||'-'}</td></tr>
      <tr><th>일수</th><td>${d.days||'-'}일</td></tr>
      <tr><th>사유</th><td style="white-space:pre-wrap;">${d.reason||'-'}</td></tr>

  // 결재란 (도장 박스)

      <div style="font-size:11px;border-top:1px solid #000;padding:3px;">${s.name||''}<br><span style="font-size:9px;color:#555;">${s.rank||''}</span></div>

  const approvalTable = `
    <table style="border-collapse:collapse;margin-left:auto;">
      <tr>${approvers.map(stampCell).join('')}</tr>

  <title>${d.title||docLabel}</title>

    @page { size:A4; margin:18mm; }

// 상세화면 "뒤로/목록" 버튼 클릭 시 호출. 직전 화면으로 이동 후 즉시 초기화.
window.docDetailBack = function() {

window.docDetail = function(d, dtype) {
  const el = document.getElementById(`tab-${dtype}`); if(!el) return;
  const cfg = DOC_CONFIG[dtype];
  const STATUS = { draft:'임시저장', pending:'결재대기', reviewing:'검토중', approved:'승인', rejected:'반려', posted:'게시' };
  const STATUS_COLOR = { draft:'#9AAABF', pending:'#F59E0B', reviewing:'#3B82F6', approved:'#16A34A', rejected:'#DC2626', posted:'#1D5BA6' };
  const fmtD = ts => ts?.seconds ? new Date(ts.seconds*1000).toLocaleDateString('ko-KR') : '-';
  // 결재함 등 다른 탭에서 진입했다면 그 화면으로, 아니면 기존처럼 해당 문서함 목록으로
  const defaultBackFn = dtype==='leave' ? 'renderLeaveMain()' : `renderDocList('${dtype}')`;
  const backFn = _detailBackFn ? 'docDetailBack()' : defaultBackFn;

  // leave 전용 필드 목록
  const leaveFields = [
    {key:'leaveType', label:'휴가 종류'},
    {key:'startDate', label:'시작일'},
    {key:'endDate',   label:'종료일'},
    {key:'days',      label:'일수'},
    {key:'reason',    label:'사유'},
    {key:'contact',   label:'비상연락처'},
    {key:'deputyName',label:'업무 대리인'},
  ];
  const displayFields = dtype==='leave' ? leaveFields : (cfg.fields||[]);
  const rows = displayFields.map(f=>`
    <div style="display:flex;padding:8px 0;border-bottom:1px solid #F0F4FA;font-size:12px;gap:12px;">
      <span style="color:#5C6F8A;font-weight:600;min-width:90px;flex-shrink:0;">${f.label}</span>
      <span style="color:#1A2540;word-break:break-all;">${d[f.key]||'-'}</span>
    </div>`).join('');

  const myUid = _user?.uid;
  const isOwner = myUid && d.authorUid === myUid;
  const line = d.approvalLine || [];

  // 내 결재 차례인지: uid 일치 OR (uid 비어있고 이름 일치), 이전 단계 완료, 내 상태 pending
  const myStepIdx = line.findIndex((s,i) => {
    if (s.role === '회람' || s.role === '수신') return false;
    const uidMatch = s.uid === myUid || (!s.uid && s.name === (_myInfo?.name||''));
    if (!uidMatch) return false;
    const prevDone = line.slice(0,i).every(p =>
      p.role==='작성' || p.status==='approved' || p.status==='done'
    );
    return prevDone && s.status === 'pending';
  });
  const isMyTurn = myStepIdx >= 0 && (d.status==='pending'||d.status==='reviewing');

  // 최종 결재자: 회람/수신/작성 제외하고 마지막 결재 역할
  const approverSteps = line.filter(s => s.role!=='회람' && s.role!=='수신' && s.role!=='작성');
  const lastApprover = approverSteps[approverSteps.length-1] || null;
  const isLastApprover = lastApprover && lastApprover.uid === myUid;

  // 결재 버튼: 내 차례이면 표시 (작성자 본인이어도 결재라인에 있으면 결재 가능)
  const canApprove = isMyTurn || (_isAdmin && (d.status==='pending'||d.status==='reviewing'));
  // 게시 버튼: 최종 결재자 + approved 상태
  const canPost = d.status==='approved' && (isLastApprover || _isAdmin);
  // 회수: 작성자 + pending/reviewing이지만 내 결재 차례가 아닐 때만
  const canRecall = isOwner && !isMyTurn && (d.status==='pending' || d.status==='reviewing');
  // 수정: 작성자 + draft(임시저장) 또는 rejected(반려)
  const canEdit = isOwner && (d.status==='draft' || d.status==='rejected');
  // 삭제: 작성자 + (draft/rejected) 또는 관리자
  const canDelete = (isOwner && (d.status==='draft'||d.status==='rejected')) || _isAdmin;

  el.innerHTML = `<div class="wrap2">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
      <button onclick="${backFn}" class="back-btn">‹ 목록</button>
      <span style="font-size:13px;font-weight:700;color:#1A2540;">${cfg.icon} 문서 상세</span>
    </div>
    <div class="form-card" style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">
        <div>
          <div style="font-size:16px;font-weight:800;color:#1A2540;margin-bottom:4px;">${d.title||'(제목없음)'}</div>
          <div style="font-size:11px;color:#5C6F8A;">${d.authorName||'-'} · ${fmtD(d.createdAt)}</div>
        </div>
        <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;background:${STATUS_COLOR[d.status]||'#9AAABF'}20;color:${STATUS_COLOR[d.status]||'#9AAABF'};white-space:nowrap;">${STATUS[d.status]||d.status}</span>
      </div>
      ${rows}
    </div>

    ${(d.approvalLine&&d.approvalLine.length) ? `
    <div class="form-card" style="margin-bottom:10px;">
      <div style="font-size:12px;font-weight:700;color:#1D5BA6;margin-bottom:10px;">✍️ 결재 라인</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${(d.approvalLine||[]).map(a=>{
          const roleColor = {작성:'#5C6F8A',결재1:'#1D5BA6',결재2:'#1D5BA6',결재:'#1D5BA6',수신:'#16A34A',회람:'#9AAABF'}[a.role]||'#9AAABF';
          const stColor = {draft:'#9AAABF',pending:'#F59E0B',done:'#16A34A',approved:'#16A34A',rejected:'#DC2626'}[a.status]||'#9AAABF';
          const stLabel = {draft: d.status==='draft'?'상신전':'완료', pending:'대기',done:'완료',approved:'승인',rejected:'반려'}[a.status]||a.status;
          return `<div style="background:#F4F7FB;border-radius:10px;padding:8px 12px;min-width:80px;text-align:center;">
            <div style="font-size:10px;font-weight:700;color:${roleColor};margin-bottom:3px;">${a.role}</div>
            <div style="font-size:12px;font-weight:700;color:#1A2540;">${a.name||'미지정'}</div>
            <div style="font-size:10px;color:#9AAABF;">${a.rank||''}</div>
            <div style="font-size:10px;font-weight:700;color:${stColor};margin-top:3px;">${stLabel}</div>
          </div>`;
        }).join('<span style="align-self:center;color:#9AAABF;font-size:16px;">›</span>')}
      </div>
    </div>` : ''}

    ${canApprove ? `
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <button onclick="docApprove('${d.id}','${dtype}','approved',${JSON.stringify(d).replace(/"/g,'&quot;')})" style="flex:1;padding:12px;background:#16A34A;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;">✅ 승인</button>
      <button onclick="docApprove('${d.id}','${dtype}','rejected',${JSON.stringify(d).replace(/"/g,'&quot;')})" style="flex:1;padding:12px;background:#DC2626;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;">❌ 반려</button>
    </div>` : ''}
    ${canPost ? `
    <div style="margin-bottom:10px;">
      <button onclick="docApprove('${d.id}','${dtype}','posted',${JSON.stringify(d).replace(/"/g,'&quot;')})" style="width:100%;padding:12px;background:#1D5BA6;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;">📤 게시 (최종)</button>
    </div>` : ''}
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      ${canRecall ? `<button onclick="docRecall('${d.id}','${dtype}')" style="flex:1;padding:11px;background:#F59E0B;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;">↩️ 회수</button>` : ''}
      ${canEdit ? `<button onclick="${dtype==='leave'?`renderLeaveWrite(${JSON.stringify(d).replace(/"/g,'&quot;')})`:`alert('임시저장/반려 문서는 삭제 후 재작성해 주세요.')`}" style="flex:1;padding:11px;background:#3B82F6;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;">✏️ 수정</button>` : ''}
      ${canDelete ? `<button onclick="docDelete('${d.id}','${dtype}')" style="flex:1;padding:11px;background:#fff;border:1px solid #DC2626;border-radius:10px;color:#DC2626;font-size:13px;font-weight:700;cursor:pointer;">🗑️ 삭제</button>` : ''}
    </div>
    ${(isOwner && d.status==='draft') ? `
    <div style="margin-bottom:10px;">
      <button onclick="${dtype==='leave' ? `renderLeaveWrite(${JSON.stringify(d).replace(/"/g,'&quot;')})` : `renderDocWrite('${dtype}')`}" style="width:100%;padding:13px;background:#1D5BA6;border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;">📨 수정 후 상신하기</button>
    </div>` : ''}
    <div style="margin-bottom:10px;">
      <button onclick='printDocA4(${JSON.stringify(d).replace(/'/g,"&#39;")}, "${dtype}")' style="width:100%;padding:12px;background:#fff;border:1px solid #1D5BA6;border-radius:12px;color:#1D5BA6;font-size:13px;font-weight:700;cursor:pointer;">🖨️ A4 출력 / PDF 저장</button>
    </div>
    <button onclick="${backFn}" class="back-btn" style="width:100%;padding:11px;text-align:center;border-radius:10px;">목록으로</button>
  </div>`;
};

window.docRecall = async function(docId, dtype) {
  if (!window._db) return;
  if (!confirm('이 문서를 회수하시겠습니까? 상신이 취소되고 임시저장 상태로 돌아갑니다.')) return;
  try {
    const { doc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    await setDoc(doc(db, `edoc_${dtype}`, docId), { status:'draft', recalledAt:serverTimestamp() }, { merge:true });
    alert('✅ 회수 완료. 임시저장 상태로 변경되었습니다.');
    if (dtype === 'daily' && typeof renderDailyList === 'function') renderDailyList();
    else renderDocList(dtype);
  } catch(e) { alert('오류: '+e.message); }
};

window.docDelete = async function(docId, dtype) {
  if (!window._db) return;
  if (!confirm('이 문서를 완전히 삭제하시겠습니까? 복구가 불가능합니다.')) return;
  try {
    const { doc, deleteDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    await deleteDoc(doc(db, `edoc_${dtype}`, docId));
    alert('🗑️ 삭제 완료');
    if (dtype === 'daily' && typeof renderDailyList === 'function') renderDailyList();
    else renderDocList(dtype);
  } catch(e) { alert('오류: '+e.message); }
};

window.docApprove = async function(docId, dtype, newStatus, docData) {
  if (!window._db) return;
  const labels = {approved:'승인', rejected:'반려', posted:'게시'};
  if (!confirm(`이 문서를 [${labels[newStatus]}] 처리하시겠습니까?`)) return;
  try {
    const { doc, setDoc, addDoc, collection } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const approverName = _myInfo?.name || _user?.displayName || _user?.email || '';
    const myUid = _user?.uid;

    // approvalLine 단계 상태 업데이트
    const rawData = typeof docData === 'string' ? JSON.parse(docData) : (docData||{});
    const origLine = rawData.approvalLine || [];

    // 내 단계 매칭: uid 일치 OR (uid 비어있고 이름 일치)
    const isMyStep = (s) => {
      if (s.role === '회람' || s.role === '수신' || s.role === '작성') return false;
      if (s.status !== 'pending') return false;
      return s.uid === myUid || (!s.uid && s.name === approverName);
    };

    const line = origLine.map(s => {
      if (!isMyStep(s)) return s;
      return {...s, uid: myUid, status: newStatus==='rejected'?'rejected':'approved', approvedBy:approverName, approvedAt:new Date().toISOString()};
    });

    // 문서 전체 status 결정
    let docStatus = newStatus;
    if (newStatus === 'approved') {
      const myIdx = origLine.findIndex(s => isMyStep(s));
      const hasNextApprover = myIdx >= 0 && origLine.slice(myIdx+1).some(s =>
        s.role !== '회람' && s.role !== '수신' && s.role !== '작성' && s.status === 'pending'
      );
      docStatus = hasNextApprover ? 'reviewing' : 'approved';
    }

    await setDoc(doc(db, `edoc_${dtype}`, docId), {
      status: docStatus,
      approvalLine: line,
      approvedBy: approverName,
      approvedAt: serverTimestamp()
    }, { merge:true });

    // 게시 + 연차신청서 → user_schedules에 일정 등록
    if (newStatus === 'posted' && dtype === 'leave' && rawData.startDate) {
      await addDoc(collection(db, 'user_schedules'), {
        text: `[연차] ${rawData.authorName||''} ${rawData.leaveType||'연차'} (${rawData.days||''}일)`,
        tag: 'off', tagLabel: rawData.leaveType||'연차',
        sdate: rawData.startDate||'', edate: rawData.endDate||rawData.startDate||'',
        stime: null, etime: null, isTodo: false, place: '',
        att: rawData.authorName||'', reg: _user?.email||'', savedAt: serverTimestamp(),
      });
      alert('✅ 게시 완료. 연차 일정이 PJT 캘린더에 자동 등록되었습니다.');
    } else {
      alert(`✅ ${labels[newStatus]} 처리되었습니다.`);
    }
    renderDocList(dtype);
  } catch(e) { alert('오류: '+e.message); }
};

</script>
