<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인사관리 · 제이에이치솔루션</title>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, doc, getDoc, getDocs, setDoc, collection, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCyQxBJ_ftfM0ImBXubmqD5gfzFR54iPmE",
    authDomain: "p4ph2-fab-506a7.firebaseapp.com",
    projectId: "p4ph2-fab-506a7",
    storageBucket: "p4ph2-fab-506a7.appspot.com",
    messagingSenderId: "36946317914",
    appId: "1:36946317914:web:c6ad5f3a1b98130c99fe63"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);

  // 정산서 일반 script에서 접근할 수 있도록 window에 노출
  window._db     = db;
  window._doc    = doc;
  window._getDoc = getDoc;
  window._setDoc = setDoc;
  // ── 섹터 정의 ──
  const SECTORS = [
    { id:'fiz', name:'3F FIZ',       qty:39,  devices: Array.from({length:39}, (_,i)=>`${801+i}`) },
    { id:'xob', name:'X-OB',         qty:19,  devices: Array.from({length:19}, (_,i)=>`${861+i}`) },
    { id:'c3',  name:'복합3동',       qty:14,  devices: Array.from({length:14}, (_,i)=>`${351+i}`) },
    { id:'c4',  name:'복합4동',       qty:14,  devices: ['302A','302B','302C','302D','302E','302F','302G','302H','302I','302J','302K','302L','302M','302N'] },
    { id:'wob', name:'W-OB',         qty:81,  devices: Array.from({length:81}, (_,i)=>`W-${101+i}`) },
    { id:'mfr', name:'2F 제조부속실', qty:16,  devices: ['801','802','811','812','813','814','815','816','817','818','819','820','821','822','823','824'] },
  ];


  // ── 과거 고정 데이터 (Firebase 이전 기록) ──
  const PAST_PROGRESS_DAILY = {
    '2026-06-17': { fiz: { '801_반입':true,'802_반입':true,'803_반입':true,'804_반입':true,'805_반입':true,'806_반입':true } },
    '2026-06-18': { fiz: { '807_반입':true,'808_반입':true,'809_반입':true,'820_반입':true,'821_반입':true,'822_반입':true,'823_반입':true,'801_입고검사':true,'802_입고검사':true,'803_입고검사':true,'804_입고검사':true,'805_입고검사':true,'806_입고검사':true } },
    '2026-06-19': { fiz: { '824_반입':true,'825_반입':true,'826_반입':true,'827_반입':true,'828_반입':true,'829_반입':true,'830_반입':true,'807_입고검사':true,'808_입고검사':true,'809_입고검사':true,'820_입고검사':true,'821_입고검사':true,'822_입고검사':true,'823_입고검사':true } },
    '2026-06-20': { fiz: { '824_입고검사':true,'825_입고검사':true,'826_입고검사':true,'827_입고검사':true,'828_입고검사':true,'829_입고검사':true,'830_입고검사':true } },
  };

  const INSTALL_CHECKS = ['내진스토퍼','다이크','실링','동판','결선'];

  function isInstallDone(checks, deviceId) {
    const isChk = (k) => checks[k] === 1 || checks[k] === true;
    return INSTALL_CHECKS.every(c => isChk(`${deviceId}_${c}`));
  }

  // ── 인증 ──
  // 포털 경유 여부 확인 — ?via=portal 없으면 차단
  (function() {
    const viaPortal = new URLSearchParams(location.search).get('via') === 'portal';
    if (viaPortal) {
      document.documentElement.classList.add('portal-embed');
      showScreen('app');
    } else {
      showScreen('blocked');
    }
  })();

  // ── 공정 현황 ──
  let progressYear  = new Date().getFullYear();
  let progressMonth = new Date().getMonth() + 1;
  let allProgressData = {};
  let progressView = 'month';
  let selectedSector = null;

  window.onProgressTabEnter = () => {
    progressYear  = new Date().getFullYear();
    progressMonth = new Date().getMonth() + 1;
    document.getElementById('progress-month-label').textContent =
      `${progressYear}년 ${progressMonth}월`;
    loadProgress();
  };

  window.changeProgressMonth = (delta) => {
    progressMonth += delta;
    if (progressMonth > 12) { progressMonth = 1; progressYear++; }
    if (progressMonth < 1)  { progressMonth = 12; progressYear--; }
    document.getElementById('progress-month-label').textContent =
      `${progressYear}년 ${progressMonth}월`;
    loadProgress();
  };

  async function loadProgress() {
    showProgressLoading(true);
    allProgressData = {};
    const yearMonth = `${progressYear}-${String(progressMonth).padStart(2,'0')}`;
    const daysInMonth = new Date(progressYear, progressMonth, 0).getDate();

    // 기존 구조: progress_checks_{dateKey}/{zoneId} → { checks: {...} }
    // 날짜별 병렬 처리 (Promise.all)
    const promises = [];
    for (let d = 1; d <= daysInMonth; d++) {
      const dateKey = `${progressYear}-${String(progressMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      promises.push((async () => {
        const dayData = {};
        const sectorPromises = SECTORS.map(async s => {
          try {
            const snap = await getDoc(doc(db, `progress_checks_${dateKey}`, s.id));
            if (snap.exists()) {
              // checks 맵에서 꺼내기
              dayData[s.id] = snap.data().checks || {};
            }
          } catch(e) {}
        });
        await Promise.all(sectorPromises);
        if (Object.keys(dayData).length > 0) allProgressData[dateKey] = dayData;
      })());
    }

    // 과거 고정 데이터 병합
    Object.entries(PAST_PROGRESS_DAILY).forEach(([dateKey, dayData]) => {
      if (!dateKey.startsWith(yearMonth)) return;
      if (!allProgressData[dateKey]) allProgressData[dateKey] = {};
      Object.entries(dayData).forEach(([sectorId, checks]) => {
        if (!allProgressData[dateKey][sectorId]) allProgressData[dateKey][sectorId] = {};
        Object.assign(allProgressData[dateKey][sectorId], checks);
      });
    });

    await Promise.all(promises);
    showProgressLoading(false);
    renderProgressMonth();
  }

  function showProgressLoading(on) {
    document.getElementById('progress-loading').style.display = on ? 'flex' : 'none';
    document.getElementById('progress-content').style.display = on ? 'none' : 'block';
  }

  // 장비별 누적 집계 (중복 없이)
  function calcDeviceCumulative() {
    const result = {};
    SECTORS.forEach(s => { result[s.id] = { banip:0, install:0, devices:{} }; });
    const sortedDates = Object.keys(allProgressData).sort();
    sortedDates.forEach(dateKey => {
      const dayData = allProgressData[dateKey];
      SECTORS.forEach(s => {
        if (!dayData[s.id]) return;
        const checks = dayData[s.id];
        s.devices.forEach(dev => {
          if (!result[s.id].devices[dev])
            result[s.id].devices[dev] = { banip:false, install:false, banipDate:null, installDate:null };
          if ((checks[`${dev}_반입`] === 1 || checks[`${dev}_반입`] === true) && !result[s.id].devices[dev].banip) {
            result[s.id].devices[dev].banip = true;
            result[s.id].devices[dev].banipDate = dateKey;
          }
          if (isInstallDone(checks, dev) && !result[s.id].devices[dev].install) {
            result[s.id].devices[dev].install = true;
            result[s.id].devices[dev].installDate = dateKey;
          }
        });
      });
    });
    SECTORS.forEach(s => {
      Object.values(result[s.id].devices).forEach(d => {
        if (d.banip)   result[s.id].banip++;
        if (d.install) result[s.id].install++;
      });
    });
    return result;
  }

  // 일별 집계
  function calcDailyForSector(sectorId) {
    const sector = SECTORS.find(s => s.id === sectorId);
    const rows = [];
    const cumBanip = new Set(), cumInstall = new Set();
    Object.keys(allProgressData).sort().forEach(dateKey => {
      const dayData = allProgressData[dateKey];
      if (!dayData[sectorId]) return;
      const checks = dayData[sectorId];
      let todayBanip = 0, todayInstall = 0;
      sector.devices.forEach(dev => {
        if ((checks[`${dev}_반입`] === 1 || checks[`${dev}_반입`] === true) && !cumBanip.has(dev))   { cumBanip.add(dev);   todayBanip++; }
        if (isInstallDone(checks, dev)   && !cumInstall.has(dev)) { cumInstall.add(dev); todayInstall++; }
      });
      if (todayBanip > 0 || todayInstall > 0)
        rows.push({ date:dateKey, banip:todayBanip, cumBanip:cumBanip.size, install:todayInstall, cumInstall:cumInstall.size });
    });
    return rows;
  }


  // ── 공수 집계 ──
  const WORKERS = [
    {id:'w1', name:'서민우', role:'팀장'},
    {id:'w2', name:'김혁',   role:''},
    {id:'w3', name:'심산',   role:''},
    {id:'w4', name:'유지범', role:''},
    {id:'w5', name:'이미정', role:''},
    {id:'w6', name:'이승준', role:''},
    {id:'w7', name:'정대웅', role:''},
    {id:'w8', name:'태성원', role:''},
    {id:'w9', name:'미첼',   role:''},
  ];

  let mandayYear  = new Date().getFullYear();
  let mandayMonth = new Date().getMonth() + 1;

  window.onMandayTabEnter = () => {
    mandayYear  = new Date().getFullYear();
    mandayMonth = new Date().getMonth() + 1;
    document.getElementById('manday-month-label').textContent =
      `${mandayYear}년 ${mandayMonth}월`;
    loadManday();
  };

  window.changeMandayMonth = (delta) => {
    mandayMonth += delta;
    if (mandayMonth > 12) { mandayMonth = 1; mandayYear++; }
    if (mandayMonth < 1)  { mandayMonth = 12; mandayYear--; }
    document.getElementById('manday-month-label').textContent =
      `${mandayYear}년 ${mandayMonth}월`;
    loadManday();
  };

  async function loadManday() {
    document.getElementById('manday-loading').style.display = 'flex';
    document.getElementById('manday-content').style.display = 'none';

    const daysInMonth = new Date(mandayYear, mandayMonth, 0).getDate();
    const totals = {};
    WORKERS.forEach(w => { totals[w.id] = 0; });
    let totalWorkDays = 0;

    const promises = [];
    const dailyData = {};
    window._mandayCache = window._mandayCache || {};

    // worker_manday는 날짜별 문서 — getDocs로 월 전체 병렬 조회
    for (let d = 1; d <= daysInMonth; d++) {
      const dateKey = `${mandayYear}-${String(mandayMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      promises.push((async () => {
        try {
          const snap = await getDoc(doc(db, 'worker_manday', dateKey));
          if (snap.exists()) {
            const md = snap.data().md || {};
            dailyData[dateKey] = md;
            window._mandayCache[dateKey] = md;
            Object.entries(md).forEach(([wid, val]) => {
              if (totals[wid] !== undefined) totals[wid] += val;
            });
          }
        } catch(e) {}
      })());
    }
    await Promise.all(promises);

    // 전체 공수 합계
    const totalMd = Object.values(totals).reduce((a,b) => a+b, 0);
    // 출역 일수 (공수 > 0인 날 수, 인원 무관)
    const workDayCount = Object.keys(dailyData).length;

    renderMandayTable(totals, totalMd, workDayCount, daysInMonth);

    document.getElementById('manday-loading').style.display = 'none';
    document.getElementById('manday-content').style.display = 'block';
  }


  // ── 공수 엑셀 다운로드 ──
  window.downloadMandayExcel = () => {
    const year = mandayYear, month = mandayMonth;
    const daysInMonth = new Date(year, month, 0).getDate();
    const TEAM_RATE = 190000;

    // 날짜별 공수 데이터 수집 (Firebase 캐시에서)
    // mandayCache에서 읽기
    const dayData = {};
    for (let d = 1; d <= daysInMonth; d++) {
      const dateKey = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if (window._mandayCache && window._mandayCache[dateKey]) {
        dayData[d] = window._mandayCache[dateKey];
      }
    }
    // 캐시가 비어있으면 경고
    if (Object.keys(dayData).length === 0) {
      alert('공수 데이터를 먼저 불러와주세요. (탭 재진입 후 시도)');
      return;
    }

    // 헤더 행
    const dayHeaders = Array.from({length: daysInMonth}, (_,i) => `${i+1}일`);
    const header = ['이름', ...dayHeaders, '출근일수', '공수합계'];

    const rows = [header];
    const totals = {};
    WORKERS.forEach(w => { totals[w.id] = 0; });

    // 인원별 행
    WORKERS.forEach(w => {
      const row = [w.role ? `${w.name} ${w.role}` : w.name];
      let attend = 0;
      for (let d = 1; d <= daysInMonth; d++) {
        const md = (dayData[d] || {})[w.id];
        if (md) { row.push(md); attend++; totals[w.id] += md; }
        else row.push(null);
      }
      row.push(attend);
      row.push(totals[w.id] || null);
      rows.push(row);
    });

    // 투입 인원 행
    const crewRow = ['투입 인원'];
    for (let d = 1; d <= daysInMonth; d++) {
      const crew = WORKERS.filter(w => (dayData[d]||{})[w.id]).length;
      crewRow.push(crew || null);
    }
    crewRow.push(null);
    crewRow.push(crewRow.slice(1, daysInMonth+1).reduce((a,b)=>a+(b||0),0));
    rows.push(crewRow);

    // 투입 공수 행
    const mdRow = ['투입 공수'];
    for (let d = 1; d <= daysInMonth; d++) {
      const total = Object.values(dayData[d]||{}).reduce((a,b)=>a+b,0);
      mdRow.push(total || null);
    }
    mdRow.push(null);
    mdRow.push(mdRow.slice(1, daysInMonth+1).reduce((a,b)=>a+(b||0),0));
    rows.push(mdRow);

    // 합계/단가/지급계
    const totalMd = Object.values(totals).reduce((a,b)=>a+b,0);
    rows.push([]);
    rows.push(['전체 공수 합계', ...Array(daysInMonth+1).fill(null), totalMd]);
    rows.push(['팀 단가',        ...Array(daysInMonth+1).fill(null), TEAM_RATE]);
    rows.push([`${year}년 ${month}월 지급계`, ...Array(daysInMonth+1).fill(null), totalMd * TEAM_RATE]);

    // SheetJS로 엑셀 생성
    const ws = XLSX.utils.aoa_to_sheet(rows);

    // 열 너비
    const wscols = [{wch:14}];
    for (let i=0; i<daysInMonth; i++) wscols.push({wch:5});
    wscols.push({wch:8}, {wch:10});
    ws['!cols'] = wscols;

    // 회계 서식 (₩ 기호 포함) 적용
    // 팀단가 행, 지급계 행의 마지막 열에 적용
    const totalRows = rows.length;
    const lastCol = daysInMonth + 2; // 공수합계 열 인덱스 (0-based)
    const acctFmt = '_("₩"* #,##0_);_("₩"* (#,##0);_("₩"* "-"_);_(@_)';

    // 팀단가 행 = totalRows - 2 (0-based), 지급계 행 = totalRows - 1
    [totalRows - 2, totalRows - 1].forEach(rowIdx => {
      const cellAddr = XLSX.utils.encode_cell({r: rowIdx, c: lastCol});
      if (ws[cellAddr]) {
        if (!ws[cellAddr].s) ws[cellAddr].s = {};
        ws[cellAddr].z = acctFmt;
      }
    });

    // 스타일 적용을 위해 write 옵션에 cellStyles 추가
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '공수집계');
    XLSX.writeFile(wb, `${year}년${String(month).padStart(2,'0')}월_공수집계표.xlsx`, {cellStyles: true});
  };
  function renderMandayTable(totals, totalMd, workDayCount, daysInMonth) {
    // 요약 카드
    document.getElementById('manday-summary').innerHTML = `
      <div class="summary-cards" style="grid-template-columns:1fr 1fr 1fr;">
        <div class="s-card"><div class="s-val">${daysInMonth}일</div><div class="s-label">해당 월 일수</div></div>
        <div class="s-card blue"><div class="s-val">${workDayCount}일</div><div class="s-label">작업 일수</div></div>
        <div class="s-card accent"><div class="s-val">${totalMd.toFixed(1)}</div><div class="s-label">월 총 공수</div></div>
      </div>`;

    // 인원별 테이블
    let rows = '';
    WORKERS.forEach((w, i) => {
      const md = totals[w.id] || 0;
      rows += `<tr style="background:${i%2===0?'#fff':'#F8FAFD'}">
        <td style="padding:10px 12px;border-bottom:1px solid #F0F4FA;font-weight:600;color:#1A2540;text-align:left;">
          ${w.name}${w.role ? `<span style="font-size:10px;color:#9AAABF;margin-left:4px;">${w.role}</span>` : ''}
        </td>
        <td style="padding:10px 12px;border-bottom:1px solid #F0F4FA;text-align:center;color:${md>0?'#1D5BA6':'#9AAABF'};font-weight:${md>0?700:400};">
          ${md > 0 ? md.toFixed(1) : '-'}
        </td>

      </tr>`;
    });

    const TEAM_RATE = 190000;
    const payment = totalMd * TEAM_RATE;

    document.getElementById('manday-table-wrap').innerHTML = `
      <div style="background:#fff;border-radius:12px;border:1px solid #DDE4EF;overflow:hidden;box-shadow:0 1px 4px rgba(29,91,166,0.06);">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead>
            <tr style="background:#E8F0FB;">
              <th style="color:#1D5BA6;font-size:11px;font-weight:700;padding:9px 12px;text-align:left;border-bottom:1px solid #DDE4EF;">이름</th>
              <th style="color:#1D5BA6;font-size:11px;font-weight:700;padding:9px 12px;text-align:center;border-bottom:1px solid #DDE4EF;">월 공수</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
          <tfoot>
            <tr style="background:#E8F0FB;">
              <td style="padding:10px 12px;font-weight:700;color:#1D5BA6;text-align:left;">합계</td>
              <td style="padding:10px 12px;font-weight:700;color:#1D5BA6;text-align:center;">${totalMd.toFixed(1)}</td>
            </tr>
            <tr style="background:#F8FAFD;">
              <td style="padding:10px 12px;color:#5C6F8A;font-size:12px;text-align:left;">팀단가</td>
              <td style="padding:10px 12px;color:#5C6F8A;font-size:12px;text-align:center;">₩${TEAM_RATE.toLocaleString()}</td>
            </tr>
            <tr style="background:#1D5BA6;">
              <td style="padding:12px 12px;font-weight:700;color:#fff;font-size:13px;text-align:left;">${mandayYear}년 ${mandayMonth}월 지급계</td>
              <td style="padding:12px 12px;font-weight:800;color:#fff;font-size:15px;text-align:center;">₩${payment.toLocaleString()}</td>
            </tr>
          </tfoot>
        </table>
      </div>`;
  }

  // ── 렌더: 월별 ──
  window.renderProgressMonth = () => {
    progressView = 'month'; selectedSector = null;
    document.getElementById('progress-back').style.display = 'none';
    document.getElementById('progress-view-title').textContent = '섹터별 월간 요약';
    const totals = calcDeviceCumulative();
    let totalBanip = 0, totalInstall = 0;
    SECTORS.forEach(s => { totalBanip += totals[s.id].banip; totalInstall += totals[s.id].install; });
    const totalRate = ((totalBanip + totalInstall) / (183 * 2) * 100).toFixed(1);

    // 요약 카드
    document.getElementById('progress-summary').innerHTML = `
      <div class="summary-cards">
        <div class="s-card"><div class="s-val">${183}대</div><div class="s-label">전체 물량</div></div>
        <div class="s-card blue"><div class="s-val">${totalBanip}대</div><div class="s-label">반입 누계</div></div>
        <div class="s-card blue"><div class="s-val">${totalInstall}대</div><div class="s-label">설치 누계</div></div>
        <div class="s-card accent"><div class="s-val">${totalRate}%</div><div class="s-label">전체 공정율</div></div>
      </div>`;

    let rows = '';
    SECTORS.forEach(s => {
      const t = totals[s.id];
      const rate = ((t.banip + t.install) / (s.qty * 2) * 100).toFixed(1);
      rows += `<tr class="clickable" onclick="showDayView('${s.id}')">
        <td class="td-link">${s.name}</td>
        <td>${s.qty}</td><td>${t.banip}</td><td>${t.install}</td>
        <td><span class="rate-pill">${rate}%</span></td>
      </tr>`;
    });
    document.getElementById('progress-table-wrap').innerHTML = `
      <table class="ptable">
        <thead><tr><th>섹터</th><th>물량</th><th>반입</th><th>설치</th><th>공정율</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr class="sum-row">
          <td>합계</td><td>183</td><td>${totalBanip}</td><td>${totalInstall}</td>
          <td><span class="rate-pill accent">${totalRate}%</span></td>
        </tr></tfoot>
      </table>
      <div class="table-hint">섹터 행 클릭 → 일별 조회</div>`;
  };

  // ── 렌더: 일별 ──
  window.showDayView = (sectorId) => {
    progressView = 'day'; selectedSector = sectorId;
    const sector = SECTORS.find(s => s.id === sectorId);
    document.getElementById('progress-back').style.display = 'inline-flex';
    document.getElementById('progress-view-title').textContent = `${sector.name} · 일별 조회`;
    document.getElementById('progress-summary').innerHTML = '';
    const rows = calcDailyForSector(sectorId);
    if (!rows.length) {
      document.getElementById('progress-table-wrap').innerHTML = '<div class="no-data">이 달 데이터가 없습니다.</div>';
      return;
    }
    let html = `<table class="ptable">
      <thead><tr><th>날짜</th><th>반입(당일)</th><th>반입 누계</th><th>설치(당일)</th><th>설치 누계</th></tr></thead>
      <tbody>`;
    rows.forEach(r => {
      html += `<tr class="clickable" onclick="showDeviceView('${sectorId}','${r.date}')">
        <td class="td-link">${r.date.slice(5)}</td>
        <td class="${r.banip>0?'pos':''}">${r.banip>0?'+'+r.banip:'-'}</td>
        <td><strong>${r.cumBanip}</strong></td>
        <td class="${r.install>0?'pos':''}">${r.install>0?'+'+r.install:'-'}</td>
        <td>${r.cumInstall}</td>
      </tr>`;
    });
    html += `</tbody></table><div class="table-hint">날짜 행 클릭 → 장비별 조회</div>`;
    document.getElementById('progress-table-wrap').innerHTML = html;
  };

  // ── 렌더: 장비별 ──
  window.showDeviceView = (sectorId, filterDate) => {
    progressView = 'device';
    const sector = SECTORS.find(s => s.id === sectorId);
    document.getElementById('progress-view-title').textContent =
      `${sector.name} · ${filterDate ? filterDate.slice(5)+' ' : ''}장비별`;

    const devState = {};
    sector.devices.forEach(dev => { devState[dev] = { banip:false, install:false, banipDate:null, installDate:null }; });
    Object.keys(allProgressData).sort().forEach(dateKey => {
      const dayData = allProgressData[dateKey];
      if (!dayData[sectorId]) return;
      const checks = dayData[sectorId];
      sector.devices.forEach(dev => {
        if ((checks[`${dev}_반입`] === 1 || checks[`${dev}_반입`] === true) && !devState[dev].banip) {
          devState[dev].banip = true; devState[dev].banipDate = dateKey;
        }
        if (isInstallDone(checks, dev) && !devState[dev].install) {
          devState[dev].install = true; devState[dev].installDate = dateKey;
        }
      });
    });

    const filtered = filterDate
      ? sector.devices.filter(dev => devState[dev].banipDate === filterDate || devState[dev].installDate === filterDate)
      : sector.devices.filter(dev => devState[dev].banip || devState[dev].install);

    if (!filtered.length) {
      document.getElementById('progress-table-wrap').innerHTML = '<div class="no-data">해당 날짜 작업 장비가 없습니다.</div>';
      return;
    }
    let html = `<table class="ptable">
      <thead><tr><th>장비번호</th><th>반입</th><th>반입일</th><th>설치</th><th>설치일</th></tr></thead>
      <tbody>`;
    filtered.forEach(dev => {
      const d = devState[dev];
      html += `<tr>
        <td><strong>${dev}</strong></td>
        <td>${d.banip?'<span class="chk">✅</span>':'-'}</td>
        <td class="date-cell">${d.banipDate?d.banipDate.slice(5):'-'}</td>
        <td>${d.install?'<span class="chk">✅</span>':'-'}</td>
        <td class="date-cell">${d.installDate?d.installDate.slice(5):'-'}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('progress-table-wrap').innerHTML = html;
  };

  window.progressBack = () => {
    if (progressView === 'device' && selectedSector) showDayView(selectedSector);
    else renderProgressMonth();
  };

</script>

async function loadHomeKpis() {
  if (!window._db) { setTimeout(loadHomeKpis, 600); return; }
  try {
    const { getDocs, collection, doc, getDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const now = new Date().toISOString().slice(0,10);
    const ym  = now.slice(0,7);
    const d30 = new Date(); d30.setDate(d30.getDate()+30);
    const d30s = d30.toISOString().slice(0,10);

    const wSnap = await getDocs(collection(window._db,'workers'));
    const workers = []; wSnap.forEach(d=>workers.push({id:d.id, ...d.data()}));
    workers.sort((a,b)=>(a.empNo||'').localeCompare(b.empNo||''));
    const headcount = workers.length;

    let noAnnual = 0, renew = 0, payDone = 0;
    const L_roster=[], L_renew=[], L_paymissing=[], L_overtime=[];
    for (const w of workers) {
      L_roster.push(w);
      let aLatest='', aCnt=0;
      try { const aS=await getDocs(collection(window._db,`annual_contracts/${w.id}/contracts`)); aCnt=aS.size; aS.forEach(c=>{const ed=c.data().endDate||''; if(ed>aLatest)aLatest=ed;}); } catch(e){}
      if (aCnt===0) noAnnual++;
      if (aLatest && aLatest <= d30s){ renew++; w._aLatest=aLatest; L_renew.push(w); }
      let _payOk=false;
      try { const pS=await getDoc(doc(window._db,`payslips/${w.id}/months`,ym)); if(pS.exists()) {payDone++; _payOk=true;} } catch(e){}
      if(!_payOk) L_paymissing.push(w);
    }

    let otHours=0, otAmt=0;
    try { const otS=await getDocs(collection(window._db,'overtime')); otS.forEach(o=>{const d=o.data(); if((d.yearMonth||'')===ym){ otHours+=Number(d.hours)||0; otAmt+=Number(d.amount)||0; L_overtime.push({id:o.id,...d}); }}); } catch(e){}

    window._hrLists = { roster:L_roster, renew:L_renew, paymissing:L_paymissing, overtime:L_overtime };
    window._hrYm = ym;

    const slot=document.getElementById('hm-alert-slot');
    if (slot) slot.innerHTML = noAnnual>0
      ? `<div class="hm-alert"><span style="font-size:14px">⚠️</span><span class="tx"><b>연봉계약서 없는 재직자 ${noAnnual}명</b> — 급여·초과근로 통상임금이 0원으로 계산됩니다</span><button class="go" onclick="goTab('annual')">지금 작성</button></div>`
      : '';

    const manWon = Math.round(otAmt/10000);
    const kpi=document.getElementById('hm-kpi');
    if (kpi) kpi.innerHTML = `
      <div class="hm-kpi" onclick="hrShowList('roster')"><div class="lab">재직 인원</div><div class="val">${headcount}<small> 명</small></div><div class="act">명부 보기 ›</div></div>
      <div class="hm-kpi ${renew>0?'warn':''}" onclick="hrShowList('renew')"><div class="lab">계약 갱신 필요</div><div class="val">${renew}<small> 명 · D-30 이내</small></div><div class="act">갱신하러 가기 ›</div></div>
      <div class="hm-kpi ${payDone<headcount?'warn':''}" onclick="hrShowList('paymissing')"><div class="lab">이번 달 급여명세서</div><div class="val">${payDone}<small> / ${headcount} 작성</small></div><div class="act">작성하러 가기 ›</div></div>
      <div class="hm-kpi" onclick="hrShowList('overtime')"><div class="lab">이번 달 초과근로</div><div class="val">${otHours}<small> h · ${manWon}만원</small></div><div class="act">현황 보기 ›</div></div>`;
  } catch(e) {
    const kpi=document.getElementById('hm-kpi');
    if (kpi) kpi.innerHTML = '<div style="grid-column:1/-1;color:#9AAABF;font-size:12px;padding:12px;">현황을 불러오지 못했습니다.</div>';
  }
}

function calcAnnualSalary(hourly, empType) {
  if (!hourly) return { basic:0, fixedOt:0, fixedNight:0, weekly:0, total:0, annual:0 };
  const h = Number(hourly);
  if (empType === 'office') {
    const basic      = Math.round(h * 8 * 5 * 4.345);
    const fixedOt    = Math.round(h * 12 * 4.345);
    const fixedNight = 0;
    const weekly     = Math.round(h * 8 * 4.345);
    const total      = basic + fixedOt + fixedNight + weekly;
    return { basic, fixedOt, fixedNight, weekly, total, annual: total * 12 };
  } else {
    const basic      = Math.round(h * 8 * 5 * 4.345);
    const fixedOt    = 0;
    const fixedNight = Math.round(h * 0.5 * 8 * 5 * 4.345);
    const weekly     = Math.round(h * 8 * 4.345);
    const total      = basic + fixedOt + fixedNight + weekly;
    return { basic, fixedOt, fixedNight, weekly, total, annual: total * 12 };
  }
}

const invWon = v => v !== null && v !== undefined ? '₩'+Math.round(v).toLocaleString() : '-';

function invCalc() {
  const rows = INVOICE_SECTORS.map(s => {
    const est        = inv.estimates[s.id]||0;
    const b          = inv.banips[s.id]||0;
    const ins        = inv.installs[s.id]||0;
    const banipAmt   = Math.round(est*0.8*(b/s.qty));
    const installAmt = Math.round(est*0.2*(ins/s.qty));
    const depositAmt = Math.round(est*0.1);
    const incDep     = inv.deposits[s.id];
    const billAmt    = banipAmt + installAmt + (incDep ? depositAmt : 0);
    const balance    = inv.balances[s.id] !== undefined ? inv.balances[s.id] : est;
    return { ...s, b, ins, est, banipAmt, installAmt, depositAmt, incDep, billAmt, balance };
  });
  const totalBill   = rows.reduce((a,r)=>a+r.billAmt,0);
  const totalVat    = Math.round(totalBill*0.1);
  const totalCharge = totalBill+totalVat;
  const payTotal    = Math.round(inv.manday*INVOICE_TEAM_RATE);
  const payVat      = Math.round(payTotal*0.1);
  const payGrand    = payTotal+payVat;
  return { rows, totalBill, totalVat, totalCharge, payTotal, payVat, payGrand };
}

window.invChangeMonth = async (month) => {
  inv.docMonth = month;
  const [yr, mo] = month.split('-').map(Number);
  const daysInMonth = new Date(yr, mo, 0).getDate();

  const newBanips  = Object.fromEntries(INVOICE_SECTORS.map(s=>[s.id, 0]));
  const newInstalls = Object.fromEntries(INVOICE_SECTORS.map(s=>[s.id, 0]));

  // PAST 데이터 반영
  Object.entries(PAST_INV).forEach(([dateKey, dayData]) => {
    if (!dateKey.startsWith(month)) return;
    INVOICE_SECTORS.forEach(s => {
      if (!dayData[s.id]) return;
      Object.keys(dayData[s.id]).forEach(k => {
        if (k.endsWith('_반입')) newBanips[s.id]++;
      });
    });
  });

  // Firebase 데이터 반영 — 완전 병렬 처리
  if (window._db && window._doc && window._getDoc) {
    // 공정 반입 병렬 조회
    const progPromises = [];
    for (let d = 1; d <= daysInMonth; d++) {
      const dateKey = `${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      for (const s of INVOICE_SECTORS) {
        progPromises.push((async () => {
          try {
            const snap = await window._getDoc(window._doc(window._db, `progress_checks_${dateKey}`, s.id));
            if (snap.exists()) {
              const checks = snap.data().checks || {};
              Object.keys(checks).forEach(k => {
                if (k.endsWith('_반입') && (checks[k]===true||checks[k]===1)) newBanips[s.id]++;
              });
            }
          } catch(e) {}
        })());
      }
    }

    // 공수 병렬 조회
    const mdPromises = [];
    let totalMd = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const dateKey = `${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      mdPromises.push((async () => {
        try {
          const snap = await window._getDoc(window._doc(window._db, 'worker_manday', dateKey));
          if (snap.exists()) {
            const md = snap.data().md || {};
            totalMd += Object.values(md).reduce((a,b)=>a+b,0);
          }
        } catch(e) {}
      })());
    }

    // 잔금 병렬 조회
    const balPromises = INVOICE_SECTORS.map(async s => {
      try {
        const snap = await window._getDoc(window._doc(window._db, 'invoice_history', s.id));
        if (snap.exists()) {
          const hist = snap.data();
          const cum = Object.entries(hist)
            .filter(([m]) => m < month)
            .reduce((a,[,r]) => a+(r.bill||0), 0);
          inv.balances[s.id] = (inv.estimates[s.id]||0) - cum;
        } else {
          inv.balances[s.id] = inv.estimates[s.id]||0;
        }
      } catch(e) { inv.balances[s.id] = inv.estimates[s.id]||0; }
    });

    // 모두 병렬 실행
    await Promise.all([...progPromises, ...mdPromises, ...balPromises]);
    inv.manday = totalMd;
  }

  inv.banips  = newBanips;
  inv.installs = newInstalls;
  renderInvoiceTab();
};

window.invConfirm = async () => {
  if (!confirm('이 정산서를 확정하시겠습니까?\n확정 후 잔금 관리 탭에 자동 반영됩니다.')) return;
  if (!window._db) { alert('Firebase 연결 필요'); return; }

  if (inv.docType === 'invoice') {
    for (const s of INVOICE_SECTORS) {
      const est        = inv.estimates[s.id]||0;
      const b          = inv.banips[s.id]||0;
      const ins        = inv.installs[s.id]||0;
      const banipAmt   = Math.round(est*0.8*(b/s.qty));
      const installAmt = Math.round(est*0.2*(ins/s.qty));
      const depositAmt = inv.deposits[s.id] ? Math.round(est*0.1) : 0;
      const bill       = banipAmt + installAmt + depositAmt;
      if (bill === 0) continue;
      const ref = window._doc(window._db, 'invoice_history', s.id);
      const snap = await window._getDoc(ref);
      const existing = snap.exists() ? snap.data() : {};
      existing[inv.docMonth] = { banip:banipAmt, install:installAmt, deposit:depositAmt, bill, memo:`${inv.docMonth} 발행` };
      await window._setDoc(ref, existing);
    }
  } else {
    const payTotal = Math.round(inv.manday * INVOICE_TEAM_RATE);
    await window._setDoc(window._doc(window._db, 'payment_history', inv.docMonth),
      { manday:inv.manday, amount:payTotal, payerKey:inv.payerKey, payeeKey:inv.payeeKey, dueDate:inv.dueDate });
  }
  alert('✅ 발행 확정되었습니다. 잔금 관리 탭에 반영됩니다.');
};

// ── 급여명세서 디버그: 초과근로 연동 상태 확인 ──
window.psDebugOT = async () => {
  const dbg = document.getElementById('ps-ot-debug');
  if (!dbg) return;
  dbg.style.display = 'block';
  dbg.innerHTML = '⏳ 확인 중...';

  const name = ps.workerData?.name;
  const month = ps.month;

  if (!name || !month) {
    dbg.innerHTML = '❌ 근로자 또는 기준월이 선택되지 않았습니다.';
    return;
  }

  try {
    const { collection, query, where, getDocs } =
      await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');

    // overtime 컬렉션 전체 조회
    const allSnap = await getDocs(collection(window._db, 'overtime'));
    let allRows = [];
    allSnap.forEach(d => allRows.push({id: d.id, ...d.data()}));

    // 해당 월 + 해당 이름 필터
    const filtered = allRows.filter(r => r.yearMonth === month && r.name === name);
    const total = filtered.reduce((s, r) => s + Number(r.amount||0), 0);

    let html = `<div><b>조회 조건:</b> ${name} / ${month}</div>`;
    html += `<div><b>overtime 전체 문서 수:</b> ${allRows.length}건</div>`;
    html += `<div><b>조건 일치 문서 수:</b> ${filtered.length}건 / 합계: ${total.toLocaleString()}원</div>`;

    if (allRows.length > 0) {
      html += `<div style="margin-top:4px;"><b>전체 목록:</b></div>`;
      allRows.slice(0,10).forEach(r => {
        const match = (r.yearMonth === month && r.name === name);
        html += `<div style="color:${match?'#1D5BA6':'#9AAABF'};">${match?'✅':'·'} ${r.date||'-'} ${r.name||'-'} ${r.hours||0}h ${Number(r.amount||0).toLocaleString()}원 [yearMonth:${r.yearMonth||'-'}]</div>`;
      });
      if (allRows.length > 10) html += `<div>... 외 ${allRows.length-10}건</div>`;
    } else {
      html += `<div style="color:#dc2626;">⚠️ overtime 컬렉션이 비어있습니다. 초과근로 탭에서 데이터를 먼저 입력하세요.</div>`;
    }

    html += `<div style="margin-top:4px;color:#1D5BA6;font-weight:700;">현재 ps.bonus = ${ps.bonus}</div>`;
    dbg.innerHTML = html;
  } catch(e) {
    dbg.innerHTML = `❌ 오류: ${e.message}`;
  }
};

// ── 급여명세서-초과근로 연동: 해당 월 초과근로수당 합계 조회 ──
// ps 객체와 함께 상단에 정의해서 어느 탭에서 먼저 로드되어도 사용 가능
window.getOvertimeAmountForPayslip = async (name, yearMonth) => {
  if (!window._db || !name || !yearMonth) return 0;
  try {
    const { collection, query, where, getDocs } =
      await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const q = query(
      collection(window._db, 'overtime'),
      where('yearMonth', '==', yearMonth),
      where('name', '==', name)
    );
    const snap = await getDocs(q);
    let total = 0;
    snap.forEach(d => { total += Number(d.data().amount || 0); });
    return total;
  } catch(e) {
    console.error('getOvertimeAmountForPayslip 오류:', e);
    return 0;
  }
};

// 시급 → 급여 계산 (calcAnnualSalary 재사용)
function psCalcPay(hourly, empType) {
  return calcAnnualSalary(Number(hourly||0), empType||'field');
}

// 간이세액표 (월 급여 기준 간략 적용)
function calcIncomeTax(taxable) {
  // 근로소득 간이세액표 근사치 (부양가족 1인 기준)
  if (taxable <= 1060000)  return 0;
  if (taxable <= 1500000)  return Math.round(taxable * 0.006);
  if (taxable <= 3000000)  return Math.round(taxable * 0.010);
  if (taxable <= 4500000)  return Math.round(taxable * 0.150 - 420000);
  if (taxable <= 7800000)  return Math.round(taxable * 0.240 - 825000);
  return Math.round(taxable * 0.350 - 1680000);
}

function psCalcAll() {
  const sal = ps.annualData
    ? psCalcPay(ps.annualData.hourly, ps.workerData?.empType)
    : { basic:0, fixedOt:0, fixedNight:0, weekly:0, total:0 };

  const bonus       = Number(ps.bonus||0);
  const specialBonus= Number(ps.specialBonus||0);
  const extraPay    = Number(ps.extraPay||0);
  const totalPay    = sal.total + bonus + specialBonus + extraPay;

  // 공제 (자동계산 후 직접 수정값 있으면 오버라이드)
  const _pension   = Math.round(totalPay * 0.045);
  const _health    = Math.round(totalPay * 0.03545);
  const _ltcare    = Math.round(_health  * 0.1281);
  const _employ    = Math.round(totalPay * 0.009);
  const _incomeTax = calcIncomeTax(totalPay);
  const _localTax  = Math.round(_incomeTax * 0.1);
  const pension    = ps._pension   !== undefined ? Number(ps._pension)   : _pension;
  const health     = ps._health    !== undefined ? Number(ps._health)    : _health;
  const ltcare     = ps._ltcare    !== undefined ? Number(ps._ltcare)    : _ltcare;
  const employ     = ps._employ    !== undefined ? Number(ps._employ)    : _employ;
  const incomeTax  = ps._incomeTax !== undefined ? Number(ps._incomeTax) : _incomeTax;
  const localTax   = ps._localTax  !== undefined ? Number(ps._localTax)  : _localTax;
  const dormitory  = Number(ps.dormitory||0);
  const totalDeduct = pension + health + ltcare + employ + dormitory + incomeTax + localTax;
  const netPay      = totalPay - totalDeduct;

  return { sal, bonus, specialBonus, extraPay, totalPay,
            pension, health, ltcare, employ, dormitory, incomeTax, localTax,
            totalDeduct, netPay };
}

const psWon = v => v ? '₩'+Math.round(v).toLocaleString() : '-';
const psWonR = v => '₩'+Math.round(v||0).toLocaleString();

  // 근로자 정보 표시
  const info = document.getElementById('ps-pc-workerinfo');

    info.innerHTML = `<b>${w.name}</b> ${w.rank||''}<br>${w.dept||''}<br>${w.bankAccount||'계좌 미등록'}`;

  try {

window.renderPayslipWrite = async () => {
  const el = document.getElementById('tab-payslip');
  ps.view = 'write';
  ps.workerData = null; ps.annualData = null;
  ps.bonus=''; ps.specialBonus=''; ps.extraPay=''; ps.dormitory=''; ps.bankAccount='';
  ps._pension=undefined; ps._health=undefined; ps._ltcare=undefined; ps._employ=undefined; ps._incomeTax=undefined; ps._localTax=undefined;

  const workers = await getWorkersList();
  window._psWorkers = workers;

  // 최근 13개월 목록
  const months = [];
  const now = new Date();
  for (let i = 0; i < 13; i++) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  if (!ps.month) ps.month = months[1];

  // 익월 말일 계산
  function calcPayDate(month) {
    if (!month) return '';
    const [y, m] = month.split('-').map(Number);
    const lastDay = new Date(y, m, 0).getDate(); // 익월 말일
    const nextMonth = m === 12 ? 1 : m + 1;
    const nextYear  = m === 12 ? y + 1 : y;
    return `${nextYear}-${String(nextMonth).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  }
  if (!ps.payDate) ps.payDate = calcPayDate(ps.month);

  window.psRefresh = () => renderPayslipWriteForm(el, workers, months, calcPayDate);
  renderPayslipWriteForm(el, workers, months, calcPayDate);

  window.psWorkerSelect = async (wid) => {
    if (!wid) { ps.workerId=''; ps.workerData=null; ps.annualData=null; window.psRefresh(); return; }
    ps.workerId = wid;
    ps.workerData = workers.find(w=>w.id===wid) || null;
    // 명부에서 계좌번호 불러오기
    if (ps.workerData?.bankAccount) ps.bankAccount = ps.workerData.bankAccount;

    // 연봉계약서에서 해당 월 기준 최신 계약 불러오기
    if (window._db && wid) {
      try {
        const { getDocs, collection } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
        const snap = await getDocs(collection(window._db, `annual_contracts/${wid}/contracts`));
        let latest = null; let latestDate = '';
        snap.forEach(d => {
          const dd = d.data();
          if ((dd.contractDate||'') > latestDate) {
            latestDate = dd.contractDate||''; latest = dd;
          }
        });
        ps.annualData = latest;
      } catch(e) { console.error('연봉계약서 로드 오류:', e); }
    }

    // 초과근로수당 자동 연동 (해당 월 합계 → 상여금)
    if (ps.workerData?.name && ps.month) {
      try {
        const otAmt = await window.getOvertimeAmountForPayslip(ps.workerData.name, ps.month);
        ps.bonus = otAmt; // 0이어도 덮어씀
        console.log(`초과근로 연동: ${ps.workerData.name} / ${ps.month} → ${otAmt}원`);
      } catch(e) { console.error('초과근로 연동 오류:', e); }
    }

    window.psRefresh();
  };

  // 기준월 변경 시 초과근로수당 재연동
  window.psMonthChange = async (month) => {
    ps.month = month;
    ps.payDate = window.calcPayDateGlobal(month);
    // 초과근로수당 재연동 — await 완료 후 psRefresh
    if (ps.workerData?.name && window.getOvertimeAmountForPayslip) {
      try {
        const otAmt = await window.getOvertimeAmountForPayslip(ps.workerData.name, month);
        ps.bonus = otAmt; // 0이어도 덮어씀
      } catch(e) { console.error('초과근로 연동 오류:', e); }
    }
    window.psRefresh(); // await 완료 후 렌더링
  };
};

window.calcPayDateGlobal = (month) => {
  if (!month) return '';
  const [y, m] = month.split('-').map(Number);
  const nextMonth = m === 12 ? 1 : m + 1;
  const nextYear  = m === 12 ? y + 1 : y;
  const lastDay   = new Date(nextYear, nextMonth, 0).getDate();
  return `${nextYear}-${String(nextMonth).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
};

window.psSave = async () => {
  if (!ps.workerId||!ps.month) { alert('기준월과 근로자를 선택해 주세요.'); return; }
  if (!window._db) { alert('Firebase 연결 필요'); return; }
  if (!confirm(`${ps.workerData?.name}님의 ${ps.month} 급여명세서를 저장하시겠습니까?`)) return;
  try {
    const c = psCalcAll();
    const { doc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    await setDoc(doc(window._db, `payslips/${ps.workerId}/months`, ps.month), {
      month: ps.month, payDate: ps.payDate, bankAccount: ps.bankAccount,
      name: ps.workerData?.name||'', dept: ps.workerData?.dept||'',
      rank: ps.workerData?.rank||'', empNo: ps.workerData?.empNo||'',
      hourly: ps.annualData?.hourly||0, empType: ps.workerData?.empType||'field',
      ...c.sal,
      bonus: c.bonus, specialBonus: c.specialBonus, extraPay: c.extraPay,
      grossPay: c.totalPay,
      pension: c.pension, health: c.health, ltcare: c.ltcare, employ: c.employ,
      dormitory: c.dormitory, incomeTax: c.incomeTax, localTax: c.localTax,
      totalDeduct: c.totalDeduct, netPay: c.netPay,
      savedAt: new Date().toISOString(),
    });
    alert('✅ 급여명세서 저장 완료!');
    renderPayslipMain2();
  } catch(e) { alert('오류: '+e.message); }
};

window.fmtJumin2 = v => { const d=v.replace(/-/g,'').replace(/\D/g,''); return d.length<=6?d:d.slice(0,6)+'-'+d.slice(6,13); };
// 전화번호 포맷 공통 함수
function fmtTel(v){
  var d=v.replace(/\D/g,'');
  if(d.length<=3) return d;
  if(d.length<=6) return d.slice(0,3)+'-'+d.slice(3);
  if(d.length<=10) return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);
  return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7,11);
}
function fmtTelBlur(el){
  var d=el.value.replace(/\D/g,'');
  if(d.length===8 && d[0]!=='0') d='010'+d;
  el.value=fmtTel(d);
}
window.fmtPhone2 = v => fmtTel(v);


window.rosterSave = async () => {
  if (!rosterForm.name||!rosterForm.jumin) { alert('이름과 주민등록번호는 필수입니다.'); return; }
  if (!window._db) { alert('Firebase 연결 필요'); return; }
  try {
    const { getDocs, collection, setDoc, doc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const wid = `${rosterForm.name}_${rosterForm.jumin.replace(/-/g,'')}`;

    // 사원번호 규칙: 최초입사년도 yy + 해당 년도 순번 nnn → yynnn (5자리)
    // 예: 25년 첫번째 → 25001, 28년 30번째 → 28030
    const hireDate = rosterForm.hireDate || new Date().toISOString().slice(0,10);
    const yy = hireDate.slice(2,4); // 입사년도 2자리

    const snap = await getDocs(collection(window._db, 'workers'));
    // 같은 입사년도(yy)로 시작하는 사원번호 중 최대값 추출
    let maxSeq = 0;
    snap.forEach(d => {
      const no = d.data().empNo || '';
      if (no.length === 5 && no.slice(0,2) === yy) {
        const seq = parseInt(no.slice(2), 10);
        if (seq > maxSeq) maxSeq = seq;
      }
    });
    const nextNo = yy + String(maxSeq + 1).padStart(3, '0');

    await setDoc(doc(window._db,'workers',wid), {
      ...rosterForm,
      empNo: nextNo,
      registeredAt: new Date().toISOString(),
      hireDate: rosterForm.hireDate || '',
      bankAccount: rosterForm.bankAccount || ''
    });
    alert(`✅ 등록 완료! 사원번호: ${nextNo}`);

    // ── L2: portal_users 역방향 연동 ──
    // 이름으로 portal_users 매칭 → portalUid 없는 근로자에 한해 연동
    try {
      const { getDocs: getDocs2, collection: col2, updateDoc: updDoc2, doc: doc2, query: q2, where: wh2 } =
        await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const puSnap = await getDocs2(q2(col2(window._db,'portal_users'), wh2('name','==',rosterForm.name)));
      if (puSnap.size === 1) {
        // 이름 일치하는 portal_users 1건 → 상호 연동
        const puDoc = puSnap.docs[0];
        const puUid = puDoc.id;
        // workers에 portalUid 추가
        await updDoc2(doc2(window._db,'workers',wid), { portalUid: puUid });
        // portal_users에 workerId + empNo 동기화
        await updDoc2(doc2(window._db,'portal_users',puUid), { workerId: wid, empNo: nextNo });
        console.log('[L2] portal_users 역방향 연동 완료:', puUid);
      }
      // 동명이인(size>1) 또는 없으면(size===0) 연동 건너뜀
    } catch(le) { console.warn('[L2] portal_users 연동 실패(무시):', le.message); }

    renderRosterMain();
  } catch(e) { alert('오류: '+e.message); }
};

function calcWorkDays(startStr, endStr) {
  if (!startStr) return { days:0, months:0, years:0 };
  const start = new Date(startStr);
  const end   = endStr ? new Date(endStr) : new Date();
  end.setHours(0,0,0,0); start.setHours(0,0,0,0);

  // 연/월 계산
  const diffMs   = end - start;
  const totalDays = Math.floor(diffMs / 86400000);
  const years    = Math.floor(totalDays / 365);
  const months   = Math.floor((totalDays % 365) / 30);

  // 실 근무일수 (주말·공휴일 제외)
  let workDays = 0;
  const cur = new Date(start);
  while (cur <= end) {
    const dow = cur.getDay();
    const key = cur.toISOString().slice(0,10);
    if (dow !== 0 && dow !== 6 && !KR_HOLIDAYS.has(key)) workDays++;
    cur.setDate(cur.getDate()+1);
  }
  return { days:workDays, calDays:totalDays, years, months };
}

window.rosterLinkPortal = async (workerId, workerName) => {
  if (!window._db) { alert('Firebase 연결 필요'); return; }
  try {
    const { getDocs, collection, updateDoc, doc, query, where } =
      await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    // portal_users에서 이름 매칭 (읽기만)
    const puSnap = await getDocs(query(collection(window._db,'portal_users'), where('name','==',workerName)));
    if (puSnap.size === 0) {
      alert(`❌ 포털에 "${workerName}" 계정이 없습니다.\n포털 관리에서 먼저 계정을 생성해 주세요.`);
      return;
    }
    if (puSnap.size > 1) {
      alert(`⚠️ "${workerName}" 이름의 포털 계정이 ${puSnap.size}개입니다.\n관리자에게 문의해 주세요.`);
      return;
    }
    const puUid = puSnap.docs[0].id;
    const puData = puSnap.docs[0].data();
    // workers에 portalUid 추가 (hr 권한 있음)
    await updateDoc(doc(window._db,'workers',workerId), { portalUid: puUid });
    // portal_users 업데이트는 portal에 postMessage로 위임 (권한 문제 우회)
    const empNo = puData.empNo || '';
    window.parent.postMessage({
      source: 'jh-hr',
      action: 'linkWorkerToPortal',
      payload: { puUid, workerId, empNo }
    }, '*');
    document.getElementById('roster-detail-modal')?.remove();
    alert(`✅ "${workerName}" 포털 계정 연동 완료!`);
    renderRosterList();
  } catch(e) { alert('연동 오류: ' + e.message); }
};

window.laborOpenSign2 = () => {
  const p=document.getElementById('labor-sign2-popup'); if(!p)return; p.style.display='flex';
  setTimeout(()=>{
    laborSignCanvas2=document.getElementById('labor-sign2-canvas'); if(!laborSignCanvas2)return;
    const ctx=laborSignCanvas2.getContext('2d'); ctx.clearRect(0,0,laborSignCanvas2.width,laborSignCanvas2.height);
    const hint=document.getElementById('labor-sign2-hint');
    const gp=e=>{const r=laborSignCanvas2.getBoundingClientRect();const t=e.touches?.[0]||e;return{x:(t.clientX-r.left)*(laborSignCanvas2.width/r.width),y:(t.clientY-r.top)*(laborSignCanvas2.height/r.height)};};
    laborSignCanvas2.onmousedown=e=>{laborSignDrawing2=true;const p=gp(e);ctx.beginPath();ctx.moveTo(p.x,p.y);};
    laborSignCanvas2.onmousemove=e=>{if(!laborSignDrawing2)return;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.strokeStyle='#1A2540';const p=gp(e);ctx.lineTo(p.x,p.y);ctx.stroke();if(hint)hint.style.display='none';};
    laborSignCanvas2.onmouseup=()=>laborSignDrawing2=false;
    laborSignCanvas2.onmouseleave=()=>laborSignDrawing2=false;
    laborSignCanvas2.addEventListener('touchstart',e=>{e.preventDefault();laborSignDrawing2=true;const p=gp(e);ctx.beginPath();ctx.moveTo(p.x,p.y);},{passive:false});
    laborSignCanvas2.addEventListener('touchmove',e=>{e.preventDefault();if(!laborSignDrawing2)return;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.strokeStyle='#1A2540';const p=gp(e);ctx.lineTo(p.x,p.y);ctx.stroke();if(hint)hint.style.display='none';},{passive:false});
    laborSignCanvas2.addEventListener('touchend',e=>{e.preventDefault();laborSignDrawing2=false;},{passive:false});
  },100);
};

// 근로계약서 시급 기반 급여 미리보기
function laborSalaryPreviewHtml(f) {
  const empType = f.empType || (window._laborWorkers2||[]).find(w=>w.id===f.workerId)?.empType || 'field';
  const sal = calcAnnualSalary(Number(f.hourly||0), empType);
  if (!sal.annual) return '';

  const isOffice = empType === 'office';
  const empLabel = isOffice ? '💼 사무직' : '🔧 현장직';
  const rows = isOffice
    ? [['기본근로수당 (시급×8×5×4.345)', sal.basic],
       ['고정연장수당 (시급×12×4.345)', sal.fixedOt],
       ['고정야간수당', null],
       ['주휴수당 (시급×8×4.345)', sal.weekly],
       ['월 지급계', sal.total],
       ['계약연봉 (월×12)', sal.annual]]
    : [['기본근로수당 (시급×8×5×4.345)', sal.basic],
       ['고정연장수당', null],
       ['고정야간수당 (시급×0.5×8×5×4.345)', sal.fixedNight],
       ['주휴수당 (시급×8×4.345)', sal.weekly],
       ['월 지급계', sal.total],
       ['계약연봉 (월×12)', sal.annual]];

  return '<div style="margin-top:8px;border-radius:8px;overflow:hidden;border:1px solid #DDE4EF;">'
    + '<div style="background:#1D5BA6;padding:7px 12px;font-size:11px;font-weight:700;color:#fff;">' + empLabel + ' 급여 구성</div>'
    + rows.map(function(r){
        var l=r[0], v=r[1];
        var isTotal = l.includes('지급계') || l.includes('연봉');
        var isNull  = v === null;
        return '<div style="display:flex;justify-content:space-between;padding:7px 12px;border-bottom:1px solid #F0F4FA;font-size:11px;background:'+(isTotal?'#E8F0FB':'#fff')+';"><span style="color:#5C6F8A;">'+l+'</span>'
          +'<span style="color:'+(l.includes('연봉')?'#1D5BA6':isTotal?'#1D5BA6':isNull?'#9AAABF':'#1A2540')+';font-weight:'+(isTotal?700:400)+';">'+(isNull?'—':'₩'+Math.round(v).toLocaleString())+'</span></div>';
      }).join('')
    + '</div>';
}

window.laborSave2 = async () => {
  if(!laborForm2.workerId||!laborForm2.contractDate){alert('근로자와 계약일자는 필수입니다.');return;}
  if(!window._db){alert('Firebase 연결 필요');return;}
  if(!confirm(`${laborForm2.name}님의 근로계약서를 저장하시겠습니까?`))return;
  try {
    const { doc, setDoc, collection } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const contractId = laborForm2.contractDate.replace(/-/g,'');
    const _emp = (window._laborWorkers2||[]).find(w=>w.id===laborForm2.workerId);
    laborForm2.salary = calcAnnualSalary(Number(laborForm2.hourly||0), _emp?.empType||'field').annual;
    await setDoc(doc(window._db,`labor_contracts/${laborForm2.workerId}/contracts`,contractId), {
      ...laborForm2, savedAt:new Date().toISOString(), savedBy:'admin'
    });
    alert('✅ 근로계약서 저장 완료!');
    renderLaborMain();
  } catch(e){alert('오류: '+e.message);}
};

      <p style="font-weight:700;margin:14px 0 5px;">제4조 【임 금】</p><p style="margin-bottom:4px;">- 계약연봉 : ${f.salary?`일금 ${Number(f.salary).toLocaleString()}원`:ul('',180)}</p><p style="margin-bottom:4px;">- 세부 지급 사항은 연봉계약서를 기준으로 한다. 임금 지급일 : 익월 말일</p>
      <p style="font-weight:700;margin:14px 0 5px;">제5조 【사회보험】</p><p style="margin-bottom:8px;">☑ 고용보험 &nbsp; ☑ 산재보험 &nbsp; ☑ 국민연금 &nbsp; ☑ 건강보험</p>
      <p style="font-weight:700;margin:12px 0 4px;">제6조 【근로시간】</p>
      <p style="margin-bottom:6px;">근로기준법 제50조에 따라 주 40시간 근로를 원칙으로 한다. 다만 현장 여건에 따라 근로기준법 제53조에 의거하여 최대 12시간까지 연장하여 근로할 수 있다. (식사 및 휴게시간은 근로시간에서 제외)</p>
      <p style="font-weight:700;margin:12px 0 4px;">제7조 【휴게시간】</p>
      <p style="margin-bottom:6px;">4시간 근무마다 30분 휴식, 중식 1시간 의무지급을 원칙으로 한다. 다만, 현장 상황에 따라 유연하게 적용한다.</p>
      <p style="font-weight:700;margin:12px 0 4px;">제8조 【퇴직금】</p>
      <p style="margin-bottom:4px;">1. "갑"은 "을"의 1년 이상 계속 근로에 대하여 퇴직 전 3개월 평균임금의 30일분을 퇴직금으로 지급한다. (단, 별도로 지급되는 수당은 퇴직금 계산에서 제외된다.)</p>
      <p style="margin-bottom:6px;">2. 4대보험 개인의 선택으로 가입하지 않을 시 퇴직금은 지급하지 아니한다.</p>
      <p style="font-weight:700;margin:12px 0 4px;">제9조 【휴일 및 휴가】</p>
      <p style="margin-bottom:4px;">"을"의 휴일과 휴가는 근로자계약의 내용에 따라 결정되며, 회사는 연차휴가와 관련하여 근로자대표와의 합의에 의하여 특정일을 연차휴가로 대체할 수 있다.</p>
      <p style="margin-bottom:4px;">- 계속 근로 1년 이상, 해당 기간 동안 80% 이상이 될 경우 15일의 유급휴가가 부여된다.</p>
      <p style="margin-bottom:6px;">- "갑"은 계속하여 근로한 기간이 1년 미만인 근로자에게 1개월 개근 시 1일의 유급휴가를 부여한다.</p>
      <p style="font-weight:700;margin:12px 0 4px;">제10조 【지휘감독 및 근로조건】</p>
      <p style="margin-bottom:6px;">"을"은 "갑"의 소속 단기계약근로자로서 사업주의 지휘감독을 받으며, "갑"의 취업규칙 및 근무지의 제규정을 준수하여야 한다.</p>
      <p style="font-weight:700;margin:12px 0 4px;">제11조 【귀책사유】</p>
      <p style="margin-bottom:2px;">1. 직무상의 의무를 위반하거나 근무에 태만하였을 때</p>
      <p style="margin-bottom:2px;">2. "갑" 및 사용사업주의 이미지를 크게 손상하거나 재산상의 피해를 주었을 때</p>
      <p style="margin-bottom:2px;">3. 비밀누설 및 폭행, 파업 등 규율과 질서를 문란케 하였을 때</p>
      <p style="margin-bottom:2px;">4. 취업기간 중 형사상 유죄판결을 받았을 때</p>
      <p style="margin-bottom:2px;">5. 채용조건에 구비된 각종문서가 위조 또는 변조, 허위사실 등이 기재되었을 때</p>
      <p style="margin-bottom:2px;">6. 사용사업주의 허가 없이 3일 이상 결근하였을 때</p>
      <p style="margin-bottom:2px;">7. 무단지각, 조퇴, 외출을 월 3회 이상 하였을 때</p>
      <p style="margin-bottom:6px;">8. 계약기간 내에 동종업체로 직접 계약 및 이직하였을 때</p>
      <p style="font-weight:700;margin:12px 0 4px;">제12조 【손해배상】</p>
      <p style="margin-bottom:6px;">"을"의 제11조 귀책사유로 "갑" 및 사용사업주에게 재산상의 손해를 끼쳤을 경우에는 전적으로 "을"이 책임지며, 이를 지키지 않은 경우에는 "갑"은 "을" 또는 "을"의 보증인에게 월급의 3배의 책임을 물 수 있다.</p>
      <p style="font-weight:700;margin:12px 0 4px;">제13조 【재정보증】</p>
      <p style="margin-bottom:4px;">- "을"은 1명의 재정보증인을 설정 신고하거나 "갑"이 요구하는 금액의 신용보증보험에 가입하여야 한다.</p>
      <p style="margin-bottom:6px;">- "갑"은 "을"에게 신용보증보험을 요구할 수 있으며, "을"은 회사의 요구 시 1주일 이내에 제출하여야 한다.</p>
      <p style="font-weight:700;margin:12px 0 4px;">제14조 【안전 및 보건에 관한 사항】</p>
      <p style="margin-bottom:4px;">1. "갑"은 근로자의 안전 및 보건에 관하여 관계 법령이 정하는 바에 따라 필요한 조치를 강구한다.</p>
      <p style="margin-bottom:4px;">2. "을"은 신규 입사 시 즉시 채용신체검사서를 제출하여야 하며, 정기 건강진단을 관련법령에 의거 실시하고 "을"은 이에 반드시 응해야 한다.</p>
      <p style="margin-bottom:6px;">3. "을"은 제반 법규 및 "갑"이 정한 제반 안전 교육사항 및 안전수칙을 준수하여야 한다.</p>
      <p style="font-weight:700;margin:12px 0 4px;">제15조 【취업 전 고지】</p>
      <p style="margin-bottom:6px;">"을"은 본 근로계약의 내용을 취업 전 충분히 숙지하고 이를 성실히 이행한다.</p>
      <p style="font-weight:700;margin:12px 0 4px;">제16조 【파견근로계약 및 동의】</p>
      <p style="margin-bottom:6px;">"을"은 본 근로계약의 내용에 이의를 제기하지 아니하며 "을"의 근로조건은 "갑"의 취업규칙 및 근로자계약 범위 내에서 결정되는 것에 동의한다.</p>
      <p style="font-weight:700;margin:12px 0 4px;">제17조 【계약의 해지】</p>
      <p style="margin-bottom:4px;">다음 각 호에 해당하는 경우 갑과 을의 근로계약은 해지된다.</p>
      <p style="margin-bottom:4px;">1. "갑"과 "을"의 상호 합의 하에 근무일을 지정하여 해당 날짜까지 근무 후 계약 종료</p>
      <p style="margin-bottom:4px;">2. "을"의 계약종료 의사를 "갑"이 인지한 시점으로부터 당기 후의 1기가 지난 뒤 해지의 효력이 발생</p>
      <p style="margin-bottom:6px;">3. 제11조 귀책사유 발생 시 "갑"은 일방적으로 "을"과의 근로계약을 해지할 수 있다.</p>
      <p style="font-weight:700;margin:12px 0 4px;">제18조 【지급품의 반납】</p>
      <p style="margin-bottom:6px;">퇴직 시에는 "을"은 "갑"으로부터 지급받은 장비, 피복, 기타 이에 준하는 지급품은 필히 반납하여야 하며 반납치 않을 시에는 급여에서 공제한다.</p>
      <p style="font-weight:700;margin:12px 0 4px;">제19조 【근로기준법의 적용】</p>
      <p style="margin-bottom:6px;">본 계약에 명시되지 않은 사항은 회사의 취업규칙 및 근로기준법의 해석에 준하여 따른다.</p>
      <p style="font-weight:700;margin:12px 0 4px;">제20조 【비밀유지】</p>
      <p style="margin-bottom:4px;">1. "을"은 자신의 계약내용을 관계인에게 누설하지 않는다.</p>
      <p style="margin-bottom:4px;">2. "을"은 근무지에서 발생하는 인사문제를 관리자에게 보고하여야 하며 조치 받을 수 있도록 한다.</p>
      <p style="margin-bottom:6px;">3. "을"은 "갑"에서 발생하는 문제를 외부에 누설하지 않는다.</p>
      <p style="font-weight:700;margin:12px 0 4px;">제21조 【계약의 유지】</p>
      <p style="margin-bottom:12px;">"갑"과 "을"은 제2조의 계약기간을 원칙으로 하며 "을"은 이에 동의한다. 위 계약내용이 당사자의 자유로운 의사에 의하여 원만히 체결되었음을 상호 확인하고 각 1통씩 보관한다.</p>
      <p style="font-weight:600;margin:20px 0 16px;">계약일자 : ${fmtDp(f.contractDate)}</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:16px;">
        <div style="border-top:1px solid #333;padding-top:12px;"><p style="font-weight:700;margin-bottom:6px;">(갑)</p><p>사업체명 : 제이에이치솔루션</p><p style="display:flex;align-items:center;gap:4px;">대&nbsp;&nbsp;&nbsp;&nbsp;표 : 김 종 화&nbsp;${_compSignatures&&_compSignatures.kjh?`<img src="${_compSignatures.kjh}" style="height:34px;max-width:80px;object-fit:contain;vertical-align:middle;opacity:0.9;">`:`<span style="display:inline-block;width:56px;height:30px;border:1px dashed #ccc;vertical-align:middle;text-align:center;line-height:30px;font-size:10px;color:#aaa;">(인)</span>`}</p><p>사업자번호 : 383-09-02847</p></div>
        <div style="border-top:1px solid #333;padding-top:12px;"><p style="font-weight:700;margin-bottom:6px;">(을)</p><p>주&nbsp;&nbsp;소 : ${ul(f.address,140)}</p><p>이&nbsp;&nbsp;름 : ${ul(f.name,80)}</p><p>주민등록번호 : ${ul(f.jumin,110)}</p><div style="margin-top:8px;display:flex;align-items:center;gap:8px;"><span>(인)</span>${signImg}</div></div>
      </div>
    </div>
    </body></html>`);
  win.document.close();
};

window.laborViewWorker2 = async (wid, wname) => {
  const el=document.getElementById('tab-labor');
  el.innerHTML=wrap2(`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      ${backBtn2('renderLaborList2()','목록')}
      <span style="font-size:13px;font-weight:700;color:${C2.text};">${wname} · 근로계약서</span>
    </div>
    <div id="labor-contracts-loading" style="text-align:center;padding:32px;color:${C2.mute};">⏳ 불러오는 중...</div>
    <div id="labor-contracts-wrap"></div>
  `);
  try {
    const { getDocs, collection, doc, deleteDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const snap=await getDocs(collection(window._db,`labor_contracts/${wid}/contracts`));
    const docs=[]; snap.forEach(d=>docs.push({id:d.id,...d.data()}));
    docs.sort((a,b)=>(a.empNo||'').localeCompare(b.empNo||''));
    docs.sort((a,b)=>(b.contractDate||b.id).localeCompare(a.contractDate||a.id));
    document.getElementById('labor-contracts-loading').style.display='none';
    if(!docs.length){document.getElementById('labor-contracts-wrap').innerHTML='<div style="text-align:center;padding:32px;color:'+C2.mute+';">근로계약서가 없습니다.</div>';return;}
    document.getElementById('labor-contracts-wrap').innerHTML=docs.map((d,i)=>`
      <div style="background:#fff;border-radius:12px;border:1px solid #DDE4EF;padding:14px;margin-bottom:8px;box-shadow:${C2.shadow};">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span style="font-size:13px;font-weight:700;color:${C2.blue};">계약일: ${fmtD2(d.contractDate)}</span>
          <span style="font-size:10px;background:${C2.greenLt};color:${C2.green};padding:2px 8px;border-radius:8px;font-weight:700;">✅ 저장됨</span>
        </div>
        <div style="font-size:12px;color:${C2.sub};margin-bottom:4px;">계약기간: ${fmtD2(d.startDate)} ~ ${fmtD2(d.endDate)}</div>
        <div style="font-size:12px;color:${C2.sub};margin-bottom:10px;">연봉: ${d.salary?'₩'+Number(d.salary).toLocaleString():'-'}</div>
        <div style="display:flex;gap:8px;">
          <button onclick="laborPreviewSaved2(${JSON.stringify(d).replace(/"/g,'&quot;')})"
            style="flex:1;padding:8px;background:#E8F0FB;border:1px solid #DDE4EF;border-radius:8px;font-size:12px;font-weight:600;color:${C2.blue};cursor:pointer;">📄 PDF 출력</button>
          <button onclick="laborDeleteContract2('${wid}','${d.id}','${wname}')"
            style="padding:8px 12px;background:${C2.redLt};border:1px solid #fca5a5;border-radius:8px;font-size:12px;font-weight:600;color:${C2.red};cursor:pointer;">🗑 삭제</button>
        </div>
      </div>`).join('');
  } catch(e){document.getElementById('labor-contracts-loading').innerHTML=`<div style="color:${C2.red};">오류: ${e.message}</div>`;}
};

  laborViewWorker2(wid, wname);
};

        let lE='', lC='';
        aS.forEach(c => {
          const e = c.data().endDate||'';
          const cd = c.data().contractDate||'';
          if(e > lE) lE = e;
          if(cd > lC) lC = cd;
        });
        ci[d.id] = { endDate:lE, contractDate:lC, cnt:aS.size };
      } catch(e){ ci[d.id] = { endDate:'', contractDate:'', cnt:0 }; }
    }

          <td style="padding:10px 12px;font-size:11px;color:#5C6F8A;text-align:center;">${cntTxt}</td>
          <td style="padding:10px 12px;font-size:10px;"><span style="color:${lC};font-weight:600;">${statusTxt}</span></td>
          <td style="padding:10px 12px;">
            <button onclick="annualViewWorker2('${d.id}','${d.name}')" style="font-size:11px;background:#E8F0FB;color:#1D5BA6;border:1px solid #DDE4EF;padding:3px 10px;border-radius:6px;cursor:pointer;font-weight:600;">조회</button>
          </td>

    document.getElementById('annual-list-wrap').innerHTML = `

        <table style="width:100%;border-collapse:collapse;">
          <thead>
            <tr style="background:#E8F0FB;">
              ${['사원번호','이름','소속','직급','구분','최신 계약일','계약 수','상태',''].map(h=>

window.annualWorkerSelect2 = async (wid) => {
  const w = (window._annualWorkers2||[]).find(x=>x.id===wid);
  if (!w) return;
  annualForm2.workerId = wid;
  annualForm2.name     = w.name    || '';
  annualForm2.jumin    = w.jumin   || '';
  annualForm2.address  = w.address || '';
  annualForm2.dept     = w.dept    || '';
  annualForm2.rank     = w.rank    || '';
  annualForm2.empType  = w.empType || 'field';
  annualForm2.hourly   = '';
  annualForm2.salary   = '';

  // 근로계약서에서 최신 시급 자동 불러오기
  if (window._db) {
    try {
      const { getDocs, collection } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const snap = await getDocs(collection(window._db, `labor_contracts/${wid}/contracts`));
      let latestDate = '';
      snap.forEach(d => {
        const dd = d.data();
        if ((dd.contractDate||'') > latestDate) {
          latestDate = dd.contractDate || '';
          if (dd.hourly)  annualForm2.hourly  = dd.hourly;
          if (dd.salary)  annualForm2.salary  = dd.salary;
        }
      });
    } catch(e) {}
  }
  if (window.annualRefreshForm2) window.annualRefreshForm2();
};

window.annualOpenSign2=()=>{const p=document.getElementById('annual-sign2-popup');if(!p)return;p.style.display='flex';
  setTimeout(()=>{annualSignCanvas2=document.getElementById('annual-sign2-canvas');if(!annualSignCanvas2)return;
    const ctx=annualSignCanvas2.getContext('2d');ctx.clearRect(0,0,272,100);
    const hint=document.getElementById('annual-sign2-hint');
    const gp=e=>{const r=annualSignCanvas2.getBoundingClientRect();const t=e.touches?.[0]||e;return{x:(t.clientX-r.left)*(annualSignCanvas2.width/r.width),y:(t.clientY-r.top)*(annualSignCanvas2.height/r.height)};};
    annualSignCanvas2.onmousedown=e=>{annualSignDrawing2=true;const p=gp(e);ctx.beginPath();ctx.moveTo(p.x,p.y);};
    annualSignCanvas2.onmousemove=e=>{if(!annualSignDrawing2)return;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.strokeStyle='#1A2540';const p=gp(e);ctx.lineTo(p.x,p.y);ctx.stroke();if(hint)hint.style.display='none';};
    annualSignCanvas2.onmouseup=()=>annualSignDrawing2=false; annualSignCanvas2.onmouseleave=()=>annualSignDrawing2=false;
    annualSignCanvas2.addEventListener('touchstart',e=>{e.preventDefault();annualSignDrawing2=true;const p=gp(e);ctx.beginPath();ctx.moveTo(p.x,p.y);},{passive:false});
    annualSignCanvas2.addEventListener('touchmove',e=>{e.preventDefault();if(!annualSignDrawing2)return;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.strokeStyle='#1A2540';const p=gp(e);ctx.lineTo(p.x,p.y);ctx.stroke();if(hint)hint.style.display='none';},{passive:false});
    annualSignCanvas2.addEventListener('touchend',e=>{e.preventDefault();annualSignDrawing2=false;},{passive:false});
  },100);};
window.annualClearSign2=()=>{if(annualSignCanvas2){annualSignCanvas2.getContext('2d').clearRect(0,0,272,100);const h=document.getElementById('annual-sign2-hint');if(h)h.style.display='flex';}};
window.annualCancelSign2=()=>{const p=document.getElementById('annual-sign2-popup');if(p)p.style.display='none';};
window.annualSaveSign2=()=>{if(annualSignCanvas2)annualForm2.signData=annualSignCanvas2.toDataURL();const p=document.getElementById('annual-sign2-popup');if(p)p.style.display='none';if(window.annualRefreshForm2)window.annualRefreshForm2();};

window.annualSave2=async()=>{
  if(!annualForm2.workerId||!annualForm2.contractDate){alert('근로자와 계약일자는 필수입니다.');return;}
  if(!window._db){alert('Firebase 연결 필요');return;}

  try{
    const { doc, setDoc }=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const cid=annualForm2.contractDate.replace(/-/g,'');
    annualForm2.salary = calcAnnualSalary(Number(annualForm2.hourly||0), annualForm2.empType||'field').annual;

    alert('✅ 연봉계약서 저장 완료!'); renderAnnualMain();

// 통상임금 캐시 (name → { rate, basic, fixedOt, fixedNight, weekly })
let _otWageCache = {};
function otClearWageCache() { _otWageCache = {}; }

// 연봉계약서에서 통상임금 계산
async function otGetWage(workerId, name) {
  if (_otWageCache[name]) return _otWageCache[name];
  try {
    const { collection, getDocs, query, orderBy, limit } =
      await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const cSnap = await getDocs(
      query(collection(window._db, `annual_contracts/${workerId}/contracts`),
            orderBy('contractDate','desc'), limit(1))
    );
    if (cSnap.empty) return null;
    const c = cSnap.docs[0].data();
    const hourly  = Number(c.hourly || 0);
    const empType = c.empType || 'field';
    const sal = calcAnnualSalary(hourly, empType);
    const rate = Math.round((sal.basic + sal.fixedOt + sal.fixedNight + sal.weekly) / 209);
    const result = { rate, ...sal, hourly, empType, workerId };
    _otWageCache[name] = result;
    return result;
  } catch(e) { console.error('otGetWage 오류:', e); return null; }
}

// 근로자 명부에서 목록 로드 (name → {workerId, rank})
async function otGetWorkerList() {
  try {
    const { getDocs, collection } =
      await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const snap = await getDocs(collection(window._db, 'workers'));
    const list = [];
    snap.forEach(d => {
      const w = d.data();
      list.push({ id: d.id, name: w.name, rank: w.rank || '', empNo: w.empNo || '' });
    });
    list.sort((a,b) => (a.empNo||'zzz').localeCompare(b.empNo||'zzz'));
    return list;
  } catch(e) { return []; }
}

window.otPcLoadKpiAndHours = async (workers) => {
  try {
    const { collection, getDocs, query, where } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const ym = `${_otPcYear}-${String(_otPcMonth).padStart(2,'0')}`;
    const snap = await getDocs(query(collection(window._db,'overtime'), where('yearMonth','==',ym)));
    let totalH=0, totalA=0, persons=new Set(), count=0;
    const personHours = {};
    snap.forEach(d => {
      const r = d.data();
      totalH += Number(r.hours)||0;
      totalA += Number(r.amount)||0;
      if(r.workerId) persons.add(r.workerId);
      count++;
      personHours[r.workerId] = (personHours[r.workerId]||0) + (Number(r.hours)||0);
    });
    const fmt = v => v>=10000 ? Math.round(v/10000)+'만원' : v.toLocaleString()+'원';
    const s = id => document.getElementById(id);
    if(s('ot-kpi-hours')) s('ot-kpi-hours').textContent = totalH+'h';
    if(s('ot-kpi-amt'))   s('ot-kpi-amt').textContent   = fmt(totalA);
    if(s('ot-kpi-persons')) s('ot-kpi-persons').textContent = persons.size+'명';
    if(s('ot-kpi-count'))   s('ot-kpi-count').textContent   = count+'건';
    // 직원 목록에 시간 표시
    (workers||[]).forEach(w => {
      const btn = document.getElementById('ot-pw-'+w.id);
      if(btn) {
        const h = personHours[w.id]||0;
        btn.innerHTML = `${w.name} <span style="color:#9AAABF;font-size:10px;">${w.rank||''}</span>${h>0?`<span style="float:right;color:#1D5BA6;font-size:10px;">${h}h</span>`:''}`;
      }
    });
  } catch(e) { console.error(e); }
};

window.otPcSave = async () => {
  const date = document.getElementById('ot-pc-date')?.value;
  const sel  = document.getElementById('ot-pc-worker-sel')?.value;

  if(!date||!sel||!h||h<=0){ alert('날짜·직원·시간을 모두 입력해주세요.'); return; }
  const [workerId,name,rank] = sel.split('|');
  const wage = await otGetWage(workerId,name);
  const rate = wage?wage.rate:0;
  const amount = Math.round(rate*h);
  try {
    const { collection, addDoc, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    await addDoc(collection(window._db,'overtime'), {
      date, name, rank:rank||'', workerId, hours:h, amount, rate, yearMonth:date.slice(0,7), savedAt:serverTimestamp()
    });
    document.getElementById('ot-pc-date').value='';
    document.getElementById('ot-pc-hours').value='';
    document.getElementById('ot-pc-preview').textContent='';
    // KPI 갱신

    const wsnap = await gd2(col2(window._db,'workers'));

};

async function otLoadSummary() {
  const wrap = document.getElementById('ot-summary-body');
  if (!wrap) return;
  wrap.innerHTML = `<div style="text-align:center;padding:30px;"><div class="spinner"></div></div>`;
  try {
    const { collection, query, where, getDocs } =
      await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const prefix = `${otYear}-${String(otMonth).padStart(2,'0')}`;
    const snap = await getDocs(query(collection(window._db,'overtime'), where('yearMonth','==',prefix)));

    // 직원별 집계
    const totals = {}; // name → {hours, amount, rank}
    const rows   = [];
    snap.forEach(d => {
      const r = { id: d.id, ...d.data() };
      rows.push(r);
      if (!totals[r.name]) totals[r.name] = { hours:0, amount:0, rank: r.rank||'' };
      totals[r.name].hours  += Number(r.hours  || 0);
      totals[r.name].amount += Number(r.amount || 0);
    });
    rows.sort((a,b) => a.date < b.date ? -1 : 1);
    const names = Object.keys(totals).sort((a,b)=>a.localeCompare(b,'ko'));

    const totalHours  = names.reduce((s,n)=>s+totals[n].hours, 0);
    const totalAmount = names.reduce((s,n)=>s+totals[n].amount, 0);

    let html = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">

        <div style="background:#F0F4F9;border-radius:10px;padding:12px;">

          <div style="font-size:18px;font-weight:800;color:#1D5BA6;">${totalAmount.toLocaleString()}<span style="font-size:12px;color:#9AAABF;">원</span></div>
        </div>
      </div>`;

    if (names.length > 0) {
      html += `<table style="width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(29,91,166,0.06);margin-bottom:14px;">

          <th style="padding:9px 8px;text-align:right;color:#1D5BA6;font-size:11px;">수당</th>
        </tr></thead><tbody>`;
      names.forEach((n,i) => {
        html += `<tr style="background:${i%2===0?'#fff':'#F7F8FA'};">
          <td style="padding:9px 8px;font-weight:600;">${n}</td>
          <td style="padding:9px 8px;text-align:center;color:#5C6F8A;">${totals[n].rank}</td>
          <td style="padding:9px 8px;text-align:center;">${totals[n].hours}h</td>
          <td style="padding:9px 8px;text-align:right;">${totals[n].amount.toLocaleString()}원</td>
        </tr>`;
      });
      html += `<tr style="background:#E6F1FB;font-weight:700;">
        <td colspan="2" style="padding:9px 8px;">합계</td>
        <td style="padding:9px 8px;text-align:center;">${totalHours}h</td>
        <td style="padding:9px 8px;text-align:right;">${totalAmount.toLocaleString()}원</td>
      </tr></tbody></table>`;
    }

    if (rows.length > 0) {

            <th style="padding:8px;text-align:right;color:#1D5BA6;font-size:11px;">수당</th>
            <th style="padding:8px;text-align:center;color:#1D5BA6;font-size:11px;">관리</th>
          </tr></thead><tbody>`;
      rows.forEach((r,i) => {

// 🧾 퇴직금 정산
// 1일 평균임금 = (퇴직 전 3개월: 기본+고정연장+고정야간+주휴+상여금) ÷ 그 기간 일수
//   · 특별성과급·특근수당 제외, 정기상여/연차수당 가산 없음

//   · 계속근로 1년 미만 0원
// 퇴직금 = 적용 1일 평균임금 × 30 × (재직일수 ÷ 365)

// ── 근로기준법 연차 자동 계산 (HR) ──
function hrCalcAnnualLeave(hireDateStr, baseDateStr) {
  if (!hireDateStr) return { granted:0, years:0, months:0, detail:'입사일 미등록' };
  const hire = new Date(hireDateStr);
  const base = baseDateStr ? new Date(baseDateStr) : new Date();
  if (isNaN(hire.getTime()) || base < hire) return { granted:0, years:0, months:0, detail:'-' };
  let years = base.getFullYear() - hire.getFullYear();
  const mDiff = base.getMonth() - hire.getMonth();
  const dDiff = base.getDate() - hire.getDate();
  if (mDiff < 0 || (mDiff === 0 && dDiff < 0)) years--;
  const totalMonths = (base.getFullYear()-hire.getFullYear())*12 + (base.getMonth()-hire.getMonth()) - (base.getDate() < hire.getDate() ? 1 : 0);
  let granted = 0, detail = '';
  if (years < 1) {
    granted = Math.min(Math.max(totalMonths,0), 11);
    detail = `입사 ${Math.max(totalMonths,0)}개월`;
  } else {
    granted = 15;
    if (years >= 3) granted = Math.min(15 + Math.floor((years-1)/2), 25);
    detail = `근속 ${years}년차`;
  }
  return { granted, years, months: Math.max(totalMonths,0), detail };
}

window.saveLeaveAdmin = async function(editId) {
  const worker = document.getElementById('la-worker')?.value;
  const leaveType = document.getElementById('la-type')?.value;
  const startDate = document.getElementById('la-sdate')?.value;
  const endDate = document.getElementById('la-edate')?.value;
  const days = parseFloat(document.getElementById('la-days')?.value||0);
  const note = document.getElementById('la-note')?.value||'';

  if(!worker||!startDate||!endDate||!days){ alert('근로자·날짜·일수를 모두 입력하세요.'); return; }
  if(!window._db){ alert('DB 연결 안 됨'); return; }

  try {
    const {doc,setDoc,addDoc,collection,serverTimestamp} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const data = {
      dtype:'leave', status:'posted',
      authorName:worker, leaveType, startDate, endDate, days,
      note, adminCreated:true,
      title:`${startDate.replace(/-/g,'')} ${worker} ${leaveType} 신청서`,
      createdAt:serverTimestamp()
    };
    if(editId){
      await setDoc(doc(window._db,'edoc_leave',editId),data,{merge:true});
      alert('수정했습니다.');
    } else {
      await addDoc(collection(window._db,'edoc_leave'),data);
      alert('등록했습니다.');
    }
    document.getElementById('leave-admin-modal')?.remove();
    window.renderLeaveStatusMain();
  } catch(e){ alert('오류: '+e.message); }
};

window.deleteLeaveAdmin = async function(docId) {
  if(!confirm('이 연차 기록을 삭제할까요?')) return;
  if(!window._db) return;
  try {
    const {doc,deleteDoc} = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    await deleteDoc(doc(window._db,'edoc_leave',docId));
    alert('삭제했습니다.');
    document.getElementById('leave-admin-modal')?.remove();
    document.getElementById('leave-detail-modal')?.remove();
    window.renderLeaveStatusMain();
  } catch(e){ alert('오류: '+e.message); }
};

window.renderLeaveStatusMain = async () => {
  const el = document.getElementById('tab-leave'); if(!el) return;
  el.innerHTML = `<div style="padding:20px 24px;max-width:1000px;margin:0 auto;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">${homeBtn()}</div>

      ${window._isAdmin?`<button onclick="openLeaveAdminForm()" style="background:#1D5BA6;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;">+ 연차 등록</button>`:''}
    </div>
    <div style="font-size:13px;color:#5C6F8A;margin-bottom:18px;">최초 입사일 기준 · 근로기준법 자동 산정 · 게시 완료된 연차신청서 차감</div>
    <div id="leave-status-body" style="opacity:.6;">불러오는 중…</div>
  </div>`;

  if (!window._db) { document.getElementById('leave-status-body').innerHTML='DB 연결 안 됨'; return; }
  try {
    const { getDocs, collection } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    // 1) 근로자 명부
    const wSnap = await getDocs(collection(window._db,'workers'));
    const workers = [];
    wSnap.forEach(w => workers.push({ id:w.id, ...w.data() }));
    workers.sort((a,b)=>(a.empNo||'').localeCompare(b.empNo||''));
    // 2) 연차신청서 (게시/승인된 것만 사용일수 집계)
    const lvSnap = await getDocs(collection(window._db,'edoc_leave'));
    const leaves = [];
    lvSnap.forEach(l => leaves.push(l.data()));

    const sumUsed = (name) => {
      let u = 0;
      for (const lv of leaves) {
        const nm = lv.authorName || lv.name || '';
        if (nm !== name) continue;
        if (lv.status !== 'posted' && lv.status !== 'approved') continue;
        const d = parseFloat(lv.days || lv.leaveDays || 0);
        if (!isNaN(d)) u += d;
      }
      return u;
    };

    if (!workers.length) {
      document.getElementById('leave-status-body').innerHTML = '<div style="padding:40px;text-align:center;color:#9AAABF;">등록된 근로자가 없습니다.</div>';
      return;
    }

    // 정렬: 입사일 빠른 순
    workers.sort((a,b)=>(a.hireDate||'').localeCompare(b.hireDate||''));

    const rows = workers.map(w => {
      const g = hrCalcAnnualLeave(w.hireDate);
      const used = sumUsed(w.name);
      const remain = Math.max(g.granted - used, 0);
      const noHire = !w.hireDate;
      return `<tr onclick="showLeaveDetail('${w.id}','${(w.name||'').replace(/'/g,'')}','${w.hireDate||''}')" style="cursor:pointer;" onmouseover="this.style.background='#F7F9FC'" onmouseout="this.style.background='transparent'">
        <td style="padding:11px 12px;border-bottom:1px solid #EEF2F7;font-weight:600;color:#1A2540;">${w.name||'-'}</td>
        <td style="padding:11px 12px;border-bottom:1px solid #EEF2F7;color:#5C6F8A;">${w.dept||'-'}</td>
        <td style="padding:11px 12px;border-bottom:1px solid #EEF2F7;color:#5C6F8A;">${w.rank||'-'}</td>
        <td style="padding:11px 12px;border-bottom:1px solid #EEF2F7;color:#5C6F8A;font-size:12px;">${w.hireDate||'<span style="color:#DC2626;">미등록</span>'}</td>
        <td style="padding:11px 12px;border-bottom:1px solid #EEF2F7;color:#5C6F8A;font-size:12px;">${noHire?'-':g.detail}</td>
        <td style="padding:11px 12px;border-bottom:1px solid #EEF2F7;text-align:center;font-weight:700;color:#1D5BA6;">${noHire?'-':g.granted}</td>
        <td style="padding:11px 12px;border-bottom:1px solid #EEF2F7;text-align:center;font-weight:700;color:#F59E0B;">${used}</td>
        <td style="padding:11px 12px;border-bottom:1px solid #EEF2F7;text-align:center;font-weight:800;color:#16A34A;">${noHire?'-':remain}</td>
      </tr>`;
    }).join('');

    document.getElementById('leave-status-body').innerHTML = `
      <div style="background:#fff;border:1px solid #DDE4EF;border-radius:12px;overflow:hidden;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead>
            <tr style="background:#F4F7FB;">
              <th style="padding:12px;text-align:left;font-size:12px;color:#5C6F8A;font-weight:700;">이름</th>
              <th style="padding:12px;text-align:left;font-size:12px;color:#5C6F8A;font-weight:700;">부서</th>
              <th style="padding:12px;text-align:left;font-size:12px;color:#5C6F8A;font-weight:700;">직급</th>
              <th style="padding:12px;text-align:left;font-size:12px;color:#5C6F8A;font-weight:700;">최초 입사일</th>

              <th style="padding:12px;text-align:center;font-size:12px;color:#5C6F8A;font-weight:700;">사용</th>
              <th style="padding:12px;text-align:center;font-size:12px;color:#5C6F8A;font-weight:700;">잔여</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div style="margin-top:12px;font-size:12px;color:#9AAABF;line-height:1.7;">
        ※ 1년 미만: 1개월 개근당 1일(최대 11일) · 1년 이상: 15일 · 3년 이상: 2년마다 +1일(최대 25일)<br>
